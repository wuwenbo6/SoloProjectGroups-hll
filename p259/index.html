<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WS-Discovery Device Discovery</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 1400px;
    margin: 0 auto;
  }
  h1 {
    color: #fff;
    text-align: center;
    margin-bottom: 30px;
    font-size: 2.5rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  }
  .status-bar {
    background: rgba(255,255,255,0.95);
    padding: 15px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  .status-indicator {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #e74c3c;
    animation: pulse 2s infinite;
  }
  .status-indicator.connected {
    background: #27ae60;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .status-text {
    font-weight: 600;
    color: #2c3e50;
  }
  .main-content {
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 20px;
  }
  .devices-panel, .controls-panel {
    background: rgba(255,255,255,0.95);
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }
  .panel-title {
    font-size: 1.3rem;
    color: #2c3e50;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #667eea;
  }
  .device-count {
    display: inline-block;
    background: #667eea;
    color: #fff;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.85rem;
    margin-left: 10px;
  }
  .device-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
    max-height: 600px;
    overflow-y: auto;
    padding-right: 10px;
  }
  .device-list::-webkit-scrollbar {
    width: 8px;
  }
  .device-list::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 4px;
  }
  .device-list::-webkit-scrollbar-thumb {
    background: #667eea;
    border-radius: 4px;
  }
  .device-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 20px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .device-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, #667eea, #764ba2);
  }
  .device-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    border-color: #667eea;
  }
  .device-card.removing {
    animation: fadeOut 0.5s ease forwards;
  }
  @keyframes fadeOut {
    to {
      opacity: 0;
      transform: translateX(-20px);
    }
  }
  .device-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 15px;
  }
  .device-name {
    font-size: 1.2rem;
    font-weight: 600;
    color: #2c3e50;
  }
  .device-type {
    display: inline-block;
    background: #e8f4fd;
    color: #2980b9;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .device-info {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 15px;
  }
  .info-item {
    font-size: 0.9rem;
  }
  .info-label {
    color: #7f8c8d;
    font-size: 0.8rem;
    margin-bottom: 2px;
  }
  .info-value {
    color: #2c3e50;
    font-weight: 500;
    word-break: break-all;
  }
  .device-scopes {
    background: #f8f9fa;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 10px;
  }
  .scope-tag {
    display: inline-block;
    background: #fff;
    border: 1px solid #dfe6e9;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    color: #636e72;
    margin: 2px 4px 2px 0;
  }
  .device-actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s ease;
  }
  .btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
  }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-secondary {
    background: #ecf0f1;
    color: #2c3e50;
  }
  .btn-secondary:hover {
    background: #dfe6e9;
  }
  .btn-small {
    padding: 5px 12px;
    font-size: 0.75rem;
  }
  .control-group {
    margin-bottom: 20px;
  }
  .control-label {
    display: block;
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 8px;
  }
  .control-input, .control-textarea {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #dfe6e9;
    border-radius: 6px;
    font-size: 0.9rem;
    transition: border-color 0.2s ease;
    font-family: inherit;
  }
  .control-input:focus, .control-textarea:focus {
    outline: none;
    border-color: #667eea;
  }
  .control-textarea {
    resize: vertical;
    min-height: 80px;
  }
  .control-hint {
    font-size: 0.75rem;
    color: #95a5a6;
    margin-top: 4px;
  }
  .button-group {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
  .log-panel {
    background: #1a1a2e;
    border-radius: 8px;
    padding: 15px;
    max-height: 250px;
    overflow-y: auto;
    font-family: 'Monaco', 'Menlo', monospace;
    font-size: 0.75rem;
  }
  .log-panel::-webkit-scrollbar {
    width: 6px;
  }
  .log-panel::-webkit-scrollbar-track {
    background: #16213e;
  }
  .log-panel::-webkit-scrollbar-thumb {
    background: #667eea;
    border-radius: 3px;
  }
  .log-entry {
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .log-time {
    color: #636e72;
    margin-right: 8px;
  }
  .log-type {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
    margin-right: 8px;
  }
  .log-hello { background: #27ae60; color: #fff; }
  .log-bye { background: #e74c3c; color: #fff; }
  .log-probe { background: #3498db; color: #fff; }
  .log-probematch { background: #f39c12; color: #fff; }
  .log-resolve { background: #9b59b6; color: #fff; }
  .log-resolvematch { background: #1abc9c; color: #fff; }
  .log-getmetadata { background: #e67e22; color: #fff; }
  .log-metadatamatch { background: #27ae60; color: #fff; }
  .log-message {
    color: #ecf0f1;
  }
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal {
    background: #fff;
    border-radius: 15px;
    max-width: 700px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: modalSlideIn 0.3s ease;
  }
  @keyframes modalSlideIn {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .modal-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    padding: 20px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 15px 15px 0 0;
  }
  .modal-title {
    font-size: 1.3rem;
    font-weight: 600;
  }
  .modal-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .modal-close:hover {
    opacity: 1;
  }
  .modal-body {
    padding: 25px;
  }
  .metadata-section {
    margin-bottom: 20px;
  }
  .metadata-section-title {
    font-size: 1rem;
    font-weight: 600;
    color: #667eea;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #667eea20;
  }
  .metadata-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .metadata-item {
    background: #f8f9fa;
    padding: 10px 12px;
    border-radius: 6px;
  }
  .metadata-label {
    font-size: 0.75rem;
    color: #7f8c8d;
    margin-bottom: 3px;
  }
  .metadata-value {
    font-size: 0.9rem;
    color: #2c3e50;
    font-weight: 500;
    word-break: break-all;
    font-family: 'Monaco', 'Menlo', monospace;
  }
  .metadata-value.boolean-yes {
    color: #27ae60;
  }
  .metadata-value.boolean-no {
    color: #e74c3c;
  }
  .metadata-full-width {
    grid-column: span 2;
  }
  .btn-success {
    background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
    color: #fff;
  }
  .btn-success:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(39, 174, 96, 0.4);
  }
  .btn-warning {
    background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
    color: #fff;
  }
  .btn-warning:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(243, 156, 18, 0.4);
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #95a5a6;
  }
  .empty-state-icon {
    font-size: 3rem;
    margin-bottom: 15px;
  }
  @media (max-width: 1024px) {
    .main-content {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🔍 WS-Discovery 设备发现</h1>
  
  <div class="status-bar">
    <div class="status-indicator" id="statusIndicator"></div>
    <div class="status-text" id="statusText">正在连接...</div>
    <div style="flex: 1;"></div>
    <div style="color: #7f8c8d; font-size: 0.9rem;">
      连接: <span id="connectionTime">--</span>
    </div>
  </div>

  <div class="main-content">
    <div class="devices-panel">
      <h2 class="panel-title">
        发现的设备
        <span class="device-count" id="deviceCount">0</span>
        <button class="btn btn-success btn-small" style="margin-left: 10px; float: right;" onclick="exportCSV()">📥 导出 CSV</button>
      </h2>
      <div class="device-list" id="deviceList">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">📡</div>
          <p>等待设备发现...</p>
          <p style="font-size: 0.85rem; margin-top: 8px;">发送 Probe 消息来搜索设备</p>
        </div>
      </div>
    </div>

    <div class="controls-panel">
      <h2 class="panel-title">控制面板</h2>
      
      <div class="control-group">
        <label class="control-label">Probe - 设备搜索</label>
        <input type="text" class="control-input" id="probeTypes" placeholder="设备类型 (例如: dn:NetworkVideoTransmitter)">
        <div class="control-hint">按类型过滤，留空搜索所有设备</div>
        <textarea class="control-textarea" id="probeScopes" placeholder="Scopes (例如: onvif://www.onvif.org/Profile/Streaming)"></textarea>
        <div class="control-hint">按作用域过滤，多个用空格分隔</div>
        <div class="button-group" style="margin-top: 12px;">
          <button class="btn btn-primary" id="btnProbe" onclick="sendProbe()">🔍 发送 Probe</button>
          <button class="btn btn-secondary" onclick="clearDevices()">🗑️ 清空列表</button>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">Resolve - 解析设备</label>
        <input type="text" class="control-input" id="resolveEndpoint" placeholder="EndpointReference (urn:uuid:...)">
        <div class="control-hint">输入设备的 EndpointReference 获取详细信息</div>
        <div class="button-group" style="margin-top: 8px;">
          <button class="btn btn-primary" style="flex: 1;" onclick="sendResolve()">� 发送 Resolve</button>
          <button class="btn btn-warning" style="flex: 1;" onclick="sendGetMetadata()">📊 获取元数据</button>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">消息日志</label>
        <div class="log-panel" id="logPanel">
          <div class="log-entry" style="color: #636e72;">等待消息...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="metadataModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">设备元数据</div>
      <button class="modal-close" onclick="closeMetadataModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
    </div>
  </div>
</div>

<script>
let ws = null;
let devices = new Map();
let connectionStartTime = null;

function generateMessageId() {
  return 'urn:uuid:' + 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function formatTime(date) {
  return date.toLocaleTimeString('zh-CN', { hour12: false });
}

function getTypeIcon(type) {
  if (type.includes('Video') || type.includes('Camera')) return '📷';
  if (type.includes('Printer')) return '🖨️';
  if (type.includes('Thermostat') || type.includes('Sensor')) return '🌡️';
  return '📱';
}

function addLog(type, message) {
  const logPanel = document.getElementById('logPanel');
  const logEntry = document.createElement('div');
  logEntry.className = 'log-entry';
  
  const time = formatTime(new Date());
  const logType = type.toLowerCase();
  
  logEntry.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="log-type log-${logType}">${type}</span>
    <span class="log-message">${message}</span>
  `;
  
  logPanel.appendChild(logEntry);
  logPanel.scrollTop = logPanel.scrollHeight;
  
  if (logPanel.children.length > 100) {
    logPanel.removeChild(logPanel.firstChild);
  }
}

function updateDeviceCount() {
  document.getElementById('deviceCount').textContent = devices.size;
  const emptyState = document.getElementById('emptyState');
  if (devices.size > 0 && emptyState) {
    emptyState.style.display = 'none';
  } else if (devices.size === 0) {
    if (!emptyState) {
      const deviceList = document.getElementById('deviceList');
      const empty = document.createElement('div');
      empty.id = 'emptyState';
      empty.className = 'empty-state';
      empty.innerHTML = `
        <div class="empty-state-icon">📡</div>
        <p>等待设备发现...</p>
        <p style="font-size: 0.85rem; margin-top: 8px;">发送 Probe 消息来搜索设备</p>
      `;
      deviceList.appendChild(empty);
    } else {
      emptyState.style.display = 'block';
    }
  }
}

function addDevice(deviceMsg) {
  devices.set(deviceMsg.EndpointReference, deviceMsg);
  
  const deviceList = document.getElementById('deviceList');
  const existingCard = document.getElementById('device-' + deviceMsg.EndpointReference.replace(/[:/]/g, '-'));
  if (existingCard) {
    existingCard.remove();
  }
  
  const card = document.createElement('div');
  card.className = 'device-card';
  card.id = 'device-' + deviceMsg.EndpointReference.replace(/[:/]/g, '-');
  
  const scopes = deviceMsg.Scopes ? deviceMsg.Scopes.split(/\s+/) : [];
  const scopeTags = scopes.map(s => `<span class="scope-tag">${s}</span>`).join('');
  
  const typeShort = deviceMsg.Types ? deviceMsg.Types.split(':').pop() : 'Unknown';
  
  card.innerHTML = `
    <div class="device-header">
      <div>
        <div class="device-name">
          ${getTypeIcon(deviceMsg.Types || '')} ${deviceMsg.Name || 'Unnamed Device'}
        </div>
        <div style="margin-top: 5px;">
          <span class="device-type">${typeShort}</span>
        </div>
      </div>
      <div style="text-align: right;">
        <div style="font-size: 0.75rem; color: #95a5a6;">发现于</div>
        <div style="font-size: 0.85rem; color: #2c3e50;">${formatTime(new Date())}</div>
      </div>
    </div>
    <div class="device-info">
      <div class="info-item">
        <div class="info-label">厂商</div>
        <div class="info-value">${deviceMsg.Manufacturer || '-'}</div>
      </div>
      <div class="info-item">
        <div class="info-label">型号</div>
        <div class="info-value">${deviceMsg.Model || '-'}</div>
      </div>
      <div class="info-item">
        <div class="info-label">固件版本</div>
        <div class="info-value">${deviceMsg.FirmwareVersion || '-'}</div>
      </div>
      <div class="info-item">
        <div class="info-label">元数据版本</div>
        <div class="info-value">${deviceMsg.MetadataVersion || '-'}</div>
      </div>
    </div>
    <div class="info-item" style="margin-bottom: 10px;">
      <div class="info-label">EndpointReference</div>
      <div class="info-value" style="font-family: monospace; font-size: 0.8rem;">${deviceMsg.EndpointReference}</div>
    </div>
    <div class="info-item" style="margin-bottom: 10px;">
      <div class="info-label">XAddrs</div>
      <div class="info-value" style="font-family: monospace; font-size: 0.8rem; color: #2980b9;">${deviceMsg.XAddrs || '-'}</div>
    </div>
    ${scopeTags ? `<div class="device-scopes">${scopeTags}</div>` : ''}
    <div class="device-actions">
      <button class="btn btn-primary btn-small" onclick="copyEndpoint('${deviceMsg.EndpointReference}')">📋 复制 EPR</button>
      <button class="btn btn-warning btn-small" onclick="getDeviceMetadata('${deviceMsg.EndpointReference}')">📊 获取元数据</button>
      <button class="btn btn-secondary btn-small" onclick="resolveDevice('${deviceMsg.EndpointReference}')">🔍 Resolve</button>
    </div>
  `;
  
  deviceList.insertBefore(card, deviceList.firstChild);
  updateDeviceCount();
}

function removeDevice(endpointReference) {
  const device = devices.get(endpointReference);
  if (device) {
    devices.delete(endpointReference);
    const card = document.getElementById('device-' + endpointReference.replace(/[:/]/g, '-'));
    if (card) {
      card.classList.add('removing');
      setTimeout(() => {
        card.remove();
        updateDeviceCount();
      }, 500);
    }
  }
}

function clearDevices() {
  devices.clear();
  document.getElementById('deviceList').innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">📡</div>
      <p>等待设备发现...</p>
      <p style="font-size: 0.85rem; margin-top: 8px;">发送 Probe 消息来搜索设备</p>
    </div>
  `;
  updateDeviceCount();
  addLog('Info', '设备列表已清空');
}

function copyEndpoint(endpoint) {
  navigator.clipboard.writeText(endpoint).then(() => {
    addLog('Info', `已复制 EndpointReference: ${endpoint.substring(0, 30)}...`);
  });
}

function resolveDevice(endpoint) {
  document.getElementById('resolveEndpoint').value = endpoint;
  sendResolve();
}

function getDeviceMetadata(endpoint) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addLog('Error', 'WebSocket 未连接');
    return;
  }
  
  const getMetadataMsg = {
    Type: 'GetMetadata',
    MessageID: generateMessageId(),
    To: 'urn:schemas-xmlsoap-org:ws:2005:04:discovery',
    Action: 'http://schemas.xmlsoap.org/ws/2004/09/mex/GetMetadata',
    EndpointReference: endpoint
  };
  
  ws.send(JSON.stringify(getMetadataMsg));
  addLog('GetMetadata', `获取元数据: ${endpoint.substring(0, 30)}...`);
}

function sendGetMetadata() {
  const endpoint = document.getElementById('resolveEndpoint').value.trim();
  if (!endpoint) {
    addLog('Error', '请输入 EndpointReference');
    return;
  }
  getDeviceMetadata(endpoint);
}

function formatMetadataValue(key, value) {
  if (typeof value === 'boolean') {
    return value 
      ? '<span class="metadata-value boolean-yes">✓ 支持</span>'
      : '<span class="metadata-value boolean-no">✗ 不支持</span>';
  }
  return `<span class="metadata-value">${value || '-'}</span>`;
}

function showMetadataModal(deviceMetadata) {
  const modal = document.getElementById('metadataModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');
  
  const md = deviceMetadata;
  
  const basicInfoItems = [
    { label: '设备名称', key: 'Name', value: md.Name },
    { label: '厂商', key: 'Manufacturer', value: md.Manufacturer },
    { label: '厂商网址', key: 'ManufacturerURL', value: md.ManufacturerURL, fullWidth: true },
    { label: '型号', key: 'Model', value: md.Model },
    { label: '固件版本', key: 'FirmwareVersion', value: md.FirmwareVersion },
    { label: '序列号', key: 'SerialNumber', value: md.SerialNumber },
    { label: '硬件ID', key: 'HardwareId', value: md.HardwareId },
    { label: '元数据版本', key: 'MetadataVersion', value: deviceMetadata.MetadataVersion }
  ].filter(item => item.value !== undefined);
  
  const networkItems = [
    { label: 'IP地址', key: 'IPAddress', value: md.IPAddress },
    { label: 'MAC地址', key: 'MACAddress', value: md.MACAddress },
    { label: '端口', key: 'Port', value: md.Port },
    { label: '支持协议', key: 'SupportedProtocols', value: md.SupportedProtocols, fullWidth: true },
    { label: 'EndpointReference', key: 'EndpointReference', value: deviceMetadata.EndpointReference, fullWidth: true },
    { label: 'XAddrs', key: 'XAddrs', value: md.XAddrs, fullWidth: true },
    { label: '设备类型', key: 'Types', value: md.Types, fullWidth: true },
    { label: '作用域', key: 'Scopes', value: md.Scopes, fullWidth: true }
  ].filter(item => item.value !== undefined);
  
  const capabilityItems = Object.entries(md)
    .filter(([key, value]) => 
      !['Name', 'Manufacturer', 'ManufacturerURL', 'Model', 'FirmwareVersion', 
         'SerialNumber', 'HardwareId', 'IPAddress', 'MACAddress', 'Port', 
         'SupportedProtocols', 'Types', 'Scopes', 'XAddrs', 'EndpointReference'].includes(key)
    )
    .map(([key, value]) => ({
      label: key.replace(/([A-Z])/g, ' $1').trim(),
      key: key,
      value: value
    }));
  
  function renderSection(title, items) {
    if (items.length === 0) return '';
    return `
      <div class="metadata-section">
        <div class="metadata-section-title">${title}</div>
        <div class="metadata-grid">
          ${items.map(item => `
            <div class="metadata-item ${item.fullWidth ? 'metadata-full-width' : ''}">
              <div class="metadata-label">${item.label}</div>
              ${formatMetadataValue(item.key, item.value)}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  modalTitle.textContent = `📊 ${md.Name || '设备'} - 元数据详情`;
  modalBody.innerHTML = `
    ${renderSection('基本信息', basicInfoItems)}
    ${renderSection('网络信息', networkItems)}
    ${renderSection('功能特性', capabilityItems)}
  `;
  
  modal.classList.add('active');
  addLog('Info', `显示 ${md.Name} 的元数据`);
}

function closeMetadataModal() {
  const modal = document.getElementById('metadataModal');
  modal.classList.remove('active');
}

document.addEventListener('click', (e) => {
  const modal = document.getElementById('metadataModal');
  if (e.target === modal) {
    closeMetadataModal();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeMetadataModal();
  }
});

function exportCSV() {
  if (devices.size === 0) {
    addLog('Error', '没有可导出的设备数据');
    return;
  }
  
  window.open('/api/devices/export', '_blank');
  addLog('Info', `导出 ${devices.size} 个设备到 CSV 文件`);
}

function sendProbe() {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addLog('Error', 'WebSocket 未连接');
    return;
  }
  
  const types = document.getElementById('probeTypes').value.trim();
  const scopes = document.getElementById('probeScopes').value.trim();
  
  const probeMsg = {
    Type: 'Probe',
    MessageID: generateMessageId(),
    To: 'urn:schemas-xmlsoap-org:ws:2005:04:discovery',
    Action: 'http://schemas.xmlsoap.org/ws/2005/04/discovery/Probe'
  };
  
  if (types) probeMsg.Types = types;
  if (scopes) probeMsg.Scopes = scopes;
  
  ws.send(JSON.stringify(probeMsg));
  
  const desc = types || scopes ? `[${types || '*'}] [${scopes || '*'}]` : '[所有设备]';
  addLog('Probe', `发送搜索请求 ${desc}`);
}

function sendResolve() {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addLog('Error', 'WebSocket 未连接');
    return;
  }
  
  const endpoint = document.getElementById('resolveEndpoint').value.trim();
  if (!endpoint) {
    addLog('Error', '请输入 EndpointReference');
    return;
  }
  
  const resolveMsg = {
    Type: 'Resolve',
    MessageID: generateMessageId(),
    To: 'urn:schemas-xmlsoap-org:ws:2005:04:discovery',
    Action: 'http://schemas.xmlsoap.org/ws/2005/04/discovery/Resolve',
    EndpointReference: endpoint
  };
  
  ws.send(JSON.stringify(resolveMsg));
  addLog('Resolve', `解析 ${endpoint.substring(0, 30)}...`);
}

function handleMessage(msg) {
  if (!msg.Type) return;
  
  const msgType = msg.Type;
  
  switch (msgType) {
    case 'Hello':
      addLog('Hello', `设备上线: ${msg.Name || msg.EndpointReference}`);
      addDevice(msg);
      break;
    case 'Bye':
      addLog('Bye', `设备离线: ${msg.Name || msg.EndpointReference}`);
      removeDevice(msg.EndpointReference);
      break;
    case 'ProbeMatch':
      addLog('ProbeMatch', `发现设备: ${msg.Name || msg.EndpointReference}`);
      addDevice(msg);
      break;
    case 'ProbeMatches':
      if (msg.ProbeMatch && msg.ProbeMatch.length === 0) {
        addLog('ProbeMatch', '未找到匹配设备');
      }
      break;
    case 'ResolveMatch':
      addLog('ResolveMatch', `解析成功: ${msg.Name || msg.EndpointReference}`);
      addDevice(msg);
      break;
    case 'ResolveMatches':
      if (!msg.ResolveMatch) {
        addLog('ResolveMatch', '未找到设备');
      }
      break;
    case 'MetadataMatch':
      addLog('MetadataMatch', `获取元数据成功: ${msg.Metadata?.Name || msg.EndpointReference}`);
      addDevice(msg);
      if (msg.Metadata) {
        const fullMetadata = {
          ...msg.Metadata,
          EndpointReference: msg.EndpointReference,
          MetadataVersion: msg.MetadataVersion
        };
        showMetadataModal(fullMetadata);
      }
      break;
    case 'MetadataMatches':
      if (!msg.MetadataMatch) {
        addLog('MetadataMatch', '未找到设备元数据');
      }
      break;
    default:
      addLog('Unknown', `未知消息类型: ${msgType}`);
  }
}

function connect() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${window.location.host}`;
  
  ws = new WebSocket(wsUrl);
  
  ws.onopen = () => {
    connectionStartTime = new Date();
    document.getElementById('statusIndicator').classList.add('connected');
    document.getElementById('statusText').textContent = '已连接';
    document.getElementById('btnProbe').disabled = false;
    addLog('Info', `WebSocket 连接成功: ${wsUrl}`);
    updateConnectionTime();
  };
  
  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      handleMessage(msg);
    } catch (err) {
      addLog('Error', `解析消息失败: ${err.message}`);
    }
  };
  
  ws.onclose = () => {
    document.getElementById('statusIndicator').classList.remove('connected');
    document.getElementById('statusText').textContent = '连接已断开，正在重连...';
    document.getElementById('btnProbe').disabled = true;
    addLog('Info', 'WebSocket 连接已关闭');
    
    setTimeout(() => {
      if (!ws || ws.readyState === WebSocket.CLOSED) {
        addLog('Info', '尝试重新连接...');
        connect();
      }
    }, 3000);
  };
  
  ws.onerror = (err) => {
    addLog('Error', `WebSocket 错误`);
  };
}

function updateConnectionTime() {
  if (connectionStartTime) {
    const now = new Date();
    const diff = Math.floor((now - connectionStartTime) / 1000);
    const hours = Math.floor(diff / 3600);
    const minutes = Math.floor((diff % 3600) / 60);
    const seconds = diff % 60;
    document.getElementById('connectionTime').textContent = 
      `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
  }
  setTimeout(updateConnectionTime, 1000);
}

document.addEventListener('DOMContentLoaded', () => {
  connect();
  
  document.getElementById('probeTypes').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendProbe();
  });
  
  document.getElementById('probeScopes').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendProbe();
    }
  });
  
  document.getElementById('resolveEndpoint').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendResolve();
  });
});
</script>
</body>
</html>
