<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM卡ISO 7816-4文件解析器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: scale(1.01);
        }

        .drop-zone svg {
            width: 64px;
            height: 64px;
            fill: #667eea;
            margin-bottom: 20px;
        }

        .drop-zone p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }

        .drop-zone .hint {
            font-size: 0.9rem;
            color: #999;
        }

        #fileInput {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-info p {
            margin: 5px 0;
            color: #2e7d32;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .results-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .tree-container {
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .tree-node {
            margin-left: 20px;
        }

        .tree-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tree-item:hover {
            background: #f0f2ff;
        }

        .tree-item.mf {
            background: #fff3e0;
        }

        .tree-item.df {
            background: #e3f2fd;
        }

        .tree-item.ef {
            background: #e8f5e9;
        }

        .toggle {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #667eea;
            transition: transform 0.2s;
        }

        .toggle.expanded {
            transform: rotate(90deg);
        }

        .toggle.hidden {
            visibility: hidden;
        }

        .file-icon {
            font-size: 1.2rem;
        }

        .file-id {
            font-weight: bold;
            color: #333;
            min-width: 60px;
        }

        .file-name {
            color: #666;
            flex: 1;
        }

        .file-type-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .file-type-badge.mf {
            background: #ff9800;
            color: white;
        }

        .file-type-badge.df {
            background: #2196f3;
            color: white;
        }

        .file-type-badge.ef {
            background: #4caf50;
            color: white;
        }

        .file-size {
            color: #999;
            font-size: 0.85rem;
        }

        .details-panel {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .details-panel.show {
            display: block;
        }

        .details-panel h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .detail-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: bold;
            color: #666;
            min-width: 150px;
        }

        .detail-value {
            color: #333;
            flex: 1;
        }

        .permissions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .perm-item {
            padding: 8px 12px;
            background: white;
            border-radius: 6px;
            border-left: 4px solid #ccc;
        }

        .perm-item.always {
            border-left-color: #4caf50;
        }

        .perm-item.never {
            border-left-color: #f44336;
        }

        .perm-item.chv {
            border-left-color: #ff9800;
        }

        .perm-item.adm {
            border-left-color: #2196f3;
        }

        .perm-label {
            font-size: 0.85rem;
            color: #666;
        }

        .perm-value {
            font-weight: bold;
            color: #333;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .legend-color.mf { background: #fff3e0; }
        .legend-color.df { background: #e3f2fd; }
        .legend-color.ef { background: #e8f5e9; }

        .records-panel {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .records-panel.show {
            display: block;
        }

        .records-panel h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .record-info {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            margin-bottom: 10px;
        }

        .record-number {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1rem;
        }

        .record-offset {
            color: #666;
            font-size: 0.9rem;
        }

        .record-hex {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            word-break: break-all;
            margin: 10px 0;
        }

        .fields-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .field-item {
            background: #f0f4ff;
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }

        .field-name {
            font-weight: bold;
            color: #333;
            font-size: 0.9rem;
        }

        .field-value {
            color: #667eea;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .field-type {
            font-size: 0.75rem;
            color: #999;
            font-style: italic;
        }

        .no-records {
            color: #999;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 SIM卡ISO 7816-4文件解析器</h1>
            <p>上传SIM卡透明二进制文件，解析MF/DF/EF文件结构和访问权限</p>
        </header>

        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <svg viewBox="0 0 24 24">
                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                </svg>
                <p>拖放文件到这里，或点击选择文件</p>
                <p class="hint">支持 .bin, .hex, .sim, .dat 格式的二进制文件</p>
                <input type="file" id="fileInput" accept=".bin,.hex,.sim,.dat">
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" id="uploadBtn" disabled>解析文件</button>
                <button class="btn btn-outline" id="sampleBtn">加载示例数据</button>
                <button class="btn btn-success" id="exportXmlBtn" style="background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);">导出XML</button>
            </div>

            <div class="file-info" id="fileInfo">
                <p><strong>文件名:</strong> <span id="fileName"></span></p>
                <p><strong>文件大小:</strong> <span id="fileSize"></span> 字节</p>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在解析文件...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="results-section" id="resultsSection">
            <h2>📂 文件结构树</h2>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color mf"></div>
                    <span>MF (主文件)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color df"></div>
                    <span>DF (专用文件)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color ef"></div>
                    <span>EF (基本文件)</span>
                </div>
                <div class="legend-item">
                    <label style="display:flex;align-items:center;gap:5px;cursor:pointer;">
                        <input type="checkbox" id="showPathCheckbox">
                        <span>显示完整路径</span>
                    </label>
                </div>
            </div>

            <div class="tree-container" id="treeContainer"></div>

            <div class="details-panel" id="detailsPanel">
                <h3>📋 文件详情</h3>
                <div id="detailsContent"></div>
            </div>

            <div class="records-panel" id="recordsPanel" style="display:none;">
                <h3>📊 记录详情</h3>
                <div id="recordsContent"></div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const sampleBtn = document.getElementById('sampleBtn');
        const exportXmlBtn = document.getElementById('exportXmlBtn');
        const fileInfo = document.getElementById('fileInfo');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const resultsSection = document.getElementById('resultsSection');
        const treeContainer = document.getElementById('treeContainer');
        const detailsPanel = document.getElementById('detailsPanel');
        const detailsContent = document.getElementById('detailsContent');
        const recordsPanel = document.getElementById('recordsPanel');
        const recordsContent = document.getElementById('recordsContent');
        const showPathCheckbox = document.getElementById('showPathCheckbox');

        let selectedFile = null;
        let currentStructure = null;
        let showFullPath = false;
        let currentSelectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            selectedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = file.size;
            fileInfo.classList.add('show');
            uploadBtn.disabled = false;
        }

        if (showPathCheckbox) {
            showPathCheckbox.addEventListener('change', (e) => {
                showFullPath = e.target.checked;
                if (currentStructure) {
                    renderTree(currentStructure);
                }
            });
        }

        uploadBtn.addEventListener('click', () => {
            if (selectedFile) {
                uploadAndParseFile(selectedFile);
            }
        });

        sampleBtn.addEventListener('click', () => {
            loadSampleData();
        });

        exportXmlBtn.addEventListener('click', () => {
            exportToXml();
        });

        function exportToXml() {
            if (selectedFile) {
                const formData = new FormData();
                formData.append('file', selectedFile);
                showLoading();
                fetch('/api/upload/export/xml', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(xml => {
                    const blob = new Blob([xml], { type: 'application/xml' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = selectedFile.name.replace(/\.[^/.]+$/, '') + '_filesystem.xml';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                })
                .catch(error => showError('导出XML失败: ' + error.message))
                .finally(() => hideLoading());
            } else if (currentStructure) {
                showLoading();
                fetch('/api/export/xml/download')
                .then(response => response.blob())
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'simcard_filesystem.xml';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                })
                .catch(error => showError('导出XML失败: ' + error.message))
                .finally(() => hideLoading());
            } else {
                showError('请先解析文件或加载示例数据');
            }
        }

        async function uploadAndParseFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            showLoading();
            hideError();

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    currentStructure = data.structure;
                    renderTree(currentStructure);
                    showResults();
                } else {
                    showError(data.error || '解析文件失败');
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        async function loadSampleData() {
            showLoading();
            hideError();

            try {
                const response = await fetch('/api/sample');
                const data = await response.json();

                if (data.success) {
                    currentStructure = data.structure;
                    renderTree(currentStructure);
                    showResults();
                } else {
                    showError(data.error || '加载示例数据失败');
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        function renderTree(node, container = treeContainer, level = 0) {
            if (level === 0) {
                container.innerHTML = '';
            }

            const nodeEl = document.createElement('div');
            nodeEl.className = 'tree-node';

            const itemEl = document.createElement('div');
            itemEl.className = `tree-item ${node.file_type.toLowerCase()}`;
            itemEl.onclick = (e) => {
                e.stopPropagation();
                showDetails(node);
            };

            const toggleEl = document.createElement('span');
            toggleEl.className = 'toggle';
            if (node.children && node.children.length > 0) {
                toggleEl.classList.add('expanded');
                toggleEl.textContent = '▶';
                toggleEl.onclick = (e) => {
                    e.stopPropagation();
                    toggleChildren(nodeEl, toggleEl);
                };
            } else {
                toggleEl.classList.add('hidden');
                toggleEl.textContent = '•';
            }

            const iconEl = document.createElement('span');
            iconEl.className = 'file-icon';
            if (node.file_type === 'MF') {
                iconEl.textContent = '📁';
            } else if (node.file_type === 'DF') {
                iconEl.textContent = '📂';
            } else {
                iconEl.textContent = '📄';
            }

            const idEl = document.createElement('span');
            idEl.className = 'file-id';
            idEl.textContent = showFullPath && node.path ? node.path : node.fid;
            if (showFullPath && node.path) {
                idEl.style.fontSize = '0.8rem';
                idEl.style.minWidth = 'auto';
            } else {
                idEl.style.fontSize = '';
                idEl.style.minWidth = '60px';
            }

            const nameEl = document.createElement('span');
            nameEl.className = 'file-name';
            nameEl.textContent = node.name;

            const badgeEl = document.createElement('span');
            badgeEl.className = `file-type-badge ${node.file_type.toLowerCase()}`;
            badgeEl.textContent = node.file_type;

            const sizeEl = document.createElement('span');
            sizeEl.className = 'file-size';
            sizeEl.textContent = node.size > 0 ? `${node.size} 字节` : '';

            itemEl.appendChild(toggleEl);
            itemEl.appendChild(iconEl);
            itemEl.appendChild(idEl);
            itemEl.appendChild(nameEl);
            itemEl.appendChild(badgeEl);
            itemEl.appendChild(sizeEl);

            nodeEl.appendChild(itemEl);

            if (node.children && node.children.length > 0) {
                const childrenEl = document.createElement('div');
                childrenEl.className = 'tree-children';
                node.children.forEach(child => {
                    renderTree(child, childrenEl, level + 1);
                });
                nodeEl.appendChild(childrenEl);
            }

            container.appendChild(nodeEl);
        }

        function toggleChildren(nodeEl, toggleEl) {
            const childrenEl = nodeEl.querySelector('.tree-children');
            if (childrenEl) {
                const isHidden = childrenEl.style.display === 'none';
                childrenEl.style.display = isHidden ? '' : 'none';
                toggleEl.classList.toggle('expanded', isHidden);
            }
        }

        function showDetails(node) {
            currentSelectedFile = node;
            detailsPanel.classList.add('show');

            const perms = node.access_permissions || {};
            
            let html = `
                <div class="detail-row">
                    <span class="detail-label">文件ID (FID)</span>
                    <span class="detail-value">${node.fid}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">绝对路径</span>
                    <span class="detail-value"><code style="background:#e3f2fd;padding:2px 8px;border-radius:4px;">${node.path || node.fid}</code></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">文件名称</span>
                    <span class="detail-value">${node.name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">文件类型</span>
                    <span class="detail-value">${getFileTypeDescription(node.file_type)}</span>
                </div>
            `;

            if (node.ef_type) {
                html += `
                <div class="detail-row">
                    <span class="detail-label">EF类型</span>
                    <span class="detail-value"><code style="background:#fff3e0;padding:2px 8px;border-radius:4px;">${getEfTypeDescription(node.ef_type)}</code></span>
                </div>
                `;
            }

            html += `
                <div class="detail-row">
                    <span class="detail-label">文件大小</span>
                    <span class="detail-value">${node.size > 0 ? node.size + ' 字节' : '未知'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">文件偏移</span>
                    <span class="detail-value">0x${(node.file_offset || 0).toString(16).toUpperCase()} (${node.file_offset || 0} 字节)</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">数据长度</span>
                    <span class="detail-value">${node.data_length || 0} 字节</span>
                </div>
            `;

            if (node.record_size > 0) {
                html += `
                <div class="detail-row">
                    <span class="detail-label">记录大小</span>
                    <span class="detail-value">${node.record_size} 字节</span>
                </div>
                `;
            }

            if (node.record_count > 0) {
                html += `
                <div class="detail-row">
                    <span class="detail-label">记录数量</span>
                    <span class="detail-value">${node.record_count}</span>
                </div>
                `;
            }

            html += `
                <div class="detail-row">
                    <span class="detail-label">生命周期</span>
                    <span class="detail-value">${node.lifecycle}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">子文件数量</span>
                    <span class="detail-value">${node.children ? node.children.length : 0}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">访问权限</span>
                    <span class="detail-value"></span>
                </div>
            `;

            html += '<div class="permissions-grid">';
            
            const permItems = [
                { label: '读取 (Read)', value: perms.read },
                { label: '更新 (Update)', value: perms.update },
                { label: '写入 (Write)', value: perms.write },
                { label: '删除 (Delete)', value: perms.delete },
                { label: '激活 (Activate)', value: perms.activate },
                { label: '停用 (Deactivate)', value: perms.deactivate },
                { label: '读二进制 (Read Binary)', value: perms.read_binary },
                { label: '写二进制 (Update Binary)', value: perms.update_binary },
                { label: '读记录 (Read Record)', value: perms.read_record },
                { label: '写记录 (Update Record)', value: perms.update_record },
                { label: '追加记录 (Append Record)', value: perms.append_record },
            ];

            permItems.forEach(item => {
                const permClass = getPermClass(item.value);
                html += `
                    <div class="perm-item ${permClass}">
                        <div class="perm-label">${item.label}</div>
                        <div class="perm-value">${item.value || 'N/A'}</div>
                    </div>
                `;
            });

            html += '</div>';

            detailsContent.innerHTML = html;

            if (node.records && node.records.length > 0) {
                showRecords(node);
            } else if (node.file_type === 'EF') {
                recordsPanel.classList.add('show');
                recordsContent.innerHTML = '<div class="no-records">此EF文件无解析记录</div>';
            } else {
                recordsPanel.classList.remove('show');
            }
        }

        function getEfTypeDescription(type) {
            const descriptions = {
                'transarent': 'Transparent EF (透明EF)',
                'linear_fixed': 'Linear Fixed EF (线性固定EF)',
                'cyclic': 'Cyclic EF (循环EF)',
                'variable': 'Variable EF (可变EF)'
            };
            return descriptions[type] || type;
        }

        function showRecords(node) {
            recordsPanel.classList.add('show');
            let html = `
                <div style="margin-bottom: 15px;">
                    <strong>文件:</strong> ${node.name} (${node.fid}) 
                    <br>
                    <strong>记录数量:</strong> ${node.record_count} 
                    <strong>记录大小:</strong> ${node.record_size} 字节
                </div>
            `;

            node.records.forEach((record, index) => {
                html += `
                    <div class="record-info">
                        <div class="record-header">
                            <span class="record-number">记录 #${record.record_number}</span>
                            <span class="record-offset">偏移: 0x${record.offset.toString(16).toUpperCase()}</span>
                        </div>
                        <div class="record-hex">${record.hex_data}</div>
                `;

                if (record.parsed_fields && record.parsed_fields.fields && record.parsed_fields.fields.length > 0) {
                    html += '<div class="fields-grid">';
                    record.parsed_fields.fields.forEach(field => {
                        html += `
                            <div class="field-item">
                                <div class="field-name">${field.name}</div>
                                <div class="field-value">${field.value !== undefined ? field.value : 'N/A'}</div>
                                <div class="field-type">${field.type} (偏移: ${field.offset}, 长度: ${field.length})</div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                html += '</div>';
            });

            recordsContent.innerHTML = html;
        }

        function getFileTypeDescription(type) {
            const descriptions = {
                'MF': 'MF - Master File (主文件，根目录)',
                'DF': 'DF - Dedicated File (专用文件，目录)',
                'EF': 'EF - Elementary File (基本文件，数据文件)'
            };
            return descriptions[type] || type;
        }

        function getPermClass(value) {
            if (!value || value === 'N/A') return '';
            if (value === 'Always') return 'always';
            if (value === 'Never') return 'never';
            if (value.startsWith('CHV')) return 'chv';
            if (value.startsWith('ADM')) return 'adm';
            return '';
        }

        function showLoading() {
            loading.classList.add('show');
            uploadBtn.disabled = true;
        }

        function hideLoading() {
            loading.classList.remove('show');
            if (selectedFile) {
                uploadBtn.disabled = false;
            }
        }

        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('show');
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        function showResults() {
            resultsSection.classList.add('show');
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
