<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCIe TLP 解析器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            padding: 20px 30px;
            border-bottom: 2px solid #0f3460;
        }

        .header h1 {
            font-size: 24px;
            color: #e94560;
            margin-bottom: 5px;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
        }

        .sidebar {
            width: 320px;
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #0f3460;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            padding: 15px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b6b;
        }

        .btn-secondary {
            background: #0f3460;
            color: #eee;
            border: 1px solid #1a4a7a;
        }

        .btn-secondary:hover {
            background: #1a4a7a;
        }

        .file-input {
            display: none;
        }

        .file-label {
            padding: 8px 16px;
            background: #0f3460;
            border: 1px dashed #1a4a7a;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .file-label:hover {
            background: #1a4a7a;
        }

        .search-box {
            flex: 1;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #eee;
            font-size: 14px;
        }

        .table-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #0f3460;
            padding: 12px;
            text-align: left;
            position: sticky;
            top: 0;
            font-weight: 600;
            color: #fff;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #0f3460;
        }

        tr:hover {
            background: rgba(15, 52, 96, 0.3);
            cursor: pointer;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-memory {
            background: #4ecdc4;
            color: #000;
        }

        .badge-completion {
            background: #95e1d3;
            color: #000;
        }

        .badge-config {
            background: #f38181;
            color: #000;
        }

        .badge-io {
            background: #aa96da;
            color: #000;
        }

        .badge-message {
            background: #fcbad3;
            color: #000;
        }

        .badge-other {
            background: #888;
            color: #000;
        }

        .stats-panel {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stats-panel h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #e94560;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 13px;
        }

        .stat-value {
            color: #4ecdc4;
            font-weight: 600;
        }

        .detail-panel {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
        }

        .detail-panel h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #e94560;
        }

        .detail-row {
            display: flex;
            padding: 4px 0;
            font-size: 12px;
            border-bottom: 1px solid #0f3460;
        }

        .detail-label {
            width: 120px;
            color: #888;
        }

        .detail-value {
            flex: 1;
            color: #eee;
            word-break: break-all;
        }

        .hex-data {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            background: #0f3460;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .pagination {
            display: flex;
            justify-content: center;
            padding: 15px;
            gap: 10px;
        }

        .pagination button {
            padding: 6px 12px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            color: #eee;
            border-radius: 4px;
            cursor: pointer;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination span {
            padding: 6px 12px;
            color: #888;
        }

        .replay-panel {
            background: #16213e;
            padding: 12px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .replay-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .replay-btn {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            color: #eee;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .replay-btn:hover {
            background: #1a4a7a;
        }

        .replay-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .replay-btn.active {
            background: #e94560;
            border-color: #e94560;
        }

        .replay-progress {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .replay-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #0f3460;
            border-radius: 3px;
            outline: none;
        }

        .replay-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
        }

        .replay-info {
            font-size: 12px;
            color: #888;
            min-width: 100px;
            text-align: right;
        }

        .replay-status {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: #aaa;
        }

        .replay-status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .replay-status-value {
            color: #4ecdc4;
            font-weight: 600;
        }

        .speed-select {
            padding: 6px 10px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            color: #eee;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .highlight-row {
            background: rgba(233, 69, 96, 0.3) !important;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { background: rgba(233, 69, 96, 0.2); }
            50% { background: rgba(233, 69, 96, 0.4); }
        }

        .filter-group {
            display: flex;
            gap: 8px;
        }

        .filter-group select {
            padding: 8px 12px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #eee;
            font-size: 14px;
        }

        .section-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .no-packet {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PCIe TLP 解析器</h1>
        <p>解析 PCIe 逻辑分析仪抓取的 TLP (Transaction Layer Packet) 数据包</p>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="stats-panel">
                <div class="section-title">统计信息</div>
                <div id="stats-container">
                    <div class="stat-item">
                        <span>总包数</span>
                        <span class="stat-value" id="total-packets">0</span>
                    </div>
                    <div id="category-stats"></div>
                </div>
            </div>

            <div class="detail-panel">
                <div class="section-title">数据包详情</div>
                <div id="packet-detail">
                    <div class="no-packet">点击表格中的行查看详情</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="toolbar">
                <label class="file-label">
                    <input type="file" class="file-input" id="fileInput" accept=".bin,.dat,.hex">
                    📁 上传文件
                </label>
                <button class="btn btn-secondary" onclick="loadSample()">🎲 加载示例数据</button>
                <button class="btn btn-secondary" onclick="exportCSV()">📊 导出 CSV</button>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索..." onkeyup="filterPackets()">
                </div>
                <div class="filter-group">
                    <select id="categoryFilter" onchange="filterPackets()">
                        <option value="">所有类型</option>
                        <option value="Memory">Memory</option>
                        <option value="Completion">Completion</option>
                        <option value="Configuration">Configuration</option>
                        <option value="I/O">I/O</option>
                        <option value="Message">Message</option>
                    </select>
                </div>
            </div>

            <div class="replay-panel">
                <div class="replay-controls">
                    <button class="replay-btn" onclick="replayReset()" title="重置">⏮</button>
                    <button class="replay-btn" onclick="replayStepBack()" title="上一个">◀</button>
                    <button class="replay-btn" id="playBtn" onclick="togglePlay()" title="播放/暂停">▶</button>
                    <button class="replay-btn" onclick="replayStep()" title="下一个">▶</button>
                </div>
                <div class="replay-progress">
                    <input type="range" class="replay-slider" id="replaySlider" min="0" max="0" value="0" oninput="replayGoto(this.value)">
                </div>
                <div class="replay-info" id="replayInfo">0 / 0</div>
                <select class="speed-select" id="speedSelect" onchange="setPlaybackSpeed()">
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="5">5x</option>
                    <option value="10">10x</option>
                </select>
            </div>

            <div class="replay-status">
                <div class="replay-status-item">
                    <span>ACK Seq:</span>
                    <span class="replay-status-value" id="ackSeq">0</span>
                </div>
                <div class="replay-status-item">
                    <span>Next Seq:</span>
                    <span class="replay-status-value" id="nextSeq">0</span>
                </div>
                <div class="replay-status-item">
                    <span>缓冲区:</span>
                    <span class="replay-status-value" id="bufferSize">0</span>
                </div>
                <div class="replay-status-item">
                    <span>未完成:</span>
                    <span class="replay-status-value" id="pendingReqs">0</span>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>类型</th>
                            <th>TLP 类型</th>
                            <th>Requester ID</th>
                            <th>Bus:Device:Func</th>
                            <th>地址/寄存器</th>
                            <th>长度</th>
                            <th>Tag</th>
                        </tr>
                    </thead>
                    <tbody id="packetTable">
                        <tr>
                            <td colspan="8">
                            <div class="empty-state">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                <p>上传二进制文件或加载示例数据开始分析</p>
                            </div>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button onclick="prevPage()" id="prevBtn">上一页</button>
                <span id="pageInfo">第 1 页 / 共 1 页</span>
                <button onclick="nextPage()" id="nextBtn">下一页</button>
            </div>
        </div>
    </div>

    <script>
        let allPackets = [];
        let filteredPackets = [];
        let currentPage = 1;
        const pageSize = 50;
        let selectedPacketIndex = -1;
        let replayCurrentIndex = -1;
        let isPlaying = false;
        let playInterval = null;
        let playbackSpeed = 1;

        const fileInput = document.getElementById('fileInput');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                uploadFile(file);
            }
        });

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    allPackets = data.packets;
                    filteredPackets = [...allPackets];
                    currentPage = 1;
                    replayCurrentIndex = -1;
                    updateReplaySlider();
                    renderTable();
                    updateStats();
                } else {
                    alert('解析失败: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('上传失败');
            });
        }

        function loadSample() {
            fetch('/api/sample?count=50')
            .then(response => response.json())
            .then(data => {
                allPackets = data.packets;
                filteredPackets = [...allPackets];
                currentPage = 1;
                replayCurrentIndex = -1;
                updateReplaySlider();
                renderTable();
                updateStats();
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }

        function exportCSV() {
            if (allPackets.length === 0) {
                alert('没有数据可导出');
                return;
            }
            window.location.href = '/api/export/csv';
        }

        function updateReplaySlider() {
            const slider = document.getElementById('replaySlider');
            slider.max = Math.max(0, allPackets.length - 1);
            slider.value = replayCurrentIndex;
            updateReplayInfo();
        }

        function updateReplayInfo() {
            document.getElementById('replayInfo').textContent = 
                `${replayCurrentIndex + 1} / ${allPackets.length}`;
        }

        function updateReplayStatus(status) {
            document.getElementById('ackSeq').textContent = status.ack_sequence || 0;
            document.getElementById('nextSeq').textContent = status.next_sequence || 0;
            document.getElementById('bufferSize').textContent = status.replay_buffer_size || 0;
            document.getElementById('pendingReqs').textContent = status.pending_requests || 0;
        }

        function replayReset() {
            stopPlay();
            fetch('/api/replay/reset', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                replayCurrentIndex = -1;
                updateReplaySlider();
                updateReplayStatus(data.status);
                renderTable();
            });
        }

        function replayStep() {
            fetch('/api/replay/step', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    replayCurrentIndex = data.status.current_index;
                    updateReplaySlider();
                    updateReplayStatus(data.status);
                    scrollToPacket(replayCurrentIndex);
                    renderTable();
                }
            });
        }

        function replayStepBack() {
            fetch('/api/replay/step_back', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    replayCurrentIndex = data.status.current_index;
                    updateReplaySlider();
                    updateReplayStatus(data.status);
                    scrollToPacket(replayCurrentIndex);
                    renderTable();
                }
            });
        }

        function replayGoto(index) {
            fetch('/api/replay/goto', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index: parseInt(index) })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    replayCurrentIndex = data.status.current_index;
                    updateReplaySlider();
                    updateReplayStatus(data.status);
                    scrollToPacket(replayCurrentIndex);
                    renderTable();
                }
            });
        }

        function togglePlay() {
            if (isPlaying) {
                stopPlay();
            } else {
                startPlay();
            }
        }

        function startPlay() {
            if (replayCurrentIndex >= allPackets.length - 1) {
                replayCurrentIndex = -1;
            }
            isPlaying = true;
            document.getElementById('playBtn').classList.add('active');
            document.getElementById('playBtn').textContent = '⏸';
            playInterval = setInterval(() => {
                fetch('/api/replay/step', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        replayCurrentIndex = data.status.current_index;
                        updateReplaySlider();
                        updateReplayStatus(data.status);
                        scrollToPacket(replayCurrentIndex);
                        renderTable();
                    } else {
                        stopPlay();
                    }
                });
            }, 1000 / playbackSpeed);
        }

        function stopPlay() {
            isPlaying = false;
            document.getElementById('playBtn').classList.remove('active');
            document.getElementById('playBtn').textContent = '▶';
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        function setPlaybackSpeed() {
            playbackSpeed = parseFloat(document.getElementById('speedSelect').value);
            if (isPlaying) {
                stopPlay();
                startPlay();
            }
        }

        function scrollToPacket(index) {
            const page = Math.floor(index / pageSize) + 1;
            if (page !== currentPage) {
                currentPage = page;
            }
        }

        function filterPackets() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;

            filteredPackets = allPackets.filter(packet => {
                const matchesSearch = !searchTerm || 
                    packet.tlp_type.toLowerCase().includes(searchTerm) ||
                    (packet.requester_id_hex && packet.requester_id_hex.toLowerCase().includes(searchTerm)) ||
                    (packet.address_hex && packet.address_hex.toLowerCase().includes(searchTerm)) ||
                    (packet.register_hex && packet.register_hex.toLowerCase().includes(searchTerm));

                const matchesCategory = !categoryFilter || packet.category === categoryFilter;

                return matchesSearch && matchesCategory;
            });

            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('packetTable');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pagePackets = filteredPackets.slice(start, end);

            if (pagePackets.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="8"><div class="no-packet">没有找到匹配的数据包</div></td></tr>
                `;
                updatePagination();
                return;
            }

            tbody.innerHTML = pagePackets.map((packet, idx) => {
                const actualIndex = start + idx;
                const badgeClass = `badge-${packet.category.toLowerCase()}`;
                const reqId = packet.requester_id_hex || '-';
                const bdf = packet.bus_number !== undefined 
                    ? `${packet.bus_number}:${packet.device_number}:${packet.function_number}`
                    : (packet.completer_id_hex || '-');
                const addr = packet.address_hex || packet.register_hex || '-';
                const tag = packet.tag !== undefined ? packet.tag : '-';
                const isReplayCurrent = packet.index === replayCurrentIndex;
                const rowClass = isReplayCurrent ? 'highlight-row' : '';
                const rowStyle = selectedPacketIndex === actualIndex ? 'background: rgba(233, 69, 96, 0.2)' : '';

                return `
                    <tr class="${rowClass}" onclick="showDetail(${actualIndex})" style="${rowStyle}">
                        <td>${packet.index}</td>
                        <td><span class="badge ${badgeClass}">${packet.category}</span></td>
                        <td>${packet.tlp_type}</td>
                        <td>${reqId}</td>
                        <td>${bdf}</td>
                        <td>${addr}</td>
                        <td>${packet.length} DW</td>
                        <td>${tag}</td>
                    </tr>
                `;
            }).join('');

            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredPackets.length / pageSize);
            document.getElementById('pageInfo').textContent = `第 ${currentPage} 页 / 共 ${totalPages || 1} 页`;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredPackets.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }

        function updateStats() {
            document.getElementById('total-packets').textContent = allPackets.length;
            
            const stats = {};
            allPackets.forEach(p => {
                stats[p.category] = (stats[p.category] || 0) + 1;
            });

            const categoryStats = document.getElementById('category-stats');
            categoryStats.innerHTML = Object.entries(stats).map(([cat, count]) => `
                <div class="stat-item">
                    <span>${cat}</span>
                    <span class="stat-value">${count}</span>
                </div>
            `).join('');
        }

        function showDetail(index) {
            selectedPacketIndex = index;
            renderTable();

            const packet = filteredPackets[index];
            const detailDiv = document.getElementById('packet-detail');

            let details = `
                <div class="detail-row">
                    <span class="detail-label">索引</span>
                    <span class="detail-value">#${packet.index}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">TLP 类型</span>
                    <span class="detail-value">${packet.tlp_type}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Fmt</span>
                    <span class="detail-value">${packet.fmt_name} (${packet.fmt})</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Type</span>
                    <span class="detail-value">${packet.type_name} (${packet.type})</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">TC</span>
                    <span class="detail-value">${packet.tc}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">TD (Digest)</span>
                    <span class="detail-value">${packet.td ? '1 - 有 ECRC' : '0 - 无'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">EP (Poison)</span>
                    <span class="detail-value">${packet.ep ? '1 - 已污染' : '0 - 正常'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">长度</span>
                    <span class="detail-value">${packet.length} DW (${packet.length_bytes} 字节)</span>
                </div>
            `;

            if (packet.ecrc_hex !== undefined) {
                const validIcon = packet.ecrc_valid ? '✅' : '❌';
                const validText = packet.ecrc_valid ? '校验通过' : '校验失败';
                details += `
                    <div class="detail-row">
                        <span class="detail-label">ECRC</span>
                        <span class="detail-value">${packet.ecrc_hex} ${validIcon} ${validText}</span>
                    </div>
                `;
            }

            if (packet.category === 'Memory') {
                details += `
                    <div class="detail-row">
                        <span class="detail-label">Requester ID</span>
                        <span class="detail-value">${packet.requester_id_hex}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">地址</span>
                        <span class="detail-value">${packet.address_hex}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Tag</span>
                        <span class="detail-value">${packet.tag}</span>
                    </div>
                `;
            } else if (packet.category === 'Completion') {
                const completerBdf = packet.completer_bus !== undefined
                    ? `${packet.completer_bus}:${packet.completer_device}:${packet.completer_function}`
                    : '-';
                details += `
                    <div class="detail-row">
                        <span class="detail-label">Completer ID</span>
                        <span class="detail-value">${packet.completer_id_hex} (小端) [${completerBdf}]</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">状态</span>
                        <span class="detail-value">${packet.status_name}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">字节数</span>
                        <span class="detail-value">${packet.byte_count}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Requester ID</span>
                        <span class="detail-value">${packet.requester_id_hex}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Tag</span>
                        <span class="detail-value">${packet.tag}</span>
                    </div>
                `;
            } else if (packet.category === 'Configuration') {
                details += `
                    <div class="detail-row">
                        <span class="detail-label">Requester ID</span>
                        <span class="detail-value">${packet.requester_id_hex}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">寄存器</span>
                        <span class="detail-value">${packet.register_hex}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Tag</span>
                        <span class="detail-value">${packet.tag}</span>
                    </div>
                `;
            }

            details += `<div class="hex-data">${packet.raw_hex}</div>`;

            detailDiv.innerHTML = details;
        }
    </script>
</body>
</html>
