<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLDAP 管理控制台</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="login-view" class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="logo">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                        </svg>
                    </div>
                    <h1>OpenLDAP 管理控制台</h1>
                    <p class="subtitle">连接并管理您的 LDAP 目录服务</p>
                </div>
                <form id="login-form" class="login-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="host">LDAP 服务器地址</label>
                            <input type="text" id="host" name="host" placeholder="localhost" required>
                        </div>
                        <div class="form-group">
                            <label for="port">端口</label>
                            <input type="number" id="port" name="port" value="389" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="baseDn">Base DN</label>
                        <input type="text" id="baseDn" name="baseDn" placeholder="dc=example,dc=com" required>
                    </div>
                    <div class="form-group">
                        <label for="adminDn">管理员 DN</label>
                        <input type="text" id="adminDn" name="adminDn" placeholder="cn=admin,dc=example,dc=com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">管理员密码</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span class="btn-text">连接并登录</span>
                    </button>
                    <div id="login-error" class="error-message"></div>
                </form>
            </div>
        </div>

        <div id="main-view" class="main-container hidden">
            <header class="app-header">
                <div class="header-left">
                    <div class="logo-small">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                        </svg>
                    </div>
                    <h1>LDAP 管理控制台</h1>
                </div>
                <div class="header-right">
                    <div class="connection-info">
                        <span class="status-dot"></span>
                        <span id="connection-status">已连接</span>
                    </div>
                    <button id="logout-btn" class="btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        退出
                    </button>
                </div>
            </header>

            <div class="app-content">
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h2>目录树</h2>
                        <button id="refresh-tree-btn" class="btn-icon" title="刷新">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                        </button>
                    </div>
                    <div id="directory-tree" class="directory-tree"></div>
                </aside>

                <main class="content">
                    <div class="content-header">
                        <div>
                            <h2 id="current-ou-title">用户列表</h2>
                            <p id="current-ou-dn" class="text-muted"></p>
                        </div>
                        <div class="content-actions">
                            <button id="add-user-btn" class="btn-primary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="8.5" cy="7" r="4"></circle>
                                    <line x1="20" y1="8" x2="20" y2="14"></line>
                                    <line x1="23" y1="11" x2="17" y2="11"></line>
                                </svg>
                                新增用户
                            </button>
                            <button id="import-ldif-btn" class="btn-secondary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                导入LDIF
                            </button>
                            <button id="export-ldif-btn" class="btn-secondary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                导出LDIF
                            </button>
                            <button id="refresh-users-btn" class="btn-secondary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="23 4 23 10 17 10"></polyline>
                                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                                </svg>
                                刷新
                            </button>
                        </div>
                    </div>

                    <div class="table-container">
                        <div class="table-wrapper">
                            <table class="users-table">
                                <thead>
                                    <tr>
                                        <th>UID</th>
                                        <th>姓名</th>
                                        <th>邮箱</th>
                                        <th>电话</th>
                                        <th>DN</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                            </table>
                            <div id="virtual-scroll-container" class="virtual-scroll-container">
                                <div id="virtual-scroll-spacer" class="virtual-scroll-spacer"></div>
                                <div id="users-table-body" class="virtual-scroll-body"></div>
                            </div>
                        </div>
                        <div id="empty-state" class="empty-state hidden">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            <p>请选择一个组织单元以查看用户</p>
                        </div>
                        <div id="loading-indicator" class="loading-indicator hidden">
                            <div class="spinner"></div>
                            <span>加载中...</span>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <div id="user-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">新增用户</h3>
                    <button class="modal-close" id="modal-close-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="user-form">
                        <input type="hidden" id="user-dn">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="user-uid">UID *</label>
                                <input type="text" id="user-uid" name="uid" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="user-cn">Common Name (cn) *</label>
                                <input type="text" id="user-cn" name="cn" required>
                            </div>
                            <div class="form-group">
                                <label for="user-sn">Surname (sn) *</label>
                                <input type="text" id="user-sn" name="sn" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="user-givenName">Given Name</label>
                            <input type="text" id="user-givenName" name="givenName">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="user-mail">邮箱</label>
                                <input type="email" id="user-mail" name="mail">
                            </div>
                            <div class="form-group">
                                <label for="user-telephoneNumber">电话</label>
                                <input type="text" id="user-telephoneNumber" name="telephoneNumber">
                            </div>
                        </div>
                        <div id="password-section">
                            <div class="form-group">
                                <label for="user-password">密码 *</label>
                                <input type="password" id="user-password" name="userPassword">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="modal-cancel-btn">取消</button>
                    <button type="button" class="btn-primary" id="modal-save-btn">保存</button>
                </div>
            </div>
        </div>

        <div id="ldif-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content modal-large">
                <div class="modal-header">
                    <h3 id="ldif-modal-title">导入LDIF文件</h3>
                    <button class="modal-close" id="ldif-modal-close-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="ldif-upload-area">
                        <input type="file" id="ldif-file-input" accept=".ldif,.txt" style="display: none;">
                        <div class="ldif-drop-zone" id="ldif-drop-zone">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p>点击或拖拽 LDIF 文件到此处</p>
                            <p class="text-muted">支持 .ldif 和 .txt 格式</p>
                            <button type="button" class="btn-secondary" id="ldif-browse-btn">选择文件</button>
                        </div>
                        <div id="ldif-file-info" class="ldif-file-info hidden">
                            <span id="ldif-file-name"></span>
                            <button type="button" class="btn-icon" id="ldif-remove-file" title="移除">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="ldif-content">或粘贴LDIF内容</label>
                        <textarea id="ldif-content" class="ldif-textarea" rows="12" placeholder="dn: uid=user1,ou=people,dc=example,dc=com&#10;objectClass: inetOrgPerson&#10;objectClass: organizationalPerson&#10;objectClass: person&#10;objectClass: top&#10;uid: user1&#10;cn: User One&#10;sn: One&#10;givenName: User&#10;mail: user1@example.com"></textarea>
                    </div>
                    <div id="ldif-result" class="ldif-result hidden">
                        <div class="ldif-result-summary" id="ldif-result-summary"></div>
                        <div class="ldif-result-details" id="ldif-result-details"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="ldif-modal-cancel-btn">取消</button>
                    <button type="button" class="btn-primary" id="ldif-modal-import-btn">开始导入</button>
                </div>
            </div>
        </div>

        <div id="password-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3>重置密码</h3>
                    <button class="modal-close" id="password-modal-close-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <p id="password-user-info" class="text-muted"></p>
                    <form id="password-form">
                        <input type="hidden" id="password-user-dn">
                        <div class="form-group">
                            <label for="new-password">新密码 *</label>
                            <input type="password" id="new-password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">确认密码 *</label>
                            <input type="password" id="confirm-password" required>
                        </div>
                        <div id="password-error" class="error-message"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="password-modal-cancel-btn">取消</button>
                    <button type="button" class="btn-primary" id="password-modal-save-btn">重置密码</button>
                </div>
            </div>
        </div>

        <div id="toast" class="toast hidden">
            <div class="toast-content">
                <span id="toast-message"></span>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
