<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期权定价系统 - Option Pricing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            font-weight: 600;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .result-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #666;
            font-weight: 500;
        }

        .result-value {
            color: #333;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .price-highlight {
            font-size: 2rem;
            color: #667eea;
            font-weight: 700;
        }

        .ci-range {
            color: #28a745;
            font-weight: 600;
        }

        .multi-asset-container {
            margin-bottom: 20px;
        }

        .asset-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
        }

        .asset-card h3 {
            color: #555;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-asset {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .add-asset-btn {
            width: 100%;
            padding: 15px;
            border: 2px dashed #667eea;
            border-radius: 10px;
            background: transparent;
            color: #667eea;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-asset-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .multi-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-table th {
            background: #f5f5f5;
            color: #333;
            font-weight: 600;
        }

        .history-table tr:hover {
            background: #f9f9f9;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffe6e6;
            color: #c0392b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .success.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 期权定价系统</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('single')">单标的定价</button>
            <button class="tab-btn" onclick="switchTab('multi')">多标的定价</button>
            <button class="tab-btn" onclick="switchTab('history')">定价历史</button>
        </div>

        <div id="single" class="tab-content active">
            <div class="card">
                <h2>参数设置</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>标的名称</label>
                        <input type="text" id="underlying_name" value="AAPL">
                    </div>
                    <div class="form-group">
                        <label>期权类型</label>
                        <select id="option_type">
                            <option value="call">看涨 Call</option>
                            <option value="put">看跌 Put</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>期权风格</label>
                        <select id="option_style">
                            <option value="european">欧式期权</option>
                            <option value="american">美式期权</option>
                            <option value="asian">亚式期权</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>当前价格 S0</label>
                        <input type="number" id="S0" value="100" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>行权价 K</label>
                        <input type="number" id="K" value="105" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>到期时间 T (年)</label>
                        <input type="number" id="T" value="1" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>无风险利率 r</label>
                        <input type="number" id="r" value="0.05" step="0.001">
                    </div>
                    <div class="form-group">
                        <label>波动率 σ</label>
                        <input type="number" id="sigma" value="0.2" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>模拟路径数</label>
                        <input type="number" id="num_paths" value="100000" step="1000">
                    </div>
                    <div class="form-group">
                        <label>时间步数 (亚式)</label>
                        <input type="number" id="num_steps" value="252" step="1">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="priceSingleOption()">计算价格</button>
                    <button class="btn btn-secondary" onclick="exportSingleReport()">导出报告</button>
                    <button class="btn btn-secondary" onclick="resetSingleForm()">重置</button>
                </div>

                <div class="loading" id="single-loading">
                    <div class="spinner"></div>
                    <p>正在进行蒙特卡洛模拟...</p>
                </div>

                <div class="error" id="single-error"></div>

                <div class="result-box" id="single-result" style="display: none;">
                    <h3>定价结果</h3>
                    <div class="result-item">
                        <span class="result-label">期权价格:</span>
                        <span class="result-value price-highlight" id="result-price"></span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">95% 置信区间:</span>
                        <span class="result-value ci-range" id="result-ci"></span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">标准误差:</span>
                        <span class="result-value" id="result-stderr"></span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">计算耗时:</span>
                        <span class="result-value" id="result-time"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="multi" class="tab-content">
            <div class="card">
                <h2>多标的定价</h2>
                <div class="multi-asset-container" id="multi-assets"></div>
                <button class="add-asset-btn" onclick="addAsset()">+ 添加标的</button>
                <br><br>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="priceMultiOptions()">批量计算</button>
                    <button class="btn btn-secondary" onclick="exportMultiReport()">导出报告</button>
                </div>

                <div class="loading" id="multi-loading">
                    <div class="spinner"></div>
                    <p>正在进行多标的蒙特卡洛模拟...</p>
                </div>

                <div class="error" id="multi-error"></div>

                <div class="multi-results" id="multi-results"></div>
            </div>
        </div>

        <div id="history" class="tab-content">
            <div class="card">
                <h2>定价历史</h2>
                <div class="btn-group" style="margin-bottom: 20px;">
                    <div class="form-group" style="max-width: 300px; margin-bottom: 0;">
                        <label>筛选标的 (可选)</label>
                        <input type="text" id="history-filter" placeholder="输入标的名称">
                    </div>
                    <button class="btn btn-secondary" onclick="loadHistory()">查询</button>
                    <button class="btn btn-secondary" onclick="exportHistoryReport()">导出全部</button>
                </div>
                
                <div class="loading" id="history-loading">
                    <div class="spinner"></div>
                    <p>加载历史记录...</p>
                </div>

                <table class="history-table" id="history-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>标的</th>
                            <th>类型</th>
                            <th>风格</th>
                            <th>S0</th>
                            <th>K</th>
                            <th>T</th>
                            <th>σ</th>
                            <th>价格</th>
                            <th>耗时</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let assetCount = 0;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            
            if (tabId === 'history') {
                loadHistory();
            }
        }

        function addAsset() {
            assetCount++;
            const container = document.getElementById('multi-assets');
            const card = document.createElement('div');
            card.className = 'asset-card';
            card.id = `asset-${assetCount}`;
            card.innerHTML = `
                <h3>
                    <span>标的 #${assetCount}</span>
                    <button class="remove-asset" onclick="removeAsset(${assetCount})">删除</button>
                </h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>标的名称</label>
                        <input type="text" class="ma-underlying_name" value="Asset${assetCount}">
                    </div>
                    <div class="form-group">
                        <label>期权类型</label>
                        <select class="ma-option_type">
                            <option value="call">看涨 Call</option>
                            <option value="put">看跌 Put</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>期权风格</label>
                        <select class="ma-option_style">
                            <option value="european">欧式</option>
                            <option value="american">美式</option>
                            <option value="asian">亚式</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>当前价格 S0</label>
                        <input type="number" class="ma-S0" value="100" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>行权价 K</label>
                        <input type="number" class="ma-K" value="105" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>到期时间 T</label>
                        <input type="number" class="ma-T" value="1" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>无风险利率 r</label>
                        <input type="number" class="ma-r" value="0.05" step="0.001">
                    </div>
                    <div class="form-group">
                        <label>波动率 σ</label>
                        <input type="number" class="ma-sigma" value="0.2" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>路径数</label>
                        <input type="number" class="ma-num_paths" value="100000" step="1000">
                    </div>
                    <div class="form-group">
                        <label>时间步数</label>
                        <input type="number" class="ma-num_steps" value="252" step="1">
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        function removeAsset(id) {
            const asset = document.getElementById(`asset-${id}`);
            if (asset) asset.remove();
        }

        async function priceSingleOption() {
            document.getElementById('single-loading').classList.add('show');
            document.getElementById('single-error').classList.remove('show');
            document.getElementById('single-result').style.display = 'none';

            const data = {
                underlying_name: document.getElementById('underlying_name').value,
                option_type: document.getElementById('option_type').value,
                option_style: document.getElementById('option_style').value,
                S0: parseFloat(document.getElementById('S0').value),
                K: parseFloat(document.getElementById('K').value),
                T: parseFloat(document.getElementById('T').value),
                r: parseFloat(document.getElementById('r').value),
                sigma: parseFloat(document.getElementById('sigma').value),
                num_paths: parseInt(document.getElementById('num_paths').value),
                num_steps: parseInt(document.getElementById('num_steps').value)
            };

            try {
                const response = await fetch('/api/price/single', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('result-price').textContent = result.price.toFixed(4);
                    document.getElementById('result-ci').textContent = 
                        `[${result.ci_lower.toFixed(4)}, ${result.ci_upper.toFixed(4)}]`;
                    document.getElementById('result-stderr').textContent = result.std_error.toFixed(6);
                    document.getElementById('result-time').textContent = result.time_taken.toFixed(4) + ' 秒';
                    document.getElementById('single-result').style.display = 'block';
                } else {
                    throw new Error(result.detail || '计算失败');
                }
            } catch (error) {
                document.getElementById('single-error').textContent = '错误: ' + error.message;
                document.getElementById('single-error').classList.add('show');
            } finally {
                document.getElementById('single-loading').classList.remove('show');
            }
        }

        function resetSingleForm() {
            document.getElementById('underlying_name').value = 'AAPL';
            document.getElementById('option_type').value = 'call';
            document.getElementById('option_style').value = 'european';
            document.getElementById('S0').value = '100';
            document.getElementById('K').value = '105';
            document.getElementById('T').value = '1';
            document.getElementById('r').value = '0.05';
            document.getElementById('sigma').value = '0.2';
            document.getElementById('num_paths').value = '100000';
            document.getElementById('num_steps').value = '252';
            document.getElementById('single-result').style.display = 'none';
            document.getElementById('single-error').classList.remove('show');
        }

        async function priceMultiOptions() {
            const assets = document.querySelectorAll('.asset-card');
            if (assets.length === 0) {
                alert('请至少添加一个标的');
                return;
            }

            document.getElementById('multi-loading').classList.add('show');
            document.getElementById('multi-error').classList.remove('show');
            document.getElementById('multi-results').innerHTML = '';

            const options = [];
            assets.forEach(asset => {
                options.push({
                    underlying_name: asset.querySelector('.ma-underlying_name').value,
                    option_type: asset.querySelector('.ma-option_type').value,
                    option_style: asset.querySelector('.ma-option_style').value,
                    S0: parseFloat(asset.querySelector('.ma-S0').value),
                    K: parseFloat(asset.querySelector('.ma-K').value),
                    T: parseFloat(asset.querySelector('.ma-T').value),
                    r: parseFloat(asset.querySelector('.ma-r').value),
                    sigma: parseFloat(asset.querySelector('.ma-sigma').value),
                    num_paths: parseInt(asset.querySelector('.ma-num_paths').value),
                    num_steps: parseInt(asset.querySelector('.ma-num_steps').value)
                });
            });

            try {
                const response = await fetch('/api/price/multi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ options })
                });

                const result = await response.json();
                
                if (response.ok) {
                    const resultsHtml = result.results.map(r => `
                        <div class="result-box">
                            <h3>${r.underlying_name} (${r.option_style} ${r.option_type})</h3>
                            <div class="result-item">
                                <span class="result-label">价格:</span>
                                <span class="result-value price-highlight">${r.price.toFixed(4)}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">95% CI:</span>
                                <span class="result-value ci-range">[${r.ci_lower.toFixed(4)}, ${r.ci_upper.toFixed(4)}]</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">耗时:</span>
                                <span class="result-value">${r.time_taken.toFixed(4)}s</span>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('multi-results').innerHTML = resultsHtml;
                } else {
                    throw new Error(result.detail || '计算失败');
                }
            } catch (error) {
                document.getElementById('multi-error').textContent = '错误: ' + error.message;
                document.getElementById('multi-error').classList.add('show');
            } finally {
                document.getElementById('multi-loading').classList.remove('show');
            }
        }

        async function loadHistory() {
            document.getElementById('history-loading').classList.add('show');
            const filter = document.getElementById('history-filter').value;
            const url = filter ? `/api/history?underlying_name=${encodeURIComponent(filter)}` : '/api/history';
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const tbody = document.getElementById('history-body');
                tbody.innerHTML = data.records.map(r => `
                    <tr>
                        <td>${new Date(r.created_at).toLocaleString()}</td>
                        <td>${r.underlying_name}</td>
                        <td>${r.option_type}</td>
                        <td>${r.option_style}</td>
                        <td>${r.S0}</td>
                        <td>${r.K}</td>
                        <td>${r.T}</td>
                        <td>${r.sigma}</td>
                        <td><strong>${r.price.toFixed(4)}</strong></td>
                        <td>${r.time_taken.toFixed(3)}s</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载历史失败:', error);
            } finally {
                document.getElementById('history-loading').classList.remove('show');
            }
        }

        function getSingleOptionData() {
            return {
                underlying_name: document.getElementById('underlying_name').value,
                option_type: document.getElementById('option_type').value,
                option_style: document.getElementById('option_style').value,
                S0: parseFloat(document.getElementById('S0').value),
                K: parseFloat(document.getElementById('K').value),
                T: parseFloat(document.getElementById('T').value),
                r: parseFloat(document.getElementById('r').value),
                sigma: parseFloat(document.getElementById('sigma').value),
                num_paths: parseInt(document.getElementById('num_paths').value),
                num_steps: parseInt(document.getElementById('num_steps').value)
            };
        }

        async function exportSingleReport() {
            const data = getSingleOptionData();
            const response = await fetch('/api/report/single', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `option_pricing_report_${Date.now()}.csv`;
                a.click();
                window.URL.revokeObjectURL(url);
            }
        }

        function getMultiOptionsData() {
            const assets = document.querySelectorAll('.asset-card');
            const options = [];
            assets.forEach(asset => {
                options.push({
                    underlying_name: asset.querySelector('.ma-underlying_name').value,
                    option_type: asset.querySelector('.ma-option_type').value,
                    option_style: asset.querySelector('.ma-option_style').value,
                    S0: parseFloat(asset.querySelector('.ma-S0').value),
                    K: parseFloat(asset.querySelector('.ma-K').value),
                    T: parseFloat(asset.querySelector('.ma-T').value),
                    r: parseFloat(asset.querySelector('.ma-r').value),
                    sigma: parseFloat(asset.querySelector('.ma-sigma').value),
                    num_paths: parseInt(asset.querySelector('.ma-num_paths').value),
                    num_steps: parseInt(asset.querySelector('.ma-num_steps').value)
                });
            });
            return options;
        }

        async function exportMultiReport() {
            const options = getMultiOptionsData();
            if (options.length === 0) {
                alert('请至少添加一个标的');
                return;
            }
            
            const response = await fetch('/api/report/multi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ options })
            });
            
            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `multi_option_pricing_report_${Date.now()}.csv`;
                a.click();
                window.URL.revokeObjectURL(url);
            }
        }

        async function exportHistoryReport() {
            const filter = document.getElementById('history-filter').value;
            const url = filter ? 
                `/api/report/history?underlying_name=${encodeURIComponent(filter)}` : 
                '/api/report/history';
            
            const response = await fetch(url);
            
            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pricing_history_report_${Date.now()}.csv`;
                a.click();
                window.URL.revokeObjectURL(url);
            }
        }

        addAsset();
    </script>
</body>
</html>
