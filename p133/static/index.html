<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PCI Config Space Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jstree@3.3.16/dist/themes/default/style.min.css">
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a21;
      --panel-2: #1d2230;
      --border: #2b3242;
      --fg: #e4e7ee;
      --muted: #8a93a6;
      --accent: #4c9aff;
      --danger: #ff4d4f;
      --ok: #28c76f;
      --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
                 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    header { padding: 12px 20px; border-bottom: 1px solid var(--border);
             display: flex; align-items: center; justify-content: space-between;
             background: var(--panel); }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
    header .meta { color: var(--muted); font-size: 12px; display: flex; gap: 12px; align-items: center; }
    header .meta button { background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
                          padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .app { display: grid; grid-template-columns: 360px 1fr; height: calc(100% - 49px); }
    .tree { background: var(--panel); border-right: 1px solid var(--border);
            overflow: auto; padding: 10px; }
    .tree .jstree-default .jstree-anchor { color: var(--fg); }
    .tree .jstree-default .jstree-clicked { background: var(--panel-2);
            box-shadow: inset 0 0 0 1px var(--border); border-radius: 4px; }
    .content { overflow: auto; padding: 20px; }
    .empty { color: var(--muted); font-size: 13px; padding: 40px; text-align: center; }
    h2 { margin: 0 0 12px 0; font-size: 18px; }
    h3 { margin: 24px 0 8px 0; font-size: 14px; color: var(--muted);
         text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
    table.kv { border-collapse: collapse; width: 100%; max-width: 720px; font-size: 13px; }
    table.kv th, table.kv td { padding: 6px 10px; border-bottom: 1px solid var(--border);
                               text-align: left; vertical-align: top; }
    table.kv th { color: var(--muted); font-weight: 500; width: 200px; }
    table.kv td { font-family: var(--mono); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px;
             font-size: 11px; background: var(--panel-2); color: var(--muted);
             border: 1px solid var(--border); }
    .badge.ok { color: var(--ok); border-color: var(--ok); background: transparent; }
    .badge.warn { color: #ff9f43; border-color: #ff9f43; background: transparent; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .row > * { margin: 0; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .tabs button { background: transparent; border: 0; color: var(--muted);
                   padding: 8px 14px; cursor: pointer; font-size: 13px;
                   border-bottom: 2px solid transparent; }
    .tabs button.active { color: var(--fg); border-bottom-color: var(--accent); }
    .hex { font-family: var(--mono); font-size: 12px; white-space: pre-wrap;
           background: var(--panel-2); padding: 12px; border-radius: 6px;
           border: 1px solid var(--border); overflow: auto; max-height: 360px; }
    form.inject { display: grid; grid-template-columns: 1fr auto; gap: 8px;
                  max-width: 480px; margin-top: 12px; padding: 12px;
                  background: var(--panel-2); border: 1px solid var(--border);
                  border-radius: 6px; }
    form.inject label { font-size: 12px; color: var(--muted); }
    form.inject select, form.inject input {
      background: var(--bg); color: var(--fg); border: 1px solid var(--border);
      padding: 6px 8px; font-family: var(--mono); font-size: 12px; border-radius: 4px;
    }
    button.primary {
      background: var(--accent); color: white; border: 0; padding: 6px 14px;
      border-radius: 4px; font-size: 13px; cursor: pointer;
    }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    button.danger {
      background: var(--danger); color: white; border: 0; padding: 6px 14px;
      border-radius: 4px; font-size: 13px; cursor: pointer;
    }
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 14px;
             border-radius: 6px; font-size: 13px; z-index: 100;
             background: var(--panel-2); border: 1px solid var(--border); }
    .toast.ok { border-color: var(--ok); color: var(--ok); }
    .toast.err { border-color: var(--danger); color: var(--danger); }
    details { margin: 4px 0; }
    details > summary { cursor: pointer; color: var(--muted); font-size: 12px;
                        padding: 4px 0; user-select: none; }
    pre.small { font-size: 12px; margin: 0; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>PCI Config Space Browser</h1>
    <div class="meta" id="meta">
      <span id="meta-text">loading…</span>
      <button id="export-btn">Export JSON</button>
      <button id="refresh-btn">Refresh</button>
    </div>
  </header>

  <div class="app">
    <div class="tree" id="tree"></div>
    <div class="content" id="content">
      <div class="empty">Select a PCI function on the left to view its config space.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jstree@3.3.16/dist/jstree.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
