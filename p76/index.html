<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全景图拼接工具 - SIFT特征匹配</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      font-size: 14px;
      color: #888;
      margin-top: 5px;
    }

    .toolbar {
      display: flex;
      gap: 15px;
      padding: 20px 30px;
      background: rgba(0, 0, 0, 0.2);
      align-items: center;
      flex-wrap: wrap;
    }

    .options-group {
      display: flex;
      gap: 20px;
      margin-left: auto;
      align-items: center;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #aaa;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #00d4ff;
    }

    .checkbox-label:hover {
      color: #fff;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .btn-success:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .main-content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px 30px;
      overflow: hidden;
    }

    .panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .panel-content {
      flex: 1;
      padding: 20px;
      overflow: auto;
      position: relative;
    }

    .image-thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
    }

    .thumb {
      width: 80px;
      height: 60px;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .thumb:hover {
      border-color: #00d4ff;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .canvas-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    canvas {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .progress-panel {
      grid-column: 1 / -1;
      height: 120px;
    }

    .progress-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .progress-item {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .progress-bar {
      flex: 1;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .status-text {
      font-size: 14px;
      color: #aaa;
    }

    .status-text.active {
      color: #00d4ff;
    }

    .status-text.complete {
      color: #10b981;
    }

    .image-count {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
    }

    .step-indicator {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .step {
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      font-size: 12px;
      color: #666;
      transition: all 0.3s ease;
    }

    .step.active {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
    }

    .step.complete {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }

    .result-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <header>
    <h1>🎨 全景图拼接工具</h1>
    <p>基于 SIFT 特征匹配 + OpenCV 的图像拼接</p>
  </header>

  <div class="toolbar">
    <button class="btn btn-primary" id="selectImagesBtn">
      <span>📷</span> 选择图片/视频
    </button>
    <button class="btn btn-success" id="startBtn" disabled>
      <span>🔮</span> 开始拼接
    </button>
    <button class="btn btn-primary" id="exportBtn" disabled>
      <span>💾</span> 导出结果
    </button>
    <span class="image-count" id="imageCount">已选择: 0 张</span>
    
    <div class="options-group">
      <label class="checkbox-label">
        <input type="checkbox" id="useBundleAdjustment" checked>
        光束法平差优化
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="exportLayers">
        导出图层
      </label>
    </div>
  </div>

  <div class="main-content">
    <div class="panel">
      <div class="panel-header">
        <h2>原始图片</h2>
      </div>
      <div class="panel-content" id="sourcePanel">
        <div class="empty-state" id="sourceEmpty">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
          </svg>
          <p>请点击"选择图片"添加图片</p>
        </div>
        <div class="image-thumbs" id="imageThumbs"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>特征匹配预览</h2>
      </div>
      <div class="panel-content">
        <div class="canvas-container">
          <canvas id="matchCanvas"></canvas>
        </div>
      </div>
    </div>

    <div class="panel progress-panel">
      <div class="panel-header">
        <h2>拼接进度</h2>
      </div>
      <div class="panel-content progress-content">
        <div class="progress-item">
          <span class="status-text" id="statusText">等待开始...</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="step-indicator" id="stepIndicator">
          <div class="step" data-step="detect">特征提取</div>
          <div class="step" data-step="match">特征匹配</div>
          <div class="step" data-step="homography">单应性矩阵</div>
          <div class="step" data-step="warp">图像变换</div>
          <div class="step" data-step="blend">融合拼接</div>
        </div>
      </div>
    </div>

    <div class="panel" style="grid-column: 1 / -1; height: 400px;">
      <div class="panel-header">
        <h2>拼接结果</h2>
      </div>
      <div class="panel-content">
        <div class="canvas-container" id="resultContainer">
          <div class="empty-state" id="resultEmpty">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
            </svg>
            <p>拼接完成后结果将显示在这里</p>
          </div>
          <img id="resultImage" class="result-image" style="display: none;" />
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
