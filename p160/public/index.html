<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLNA 媒体服务器</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                        <line x1="4" y1="22" x2="4" y2="15"></line>
                    </svg>
                    <h1 id="serverName">DLNA 媒体服务器</h1>
                </div>
                <div class="header-actions">
                    <div class="stats" id="stats">
                        <span class="stat-item">
                            <span class="stat-icon">🎬</span>
                            <span id="videoCount">0</span>
                        </span>
                        <span class="stat-item">
                            <span class="stat-icon">🎵</span>
                            <span id="audioCount">0</span>
                        </span>
                        <span class="stat-item">
                            <span class="stat-icon">🖼️</span>
                            <span id="imageCount">0</span>
                        </span>
                    </div>
                    <button class="btn btn-primary" id="scanBtn" onclick="rescan()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6"></path>
                            <path d="M1 20v-6h6"></path>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"></path>
                            <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"></path>
                        </svg>
                        重新扫描
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="toolbar">
                <div class="filter-tabs">
                    <button class="tab-btn active" data-type="all" onclick="filterByType('all')">
                        <span class="tab-icon">📁</span>
                        全部
                        <span class="tab-count" id="countAll">0</span>
                    </button>
                    <button class="tab-btn" data-type="video" onclick="filterByType('video')">
                        <span class="tab-icon">🎬</span>
                        视频
                        <span class="tab-count" id="countVideo">0</span>
                    </button>
                    <button class="tab-btn" data-type="audio" onclick="filterByType('audio')">
                        <span class="tab-icon">🎵</span>
                        音频
                        <span class="tab-count" id="countAudio">0</span>
                    </button>
                    <button class="tab-btn" data-type="image" onclick="filterByType('image')">
                        <span class="tab-icon">🖼️</span>
                        图片
                        <span class="tab-count" id="countImage">0</span>
                    </button>
                </div>
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索媒体文件..." oninput="handleSearch(this.value)">
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在加载媒体库...</p>
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">📭</div>
                <h3>没有找到媒体文件</h3>
                <p>请检查扫描路径或点击"重新扫描"按钮</p>
            </div>

            <div class="media-grid" id="mediaGrid"></div>

            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <div class="modal" id="modal" style="display: none;">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>DLNA Media Server | 运行在 <span id="serverAddress">-</span></p>
        </div>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
