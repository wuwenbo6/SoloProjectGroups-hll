<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三相电压监测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #2a5298;
        }
        
        .card .unit {
            font-size: 1rem;
            color: #999;
            margin-left: 5px;
        }
        
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .chart-card h2 {
            color: #2a5298;
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        
        .chart-wrapper {
            height: 300px;
            position: relative;
        }
        
        .phase-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 15px;
        }
        
        .phase-item {
            text-align: center;
        }
        
        .phase-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            position: relative;
        }
        
        .phase-a { background: conic-gradient(#e74c3c 0deg, #e74c3c var(--deg), #ecf0f1 var(--deg)); }
        .phase-b { background: conic-gradient(#3498db 0deg, #3498db var(--deg), #ecf0f1 var(--deg)); }
        .phase-c { background: conic-gradient(#2ecc71 0deg, #2ecc71 var(--deg), #ecf0f1 var(--deg)); }
        
        .phase-circle-inner {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #2a5298;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e3c72;
        }
        
        .btn-success {
            background: #2ecc71;
            color: white;
        }
        
        .btn-success:hover {
            background: #27ae60;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .btn-warning:hover {
            background: #e67e22;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .harmonic-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .harmonic-table th, .harmonic-table td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        
        .harmonic-table th {
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
        }
        
        .thd-value {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .status-bar {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2ecc71;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ 三相电压监测系统</h1>
        
        <div class="dashboard">
            <div class="card">
                <h3>频率</h3>
                <div class="value"><span id="frequency">50.00</span><span class="unit">Hz</span></div>
            </div>
            <div class="card">
                <h3>A相 THD</h3>
                <div class="value thd-value"><span id="thd-a">0.00</span><span class="unit">%</span></div>
            </div>
            <div class="card">
                <h3>闪变 Pst</h3>
                <div class="value" style="color: #e67e22"><span id="pst-value">0.00</span><span class="unit"></span></div>
            </div>
            <div class="card">
                <h3>间谐波数</h3>
                <div class="value" style="color: #9b59b6"><span id="interharmonic-count">0</span><span class="unit">个</span></div>
            </div>
        </div>
        
        <div class="charts-container">
            <div class="chart-card">
                <h2>📊 实时波形</h2>
                <div class="chart-wrapper">
                    <canvas id="waveformChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h2>📈 频谱分析</h2>
                <div class="chart-wrapper">
                    <canvas id="spectrumChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="charts-container">
            <div class="chart-card">
                <h2>🔄 相位显示</h2>
                <div class="phase-display">
                    <div class="phase-item">
                        <div class="phase-circle phase-a" id="phase-a-circle" style="--deg: 0deg">
                            <div class="phase-circle-inner">A</div>
                        </div>
                        <div><span id="phase-a-angle">0.00</span>°</div>
                    </div>
                    <div class="phase-item">
                        <div class="phase-circle phase-b" id="phase-b-circle" style="--deg: 0deg">
                            <div class="phase-circle-inner">B</div>
                        </div>
                        <div><span id="phase-b-angle">0.00</span>°</div>
                    </div>
                    <div class="phase-item">
                        <div class="phase-circle phase-c" id="phase-c-circle" style="--deg: 0deg">
                            <div class="phase-circle-inner">C</div>
                        </div>
                        <div><span id="phase-c-angle">0.00</span>°</div>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <strong>相位差 AB: <span id="phase-diff-ab">120.00</span>°</strong> |
                    <strong> BC: <span id="phase-diff-bc">120.00</span>°</strong> |
                    <strong> CA: <span id="phase-diff-ca">120.00</span>°</strong>
                </div>
            </div>
            
            <div class="chart-card">
                <h2>📋 谐波含量</h2>
                <div style="max-height: 250px; overflow-y: auto;">
                    <table class="harmonic-table">
                        <thead>
                            <tr>
                                <th>谐波次数</th>
                                <th>A相 (%)</th>
                                <th>B相 (%)</th>
                                <th>C相 (%)</th>
                            </tr>
                        </thead>
                        <tbody id="harmonic-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="startMonitoring()">▶ 开始监测</button>
            <button class="btn btn-danger" onclick="stopMonitoring()">⏹ 停止监测</button>
            <button class="btn btn-success" onclick="saveRecord()">💾 保存记录</button>
            <button class="btn btn-warning" onclick="exportComtrade()">📤 导出COMTRADE</button>
            <button class="btn" style="background: #9b59b6; color: white" onclick="exportReportHTML()">📄 HTML报告</button>
            <button class="btn" style="background: #34495e; color: white" onclick="exportReportJSON()">📋 JSON报告</button>
            <button class="btn btn-danger" onclick="resetSystem()">🔄 重置系统</button>
        </div>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-indicator"></div>
                <span>系统状态: <strong id="system-status">就绪</strong></span>
            </div>
            <div class="status-item">
                <span>运行时间: <strong id="run-time">00:00:00</strong></span>
            </div>
            <div class="status-item">
                <span>采样率: <strong>1000 Hz</strong></span>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let updateInterval = null;
        let startTime = null;
        let updateCount = 0;
        let waveformChart, spectrumChart;
        let waveformData = { time: [], phase_a: [], phase_b: [], phase_c: [] };
        
        function initCharts() {
            const waveformCtx = document.getElementById('waveformChart').getContext('2d');
            waveformChart = new Chart(waveformCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'A相', data: [], borderColor: '#e74c3c', borderWidth: 2, fill: false, pointRadius: 0 },
                        { label: 'B相', data: [], borderColor: '#3498db', borderWidth: 2, fill: false, pointRadius: 0 },
                        { label: 'C相', data: [], borderColor: '#2ecc71', borderWidth: 2, fill: false, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: '时间 (s)' } },
                        y: { title: { display: true, text: '电压 (V)' } }
                    },
                    animation: { duration: 0 }
                }
            });
            
            const spectrumCtx = document.getElementById('spectrumChart').getContext('2d');
            spectrumChart = new Chart(spectrumCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'A相', data: [], backgroundColor: 'rgba(231, 76, 60, 0.7)' },
                        { label: 'B相', data: [], backgroundColor: 'rgba(52, 152, 219, 0.7)' },
                        { label: 'C相', data: [], backgroundColor: 'rgba(46, 204, 113, 0.7)' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: '频率 (Hz)' } },
                        y: { title: { display: true, text: '幅值' } }
                    }
                }
            });
        }
        
        async function updateData() {
            try {
                const response = await fetch('/api/realtime?n=100');
                const data = await response.json();
                
                waveformData.time.push(...data.time);
                waveformData.phase_a.push(...data.phase_a);
                waveformData.phase_b.push(...data.phase_b);
                waveformData.phase_c.push(...data.phase_c);
                
                const maxPoints = 1000;
                if (waveformData.time.length > maxPoints) {
                    waveformData.time = waveformData.time.slice(-maxPoints);
                    waveformData.phase_a = waveformData.phase_a.slice(-maxPoints);
                    waveformData.phase_b = waveformData.phase_b.slice(-maxPoints);
                    waveformData.phase_c = waveformData.phase_c.slice(-maxPoints);
                }
                
                waveformChart.data.labels = waveformData.time.map(t => t.toFixed(3));
                waveformChart.data.datasets[0].data = waveformData.phase_a;
                waveformChart.data.datasets[1].data = waveformData.phase_b;
                waveformChart.data.datasets[2].data = waveformData.phase_c;
                waveformChart.update('none');
                
                document.getElementById('frequency').textContent = data.estimated_frequency.toFixed(2);
                document.getElementById('thd-a').textContent = data.harmonic_data.thd_a.toFixed(2);
                document.getElementById('thd-b').textContent = data.harmonic_data.thd_b.toFixed(2);
                document.getElementById('thd-c').textContent = data.harmonic_data.thd_c.toFixed(2);
                
                const phaseA = (data.phase_angles.a * 180 / Math.PI) % 360;
                const phaseB = (data.phase_angles.b * 180 / Math.PI) % 360;
                const phaseC = (data.phase_angles.c * 180 / Math.PI) % 360;
                
                document.getElementById('phase-a-angle').textContent = phaseA.toFixed(1);
                document.getElementById('phase-b-angle').textContent = phaseB.toFixed(1);
                document.getElementById('phase-c-angle').textContent = phaseC.toFixed(1);
                
                document.getElementById('phase-a-circle').style.setProperty('--deg', phaseA + 'deg');
                document.getElementById('phase-b-circle').style.setProperty('--deg', phaseB + 'deg');
                document.getElementById('phase-c-circle').style.setProperty('--deg', phaseC + 'deg');
                
                let diffAB = Math.abs(phaseA - phaseB);
                let diffBC = Math.abs(phaseB - phaseC);
                let diffCA = Math.abs(phaseC - phaseA);
                if (diffAB > 180) diffAB = 360 - diffAB;
                if (diffBC > 180) diffBC = 360 - diffBC;
                if (diffCA > 180) diffCA = 360 - diffCA;
                
                document.getElementById('phase-diff-ab').textContent = diffAB.toFixed(1);
                document.getElementById('phase-diff-bc').textContent = diffBC.toFixed(1);
                document.getElementById('phase-diff-ca').textContent = diffCA.toFixed(1);
                
                if (data.harmonic_data.frequencies.length > 0) {
                    const freqLabels = data.harmonic_data.frequencies
                        .filter((_, i) => i % 5 === 0)
                        .map(f => f.toFixed(0));
                    spectrumChart.data.labels = freqLabels;
                    spectrumChart.data.datasets[0].data = data.harmonic_data.amplitude_a.filter((_, i) => i % 5 === 0);
                    spectrumChart.data.datasets[1].data = data.harmonic_data.amplitude_b.filter((_, i) => i % 5 === 0);
                    spectrumChart.data.datasets[2].data = data.harmonic_data.amplitude_c.filter((_, i) => i % 5 === 0);
                    spectrumChart.update();
                }
                
                updateHarmonicTable(data.harmonic_data);
                
                if (updateCount % 50 === 0) {
                    updateInterharmonics();
                    updateFlicker();
                }
                updateCount++;
                
                updateRunTime();
                
            } catch (error) {
                console.error('Error updating data:', error);
            }
        }
        
        async function updateInterharmonics() {
            try {
                const response = await fetch('/api/interharmonics');
                const data = await response.json();
                if (data.interharmonics) {
                    document.getElementById('interharmonic-count').textContent = Object.keys(data.interharmonics).length;
                }
            } catch (error) {
                console.error('Error updating interharmonics:', error);
            }
        }
        
        async function updateFlicker() {
            try {
                const response = await fetch('/api/flicker');
                const data = await response.json();
                if (data.Pst !== undefined) {
                    document.getElementById('pst-value').textContent = data.Pst.toFixed(3);
                }
            } catch (error) {
                console.error('Error updating flicker:', error);
            }
        }
        
        function updateHarmonicTable(harmonicData) {
            const tbody = document.getElementById('harmonic-table-body');
            tbody.innerHTML = '';
            
            for (let h = 1; h <= 15; h++) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${h}</td>
                    <td>${(harmonicData.contents_a[h] || 0).toFixed(2)}%</td>
                    <td>${(harmonicData.contents_b[h] || 0).toFixed(2)}%</td>
                    <td>${(harmonicData.contents_c[h] || 0).toFixed(2)}%</td>
                `;
                tbody.appendChild(row);
            }
        }
        
        function startMonitoring() {
            if (isRunning) return;
            isRunning = true;
            startTime = Date.now();
            document.getElementById('system-status').textContent = '运行中';
            updateInterval = setInterval(updateData, 100);
        }
        
        function stopMonitoring() {
            isRunning = false;
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }
            document.getElementById('system-status').textContent = '已停止';
        }
        
        async function saveRecord() {
            const recordData = {
                timestamp: new Date().toISOString(),
                frequency: parseFloat(document.getElementById('frequency').textContent),
                phase_a_voltage: waveformData.phase_a[waveformData.phase_a.length - 1] || 0,
                phase_b_voltage: waveformData.phase_b[waveformData.phase_b.length - 1] || 0,
                phase_c_voltage: waveformData.phase_c[waveformData.phase_c.length - 1] || 0,
                thd_a: parseFloat(document.getElementById('thd-a').textContent),
                thd_b: parseFloat(document.getElementById('thd-b').textContent),
                thd_c: parseFloat(document.getElementById('thd-c').textContent),
                avg_thd: (parseFloat(document.getElementById('thd-a').textContent) +
                          parseFloat(document.getElementById('thd-b').textContent) +
                          parseFloat(document.getElementById('thd-c').textContent)) / 3,
                waveform: {
                    sample_rate: 1000,
                    duration: waveformData.time.length / 1000,
                    time: waveformData.time,
                    phase_a: waveformData.phase_a,
                    phase_b: waveformData.phase_b,
                    phase_c: waveformData.phase_c
                }
            };
            
            try {
                const response = await fetch('/api/records', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(recordData)
                });
                const result = await response.json();
                alert(`记录已保存! ID: ${result.record_id}`);
            } catch (error) {
                console.error('Error saving record:', error);
                alert('保存失败!');
            }
        }
        
        async function exportComtrade() {
            const exportData = {
                time: waveformData.time,
                phase_a: waveformData.phase_a,
                phase_b: waveformData.phase_b,
                phase_c: waveformData.phase_c
            };
            
            try {
                const response = await fetch('/api/comtrade/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(exportData)
                });
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'comtrade_export.zip';
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Error exporting COMTRADE:', error);
                alert('导出失败!');
            }
        }
        
        function exportReportHTML() {
            window.open('/api/report/download/html', '_blank');
        }
        
        function exportReportJSON() {
            window.open('/api/report/download/json', '_blank');
        }
        
        async function resetSystem() {
            if (confirm('确定要重置系统吗?')) {
                stopMonitoring();
                waveformData = { time: [], phase_a: [], phase_b: [], phase_c: [] };
                waveformChart.data.labels = [];
                waveformChart.data.datasets.forEach(ds => ds.data = []);
                waveformChart.update();
                
                try {
                    await fetch('/api/reset');
                } catch (error) {
                    console.error('Error resetting:', error);
                }
                
                document.getElementById('system-status').textContent = '就绪';
                document.getElementById('run-time').textContent = '00:00:00';
                startTime = null;
            }
        }
        
        function updateRunTime() {
            if (!startTime) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const hours = Math.floor(elapsed / 3600).toString().padStart(2, '0');
            const minutes = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('run-time').textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        initCharts();
    </script>
</body>
</html>
