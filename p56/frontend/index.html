<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人车仿真系统 - 多车协同与冲突消解</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }
        
        #container {
            display: flex;
            height: 100vh;
        }
        
        #canvas-container {
            flex: 1;
            position: relative;
        }
        
        #sidebar {
            width: 350px;
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #0f3460;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #00d9ff;
            text-align: center;
        }
        
        h2 {
            font-size: 1.1rem;
            margin: 15px 0 10px;
            color: #e94560;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 5px;
        }
        
        .stat-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #888;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .vehicle-info {
            background: #0f3460;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .vehicle-id {
            color: #00d9ff;
            font-weight: bold;
        }
        
        .local-mode {
            display: inline-block;
            background: #ffa500;
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 5px;
            animation: pulse 1s infinite;
        }
        
        .conflict-alert {
            background: #e94560;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            animation: pulse 2s infinite;
        }
        
        .conflict-alert.warning {
            background: #ffa500;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #ff6b8a;
        }
        
        button.active {
            background: #00d9ff;
        }
        
        #status-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        .status-connected {
            color: #00ff88;
        }
        
        .status-disconnected {
            color: #e94560;
        }
        
        #event-log {
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .log-time {
            color: #888;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvas-container">
            <div id="status-bar">
                <span id="connection-status">连接中...</span>
            </div>
        </div>
        
        <div id="sidebar">
            <h1>🚗 无人车仿真系统</h1>
            
            <h2>📊 系统统计</h2>
            <div class="stat-card">
                <div class="stat-label">活跃车辆</div>
                <div class="stat-value" id="vehicle-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">冲突总数</div>
                <div class="stat-value" id="total-conflicts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">严重冲突</div>
                <div class="stat-value" id="critical-conflicts">0</div>
            </div>
            
            <h2>🚙 车辆状态</h2>
            <div id="vehicles-list"></div>
            
            <h2>⚠️ 冲突警报</h2>
            <div id="conflicts-list"></div>
            
            <h2>📝 事件日志</h2>
            <div id="event-log"></div>
            
            <h2>🔧 控制</h2>
            <div class="controls">
                <button id="toggle-ros2">ROS2桥接: 关</button>
            </div>
            <div class="controls">
                <button id="toggle-failure">模拟断网: 关</button>
            </div>
            <div class="controls">
                <button id="replan-all">全部重规划</button>
            </div>
            <div class="controls">
                <button id="export-csv">导出CSV日志</button>
                <button id="export-json">导出JSON</button>
            </div>
            
            <h2>🤖 本地决策模式</h2>
            <div class="stat-card" id="local-mode-status" style="background: #2d3436;">
                <div class="stat-label">车辆状态</div>
                <div class="stat-value" style="font-size: 1rem; color: #00ff88;">
                    所有车辆正常通信
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="/static/main.js"></script>
</body>
</html>
