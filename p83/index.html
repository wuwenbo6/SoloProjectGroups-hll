<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频摘要生成器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🎬 视频摘要生成器</h1>
            <p class="subtitle">基于 OpenCV 背景减除的移动目标检测与摘要生成</p>
        </header>

        <div class="main-content">
            <section class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <h3>拖放视频文件到此处</h3>
                    <p>或点击选择视频文件</p>
                    <p class="supported-formats">支持格式: MP4, AVI, MOV, MKV</p>
                </div>
                <button class="btn-primary" id="selectBtn">选择视频文件</button>
            </section>

            <section class="video-list-section">
                <h2>📋 视频列表</h2>
                <div class="video-list" id="videoList">
                    <div class="empty-state">暂无视频，请上传视频开始处理</div>
                </div>
            </section>

            <div id="processingModal" class="modal hidden">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modalTitle">处理中...</h3>
                    </div>
                    <div class="modal-body">
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                            <p class="progress-text" id="progressText">0%</p>
                        </div>
                        <p class="processing-status" id="processingStatus">正在处理视频...</p>
                    </div>
                </div>
            </div>

            <div id="previewModal" class="modal hidden">
                <div class="modal-content large">
                    <div class="modal-header">
                        <h3 id="previewTitle">视频预览</h3>
                        <button class="close-btn" id="closePreview">×</button>
                    </div>
                    <div class="modal-body" id="previewBody">
                    </div>
                </div>
            </div>

            <div id="keyframesModal" class="modal hidden">
                <div class="modal-content xlarge">
                    <div class="modal-header">
                        <h3 id="keyframesTitle">关键帧查看</h3>
                        <button class="close-btn" id="closeKeyframes">×</button>
                    </div>
                    <div class="modal-body" id="keyframesBody">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
