<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋学习系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .tab-btn:hover {
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .main-content {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .board-section {
            flex: 1;
            min-width: 500px;
        }

        .control-section {
            width: 350px;
            min-width: 300px;
        }

        .board-container {
            background: #DEB887;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: inline-block;
        }

        .board {
            position: relative;
            background: #DEB887;
        }

        .board canvas {
            display: block;
        }

        .panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .panel h3 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .problem-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .problem-item {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .problem-item:hover {
            background: #f0f0f0;
        }

        .problem-item.selected {
            background: #e7f3ff;
            border-color: #667eea;
        }

        .problem-item .difficulty {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 10px;
        }

        .diff-easy { background: #d4edda; color: #155724; }
        .diff-medium { background: #fff3cd; color: #856404; }
        .diff-hard { background: #f8d7da; color: #721c24; }
        .diff-expert { background: #721c24; color: white; }

        .analysis-result {
            max-height: 400px;
            overflow-y: auto;
        }

        .move-item {
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .move-excellent { background: #d4edda; }
        .move-good { background: #d1ecf1; }
        .move-okay { background: #e2e3e5; }
        .move-doubtful { background: #fff3cd; }
        .move-bad { background: #f8d7da; }
        .move-blunder { background: #721c24; color: white; }

        .move-number {
            font-weight: bold;
            min-width: 40px;
        }

        .move-position {
            font-family: monospace;
            min-width: 50px;
        }

        .move-comment {
            flex: 1;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .file-input {
            display: none;
        }

        .file-label {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        .hint-box {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .hint-box.show {
            display: block;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message-success {
            background: #d4edda;
            color: #155724;
        }

        .message-error {
            background: #f8d7da;
            color: #721c24;
        }

        .message-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .recommendations {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .recommendations ul {
            margin-left: 20px;
            margin-top: 10px;
        }

        .recommendations li {
            margin-bottom: 5px;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }

            .control-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚫ 围棋学习系统 ⚪</h1>
            <p>死活题练习 · AI复盘分析 · SGF棋谱导入导出</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('play')">对弈模式</button>
            <button class="tab-btn" onclick="switchTab('problem')">死活题练习</button>
            <button class="tab-btn" onclick="switchTab('analyze')">复盘分析</button>
        </div>

        <div id="play-tab" class="tab-content active">
            <div class="main-content">
                <div class="board-section">
                    <div class="board-container">
                        <div class="board">
                            <canvas id="boardCanvas" width="570" height="570"></canvas>
                        </div>
                    </div>
                </div>
                <div class="control-section">
                    <div class="panel">
                        <h3>🎮 游戏控制</h3>
                        <div>
                            <button class="btn btn-primary" onclick="newGame(19)">19路新局</button>
                            <button class="btn btn-primary" onclick="newGame(13)">13路新局</button>
                            <button class="btn btn-primary" onclick="newGame(9)">9路新局</button>
                        </div>
                        <div>
                            <button class="btn btn-warning" onclick="undoMove()">悔棋</button>
                            <button class="btn btn-info" onclick="switchPlayer()">切换落子方</button>
                        </div>
                    </div>

                    <div class="panel">
                        <h3>📁 SGF操作</h3>
                        <div>
                            <label class="file-label">
                                导入SGF
                                <input type="file" class="file-input" accept=".sgf" onchange="importSGF(event)">
                            </label>
                            <button class="btn btn-success" onclick="exportSGF()">导出SGF</button>
                        </div>
                    </div>

                    <div class="panel">
                        <h3>📊 当前状态</h3>
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-value" id="moveCount">0</div>
                                <div class="stat-label">手数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="currentPlayer">黑</div>
                                <div class="stat-label">当前方</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="problem-tab" class="tab-content">
            <div class="main-content">
                <div class="board-section">
                    <div class="board-container">
                        <div class="board">
                            <canvas id="problemCanvas" width="570" height="570"></canvas>
                        </div>
                    </div>
                    <div id="problemMessage" class="message"></div>
                    <div id="hintBox" class="hint-box">
                        <strong>💡 提示：</strong>
                        <span id="hintText"></span>
                    </div>
                </div>
                <div class="control-section">
                    <div class="panel">
                        <h3>📚 题目列表</h3>
                        <div style="margin-bottom: 10px;">
                            <select id="difficultyFilter" onchange="filterProblems()" style="padding: 8px; width: 100%; border-radius: 5px; border: 1px solid #ddd;">
                                <option value="">全部难度</option>
                                <option value="0">初级</option>
                                <option value="1">中级</option>
                                <option value="2">高级</option>
                                <option value="3">专家</option>
                            </select>
                        </div>
                        <div class="problem-list" id="problemList">
                            加载中...
                        </div>
                    </div>

                    <div class="panel">
                        <h3>🎯 题目操作</h3>
                        <div>
                            <button class="btn btn-warning" onclick="showHint()">显示提示</button>
                            <button class="btn btn-info" onclick="resetProblem()">重置</button>
                            <button class="btn btn-success" onclick="showSolution()">显示答案</button>
                        </div>
                        <div class="stats" style="margin-top: 15px;">
                            <div class="stat-item">
                                <div class="stat-value" id="problemName">-</div>
                                <div class="stat-label">题目名称</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="toPlay">-</div>
                                <div class="stat-label">执方</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="analyze-tab" class="tab-content">
            <div class="main-content">
                <div class="board-section">
                    <div class="board-container">
                        <div class="board">
                            <canvas id="analyzeCanvas" width="570" height="570"></canvas>
                        </div>
                    </div>
                </div>
                <div class="control-section">
                    <div class="panel">
                        <h3>🔍 分析控制</h3>
                        <div>
                            <button class="btn btn-primary" onclick="startAnalysis()">开始分析</button>
                            <label class="file-label">
                                导入棋谱分析
                                <input type="file" class="file-input" accept=".sgf" onchange="importAndAnalyze(event)">
                            </label>
                        </div>
                        <div style="margin-top: 10px;">
                            <button class="btn btn-warning" onclick="prevMove()">← 上一步</button>
                            <button class="btn btn-warning" onclick="nextMove()">下一步 →</button>
                        </div>
                    </div>

                    <div class="panel">
                        <h3>📊 分析得分</h3>
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-value" id="overallScore">-</div>
                                <div class="stat-label">总体得分</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="blackScore">-</div>
                                <div class="stat-label">黑方得分</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="whiteScore">-</div>
                                <div class="stat-label">白方得分</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="blunderCount">-</div>
                                <div class="stat-label">严重错误</div>
                            </div>
                        </div>
                    </div>

                    <div class="panel">
                        <h3>📋 分析结果</h3>
                        <div class="analysis-result" id="analysisResult">
                            请先开始分析或导入SGF文件
                        </div>
                    </div>

                    <div class="panel" id="recommendationsPanel" style="display: none;">
                        <h3>💡 改进建议</h3>
                        <div class="recommendations" id="recommendations">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentGameID = null;
        let currentBoardSize = 19;
        let currentPlayer = 1;
        let gameHistory = [];
        let currentMoveIndex = -1;

        let currentProblemSession = null;
        let currentProblem = null;
        let selectedProblemID = null;

        let analysisData = null;

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');

            if (tab === 'problem') {
                loadProblemList();
            }
        }

        function drawBoard(canvasId, size, stones, highlightMove = null) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            const padding = 30;
            const cellSize = (canvas.width - padding * 2) / (size - 1);

            ctx.fillStyle = '#DEB887';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;

            for (let i = 0; i < size; i++) {
                ctx.beginPath();
                ctx.moveTo(padding, padding + i * cellSize);
                ctx.lineTo(padding + (size - 1) * cellSize, padding + i * cellSize);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(padding + i * cellSize, padding);
                ctx.lineTo(padding + i * cellSize, padding + (size - 1) * cellSize);
                ctx.stroke();
            }

            const starPoints = getStarPoints(size);
            ctx.fillStyle = '#000';
            starPoints.forEach(p => {
                ctx.beginPath();
                ctx.arc(padding + p.x * cellSize, padding + p.y * cellSize, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            stones.forEach(stone => {
                const x = padding + stone.x * cellSize;
                const y = padding + stone.y * cellSize;
                const radius = cellSize / 2 - 2;

                const gradient = ctx.createRadialGradient(x - 3, y - 3, 0, x, y, radius);
                if (stone.stone === 1) {
                    gradient.addColorStop(0, '#666');
                    gradient.addColorStop(1, '#000');
                } else {
                    gradient.addColorStop(0, '#fff');
                    gradient.addColorStop(1, '#ddd');
                }

                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.strokeStyle = '#000';
                ctx.lineWidth = 0.5;
                ctx.stroke();

                if (highlightMove && highlightMove.x === stone.x && highlightMove.y === stone.y) {
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(x, y, radius - 5, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
        }

        function getStarPoints(size) {
            if (size === 19) {
                return [
                    {x: 3, y: 3}, {x: 9, y: 3}, {x: 15, y: 3},
                    {x: 3, y: 9}, {x: 9, y: 9}, {x: 15, y: 9},
                    {x: 3, y: 15}, {x: 9, y: 15}, {x: 15, y: 15}
                ];
            } else if (size === 13) {
                return [
                    {x: 3, y: 3}, {x: 9, y: 3},
                    {x: 3, y: 9}, {x: 9, y: 9},
                    {x: 6, y: 6}
                ];
            } else if (size === 9) {
                return [
                    {x: 2, y: 2}, {x: 6, y: 2},
                    {x: 2, y: 6}, {x: 6, y: 6},
                    {x: 4, y: 4}
                ];
            }
            return [];
        }

        async function newGame(size) {
            currentBoardSize = size;
            currentPlayer = 1;
            gameHistory = [];
            currentMoveIndex = -1;

            try {
                const response = await fetch('/api/game/new', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({size: size})
                });
                const data = await response.json();
                currentGameID = data.game_id;
                drawBoard('boardCanvas', size, []);
                document.getElementById('moveCount').textContent = '0';
                document.getElementById('currentPlayer').textContent = '黑';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        document.getElementById('boardCanvas').addEventListener('click', async function(e) {
            if (!currentGameID) {
                newGame(19);
                return;
            }

            const canvas = this;
            const rect = canvas.getBoundingClientRect();
            const padding = 30;
            const cellSize = (canvas.width - padding * 2) / (currentBoardSize - 1);
            
            const x = Math.round((e.clientX - rect.left - padding) / cellSize);
            const y = Math.round((e.clientY - rect.top - padding) / cellSize);

            if (x < 0 || x >= currentBoardSize || y < 0 || y >= currentBoardSize) return;

            try {
                const response = await fetch('/api/game/play', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        game_id: currentGameID,
                        x: x,
                        y: y,
                        stone: currentPlayer === 1 ? 'black' : 'white'
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    gameHistory.push(data.board);
                    currentMoveIndex = data.board.length - 1;
                    drawBoard('boardCanvas', currentBoardSize, data.board);
                    document.getElementById('moveCount').textContent = data.move_num;
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    document.getElementById('currentPlayer').textContent = currentPlayer === 1 ? '黑' : '白';
                } else {
                    alert(data.error || '落子无效');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });

        async function undoMove() {
            if (!currentGameID) return;

            try {
                const response = await fetch('/api/game/undo', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({game_id: currentGameID})
                });
                const data = await response.json();
                
                if (data.success) {
                    drawBoard('boardCanvas', currentBoardSize, data.board);
                    document.getElementById('moveCount').textContent = data.move_num;
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    document.getElementById('currentPlayer').textContent = currentPlayer === 1 ? '黑' : '白';
                } else {
                    alert(data.error);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            document.getElementById('currentPlayer').textContent = currentPlayer === 1 ? '黑' : '白';
        }

        async function exportSGF() {
            if (!currentGameID) return;
            window.open('/api/game/' + currentGameID + '/sgf');
        }

        async function importSGF(event) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/game/import', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.game_id) {
                    currentGameID = data.game_id;
                    currentBoardSize = data.size;
                    drawBoard('boardCanvas', data.size, data.board);
                    document.getElementById('moveCount').textContent = data.board.length;
                    alert('SGF导入成功！');
                } else {
                    alert(data.error || '导入失败');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadProblemList() {
            const diff = document.getElementById('difficultyFilter').value;
            let url = '/api/problem/list';
            if (diff) url += '?difficulty=' + diff;

            try {
                const response = await fetch(url);
                const problems = await response.json();
                
                const list = document.getElementById('problemList');
                list.innerHTML = problems.map(p => `
                    <div class="problem-item ${selectedProblemID === p.id ? 'selected' : ''}" onclick="selectProblem('${p.id}')">
                        <strong>${p.name}</strong>
                        <span class="difficulty diff-${getDiffClass(p.difficulty)}">${p.difficulty}</span>
                        <div style="font-size: 12px; color: #666; margin-top: 5px;">
                            ${p.tags.map(t => '#' + t).join(' ')}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function getDiffClass(diff) {
            const classes = {'初级': 'easy', '中级': 'medium', '高级': 'hard', '专家': 'expert'};
            return classes[diff] || 'easy';
        }

        function filterProblems() {
            loadProblemList();
        }

        async function selectProblem(id) {
            selectedProblemID = id;
            
            try {
                const response = await fetch('/api/problem/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({problem_id: id})
                });
                const data = await response.json();
                
                currentProblemSession = data.session_id;
                drawBoard('problemCanvas', 9, data.board);
                
                document.getElementById('problemName').textContent = data.name;
                document.getElementById('toPlay').textContent = data.to_play === 1 ? '黑先' : '白先';
                document.getElementById('hintBox').classList.remove('show');
                document.getElementById('problemMessage').className = 'message';
                document.getElementById('problemMessage').classList.remove('show');
                
                loadProblemList();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        document.getElementById('problemCanvas').addEventListener('click', async function(e) {
            if (!currentProblemSession) return;

            const canvas = this;
            const rect = canvas.getBoundingClientRect();
            const padding = 30;
            const cellSize = (canvas.width - padding * 2) / 8;
            
            const x = Math.round((e.clientX - rect.left - padding) / cellSize);
            const y = Math.round((e.clientY - rect.top - padding) / cellSize);

            if (x < 0 || x >= 9 || y < 0 || y >= 9) return;

            try {
                const response = await fetch('/api/problem/move', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: currentProblemSession,
                        x: x,
                        y: y
                    })
                });
                const data = await response.json();
                
                drawBoard('problemCanvas', 9, data.board);
                
                const msgEl = document.getElementById('problemMessage');
                msgEl.textContent = data.message;
                msgEl.className = 'message ' + (data.success ? 'message-success show' : 'message-error show');

                if (data.is_complete) {
                    if (data.is_success) {
                        msgEl.textContent = '🎉 恭喜！解题正确！' + data.message;
                    }
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });

        async function showHint() {
            if (!currentProblemSession) return;

            try {
                const response = await fetch('/api/problem/hint', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: currentProblemSession})
                });
                const data = await response.json();
                
                document.getElementById('hintText').textContent = data.hint;
                document.getElementById('hintBox').classList.add('show');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function resetProblem() {
            if (!currentProblemSession) return;

            try {
                const response = await fetch('/api/problem/reset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: currentProblemSession})
                });
                const data = await response.json();
                
                drawBoard('problemCanvas', 9, data.board);
                document.getElementById('hintBox').classList.remove('show');
                document.getElementById('problemMessage').className = 'message';
                document.getElementById('problemMessage').classList.remove('show');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function showSolution() {
            if (!currentProblemSession) return;

            try {
                const response = await fetch('/api/problem/solution', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: currentProblemSession})
                });
                const data = await response.json();
                
                drawBoard('problemCanvas', 9, data.board);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function startAnalysis() {
            if (!currentGameID) {
                alert('请先开始一局棋');
                return;
            }

            try {
                const response = await fetch('/api/game/' + currentGameID + '/analyze');
                analysisData = await response.json();
                
                displayAnalysis(analysisData);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function importAndAnalyze(event) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/game/import', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.game_id) {
                    currentGameID = data.game_id;
                    currentBoardSize = data.size;
                    
                    const analyzeResponse = await fetch('/api/game/' + currentGameID + '/analyze');
                    analysisData = await analyzeResponse.json();
                    
                    drawBoard('analyzeCanvas', data.size, data.board);
                    displayAnalysis(analysisData);
                } else {
                    alert(data.error || '导入失败');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayAnalysis(data) {
            document.getElementById('overallScore').textContent = data.overall_score.toFixed(1);
            document.getElementById('blackScore').textContent = data.black_score.toFixed(1);
            document.getElementById('whiteScore').textContent = data.white_score.toFixed(1);
            document.getElementById('blunderCount').textContent = data.blunders.length;

            const result = document.getElementById('analysisResult');
            result.innerHTML = data.moves.map(move => {
                const pos = String.fromCharCode(65 + move.position.x) + (move.position.y + 1);
                return `
                    <div class="move-item move-${move.quality.toLowerCase()}">
                        <span class="move-number">${move.move_number}.</span>
                        <span class="move-position">${move.stone === 1 ? '黑' : '白'} ${pos}</span>
                        <span class="move-comment">${move.comment} (${(move.score > 0 ? '+' : '') + move.score.toFixed(1)})</span>
                    </div>
                `;
            }).join('');

            const recPanel = document.getElementById('recommendationsPanel');
            const recList = document.getElementById('recommendations');
            if (data.recommendations.length > 0) {
                recPanel.style.display = 'block';
                recList.innerHTML = '<ul>' + data.recommendations.map(r => '<li>' + r + '</li>').join('') + '</ul>';
            }
        }

        function prevMove() {
            if (currentMoveIndex > 0) {
                currentMoveIndex--;
                updateAnalyzeBoard();
            }
        }

        function nextMove() {
            if (analysisData && currentMoveIndex < analysisData.moves.length - 1) {
                currentMoveIndex++;
                updateAnalyzeBoard();
            }
        }

        function updateAnalyzeBoard() {
            if (!analysisData || currentMoveIndex < 0) return;
            const move = analysisData.moves[currentMoveIndex];
            drawBoard('analyzeCanvas', currentBoardSize, gameHistory[currentMoveIndex] || [], move.position);
        }

        newGame(19);
        drawBoard('problemCanvas', 9, []);
        drawBoard('analyzeCanvas', 19, []);
    </script>
</body>
</html>
