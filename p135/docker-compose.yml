version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "6343:6343/udp"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/sflow.db
    networks:
      - sflow-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sflow-network
    restart: unless-stopped

networks:
  sflow-network:
    driver: bridge

volumes:
  data:
