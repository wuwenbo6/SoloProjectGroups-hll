<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPICE USB 重定向器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-content">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="10" rx="2" ry="2"></rect>
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="18" y1="11" x2="23" y2="11"></line>
          </svg>
          <h1>SPICE USB 重定向器</h1>
        </div>
        <div class="header-actions">
          <button id="exportStatsBtn" class="btn btn-secondary btn-header" title="导出统计">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            导出统计
          </button>
          <div class="connection-status" id="connectionStatus">
            <span class="status-indicator disconnected"></span>
            <span class="status-text">未连接</span>
          </div>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section class="connection-panel">
        <h2>SPICE 服务器连接</h2>
        <div class="connection-form">
          <div class="form-group">
            <label for="host">服务器地址</label>
            <input type="text" id="host" placeholder="例如: 192.168.1.100" value="localhost">
          </div>
          <div class="form-group">
            <label for="port">端口</label>
            <input type="number" id="port" placeholder="例如: 5900" value="5900">
          </div>
          <div class="form-group">
            <label for="password">密码 (可选)</label>
            <input type="password" id="password" placeholder="SPICE 密码">
          </div>
          <div class="form-actions">
            <button id="connectBtn" class="btn btn-primary">连接</button>
            <button id="disconnectBtn" class="btn btn-danger" disabled>断开</button>
          </div>
        </div>
        <div class="stats-summary" id="statsSummary" style="display: none;">
          <h3>重定向统计</h3>
          <div class="stats-grid" id="statsGrid"></div>
        </div>
      </section>

      <section class="devices-panel">
        <div class="panel-header">
          <h2>USB 设备列表</h2>
          <div class="panel-actions">
            <span id="deviceCount" class="device-count">0 个设备</span>
            <button id="refreshBtn" class="btn btn-secondary btn-sm">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
              </svg>
              刷新
            </button>
          </div>
        </div>
        <div class="devices-list" id="devicesList">
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="7" width="20" height="10" rx="2" ry="2"></rect>
              <line x1="8" y1="17" x2="8" y2="7"></line>
              <line x1="16" y1="17" x2="16" y2="7"></line>
              <line x1="12" y1="17" x2="12" y2="7"></line>
            </svg>
            <p>正在加载 USB 设备...</p>
          </div>
        </div>
      </section>

      <section class="channels-panel">
        <div class="panel-header">
          <h2>USB 通道管理</h2>
          <div class="panel-actions">
            <span id="channelCount" class="device-count">0 个通道</span>
            <button id="refreshChannelsBtn" class="btn btn-secondary btn-sm">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
              </svg>
              刷新
            </button>
          </div>
        </div>
        <div class="channels-list" id="channelsList">
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <p>暂无活动通道</p>
            <p style="font-size: 12px; margin-top: 8px; opacity: 0.7;">重定向设备或插入新设备后将自动创建通道</p>
          </div>
        </div>
      </section>

      <section class="log-panel">
        <div class="panel-header">
          <h2>操作日志</h2>
          <button id="clearLogBtn" class="btn btn-secondary btn-sm">清空日志</button>
        </div>
        <div class="log-content" id="logContent"></div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
