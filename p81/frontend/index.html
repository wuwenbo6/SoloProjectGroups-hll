<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野生动物检测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            font-weight: 600;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
        }

        #fileInput {
            display: none;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .filter-section {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-label {
            font-weight: 600;
            color: #333;
        }

        .filter-select, .filter-input {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
            cursor: pointer;
        }

        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            margin-left: auto;
            color: #666;
            font-size: 14px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .photo-card:hover {
            transform: translateY(-5px);
        }

        .photo-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .photo-info {
            padding: 20px;
        }

        .photo-filename {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
            word-break: break-all;
        }

        .photo-time {
            color: #999;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .detections {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .detection-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .individual-tag {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-top: 5px;
            display: inline-block;
        }

        .no-detections {
            color: #999;
            font-size: 13px;
            font-style: italic;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: white;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
            float: right;
        }

        .delete-btn:hover {
            background: #ff3838;
        }

        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            text-align: center;
            margin-top: 8px;
            color: #666;
            font-size: 13px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .heatmap-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .heatmap {
            border-collapse: collapse;
            width: 100%;
            min-width: 800px;
        }

        .heatmap th, .heatmap td {
            border: 1px solid #e0e0e0;
            padding: 8px;
            text-align: center;
            font-size: 12px;
        }

        .heatmap th {
            background: #f8f9ff;
            font-weight: 600;
        }

        .heatmap-cell {
            min-width: 30px;
            height: 30px;
            transition: all 0.2s;
        }

        .heatmap-cell:hover {
            transform: scale(1.1);
            z-index: 10;
            position: relative;
        }

        .individuals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .individual-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s;
        }

        .individual-card:hover {
            transform: translateY(-5px);
        }

        .individual-id {
            font-weight: bold;
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
        }

        .individual-species {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .individual-stats {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }

        .individual-stats span {
            font-weight: 600;
            color: #333;
        }

        .recapture-badge {
            display: inline-block;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 10px;
        }

        .export-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .export-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .export-btn:hover {
            transform: translateY(-2px);
        }

        .export-options {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦌 野生动物检测系统</h1>
            <p>红外相机图片上传、AI动物检测与个体识别</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload')">📷 图片上传</button>
            <button class="tab-btn" onclick="switchTab('gallery')">🖼️ 图片库</button>
            <button class="tab-btn" onclick="switchTab('individuals')">🐾 个体识别</button>
            <button class="tab-btn" onclick="switchTab('activity')">📊 活动节律</button>
            <button class="tab-btn" onclick="switchTab('report')">📑 报告导出</button>
        </div>

        <div id="upload" class="tab-content active">
            <div class="card">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <p>拖拽图片到此处或点击上传</p>
                    <p style="color: #999; font-size: 13px; margin-top: 10px;">支持 JPG, PNG 格式 | 自动进行动物检测和个体识别</p>
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
                </div>
                <input type="file" id="fileInput" accept="image/*" multiple>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">正在上传并检测...</div>
                </div>
            </div>
        </div>

        <div id="gallery" class="tab-content">
            <div class="card">
                <div class="filter-section">
                    <span class="filter-label">🔍 按物种筛选:</span>
                    <select class="filter-select" id="speciesFilter">
                        <option value="">全部物种</option>
                    </select>
                    <span class="filter-label">🆔 按个体筛选:</span>
                    <select class="filter-select" id="individualFilter">
                        <option value="">全部个体</option>
                    </select>
                    <span class="stats" id="stats">共 0 张照片</span>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>

                <div class="gallery" id="gallery"></div>
            </div>
        </div>

        <div id="individuals" class="tab-content">
            <div class="card">
                <div class="section-title">再捕获率统计</div>
                <div class="stats-grid" id="recaptureStats"></div>
                
                <div class="section-title" style="margin-top: 30px;">识别个体列表</div>
                <div class="filter-section">
                    <span class="filter-label">🔍 按物种筛选:</span>
                    <select class="filter-select" id="individualSpeciesFilter">
                        <option value="">全部物种</option>
                    </select>
                </div>
                <div class="individuals-grid" id="individualsGrid"></div>
            </div>
        </div>

        <div id="activity" class="tab-content">
            <div class="card">
                <div class="section-title">物种活动节律</div>
                <div class="filter-section">
                    <span class="filter-label">选择物种:</span>
                    <select class="filter-select" id="heatmapSpecies">
                        <option value="">请选择物种</option>
                    </select>
                    <span class="filter-label">统计天数:</span>
                    <select class="filter-select" id="heatmapDays">
                        <option value="7">最近7天</option>
                        <option value="14">最近14天</option>
                        <option value="30">最近30天</option>
                    </select>
                </div>
                <div class="heatmap-container">
                    <table class="heatmap" id="heatmap"></table>
                </div>

                <div class="section-title" style="margin-top: 30px;">各物种活动高峰</div>
                <div id="speciesActivity"></div>
            </div>
        </div>

        <div id="report" class="tab-content">
            <div class="card">
                <div class="section-title">导出Excel报告</div>
                <div class="export-section">
                    <div class="export-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="includeIndividuals" checked>
                            包含个体识别数据
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="includeActivity" checked>
                            包含活动节律数据
                        </label>
                    </div>
                    <div class="filter-section" style="margin: 0;">
                        <select class="filter-select" id="reportSpecies">
                            <option value="">全部物种</option>
                        </select>
                        <input type="date" class="filter-input" id="reportStartDate" placeholder="开始日期">
                        <input type="date" class="filter-input" id="reportEndDate" placeholder="结束日期">
                    </div>
                    <button class="export-btn" onclick="exportReport()">📥 导出报告</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentSpecies = '';
        let currentIndividual = '';

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            if (tabId === 'gallery') loadPhotos();
            if (tabId === 'individuals') loadIndividualsData();
            if (tabId === 'activity') loadActivityData();
        }

        async function loadSpecies() {
            try {
                const response = await fetch(`${API_BASE}/api/species`);
                const species = await response.json();
                
                ['speciesFilter', 'individualSpeciesFilter', 'heatmapSpecies', 'reportSpecies'].forEach(id => {
                    const select = document.getElementById(id);
                    if (select) {
                        const currentValue = select.value;
                        select.innerHTML = id.includes('heatmap') ? '<option value="">请选择物种</option>' : '<option value="">全部物种</option>';
                        species.forEach(item => {
                            const option = document.createElement('option');
                            option.value = item.species;
                            option.textContent = `${item.species} (${item.count})`;
                            select.appendChild(option);
                        });
                        select.value = currentValue;
                    }
                });
            } catch (error) {
                console.error('加载物种列表失败:', error);
            }
        }

        async function loadPhotos() {
            document.getElementById('loading').classList.add('show');
            document.getElementById('gallery').innerHTML = '';

            try {
                let url = `${API_BASE}/api/photos`;
                const params = new URLSearchParams();
                if (currentSpecies) params.append('species', currentSpecies);
                if (currentIndividual) params.append('individual_id', currentIndividual);
                if (params.toString()) url += '?' + params.toString();
                
                const response = await fetch(url);
                const photos = await response.json();

                document.getElementById('stats').textContent = `共 ${photos.length} 张照片`;
                document.getElementById('loading').classList.remove('show');

                if (photos.length === 0) {
                    document.getElementById('gallery').innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="empty-state-icon">📷</div>
                            <h3>暂无照片</h3>
                            <p>上传第一张照片开始检测吧！</p>
                        </div>
                    `;
                    return;
                }

                photos.forEach(photo => {
                    const card = createPhotoCard(photo);
                    document.getElementById('gallery').appendChild(card);
                });
            } catch (error) {
                console.error('加载照片失败:', error);
                document.getElementById('loading').classList.remove('show');
            }
        }

        function createPhotoCard(photo) {
            const card = document.createElement('div');
            card.className = 'photo-card';

            const detectionsHtml = photo.detections.length > 0
                ? photo.detections.map(d => {
                    let individualTag = '';
                    if (d.individual_id) {
                        individualTag = `<br><span class="individual-tag">🆔 个体 #${d.individual_id}</span>`;
                    }
                    return `<span class="detection-tag">${d.species} ×${d.count} (${d.confidence})</span>${individualTag}`;
                }).join('')
                : '<span class="no-detections">未检测到动物</span>';

            const uploadTime = new Date(photo.upload_time).toLocaleString('zh-CN');

            card.innerHTML = `
                <img src="${API_BASE}${photo.file_path}" class="photo-image" alt="${photo.filename}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 300 200%22><rect fill=%22%23f0f0f0%22 width=%22300%22 height=%22200%22/><text fill=%22%23999%22 x=%22150%22 y=%22100%22 text-anchor=%22middle%22>图片加载失败</text></svg>'">
                <div class="photo-info">
                    <div class="photo-filename">${photo.filename}</div>
                    <div class="photo-time">${uploadTime}</div>
                    <div class="detections">${detectionsHtml}</div>
                    <button class="delete-btn" onclick="deletePhoto(${photo.id}, this)">删除</button>
                </div>
            `;

            return card;
        }

        async function deletePhoto(photoId, btn) {
            if (!confirm('确定要删除这张照片吗？')) return;

            try {
                await fetch(`${API_BASE}/api/photos/${photoId}`, { method: 'DELETE' });
                btn.closest('.photo-card').remove();
                loadSpecies();
                const cards = document.querySelectorAll('.photo-card');
                document.getElementById('stats').textContent = `共 ${cards.length} 张照片`;
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败');
            }
        }

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            if (files.length > 0) {
                await uploadFiles(files);
            }
        });

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                await uploadFiles(files);
            }
            fileInput.value = '';
        });

        async function uploadFiles(files) {
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            progressContainer.classList.add('show');
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const progress = Math.round(((i) / files.length) * 100);
                progressFill.style.width = `${progress}%`;
                progressText.textContent = `正在处理 ${i + 1}/${files.length}: ${file.name}`;

                const formData = new FormData();
                formData.append('file', file);

                try {
                    await fetch(`${API_BASE}/api/photos/upload`, {
                        method: 'POST',
                        body: formData
                    });
                } catch (error) {
                    console.error(`上传 ${file.name} 失败:`, error);
                }
            }

            progressFill.style.width = '100%';
            progressText.textContent = '处理完成！';
            
            setTimeout(() => {
                progressContainer.classList.remove('show');
                progressFill.style.width = '0%';
            }, 1500);

            await loadSpecies();
            await loadPhotos();
        }

        async function loadIndividualsData() {
            try {
                const recaptureResponse = await fetch(`${API_BASE}/api/recapture-rate`);
                const recaptureData = await recaptureResponse.json();

                const statsGrid = document.getElementById('recaptureStats');
                statsGrid.innerHTML = '';

                if (recaptureData.length === 0) {
                    statsGrid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="empty-state-icon">📊</div>
                            <p>暂无再捕获数据，上传更多照片来识别个体！</p>
                        </div>
                    `;
                } else {
                    recaptureData.forEach(item => {
                        const statCard = document.createElement('div');
                        statCard.className = 'stat-card';
                        statCard.innerHTML = `
                            <div class="stat-value">${(item.recapture_rate * 100).toFixed(1)}%</div>
                            <div class="stat-label">${item.species} 再捕获率</div>
                            <div style="font-size: 12px; margin-top: 5px; opacity: 0.8;">
                                共 ${item.total_individuals} 只个体，${item.recaptured_individuals} 只被再次捕获
                            </div>
                        `;
                        statsGrid.appendChild(statCard);
                    });
                }

                await loadIndividualsList();
            } catch (error) {
                console.error('加载再捕获数据失败:', error);
            }
        }

        async function loadIndividualsList() {
            const species = document.getElementById('individualSpeciesFilter').value;
            try {
                let url = `${API_BASE}/api/individuals`;
                if (species) url += `?species=${encodeURIComponent(species)}`;
                
                const response = await fetch(url);
                const individuals = await response.json();

                const grid = document.getElementById('individualsGrid');
                grid.innerHTML = '';

                if (individuals.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="empty-state-icon">🐾</div>
                            <p>暂无识别到的个体</p>
                        </div>
                    `;
                    return;
                }

                individuals.forEach(ind => {
                    const card = document.createElement('div');
                    card.className = 'individual-card';
                    const isRecaptured = ind.sighting_count > 1;
                    card.innerHTML = `
                        <div class="individual-id">
                            🆔 ${ind.individual_id}
                            ${isRecaptured ? '<span class="recapture-badge">♻️ 再捕获</span>' : ''}
                        </div>
                        <div class="individual-species">${ind.species}</div>
                        <div class="individual-stats">
                            <div><span>首次发现:</span> ${new Date(ind.first_seen).toLocaleString('zh-CN')}</div>
                            <div><span>最后发现:</span> ${new Date(ind.last_seen).toLocaleString('zh-CN')}</div>
                            <div><span>捕获次数:</span> ${ind.sighting_count}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('加载个体列表失败:', error);
            }
        }

        async function loadActivityData() {
            await loadHeatmap();
            await loadSpeciesActivity();
        }

        async function loadHeatmap() {
            const species = document.getElementById('heatmapSpecies').value;
            const days = document.getElementById('heatmapDays').value;

            if (!species) {
                document.getElementById('heatmap').innerHTML = '<tr><td style="padding: 40px; text-align: center; color: #999;">请选择物种查看活动热力图</td></tr>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/activity/heatmap?species=${encodeURIComponent(species)}&days=${days}`);
                const data = await response.json();

                const table = document.getElementById('heatmap');
                let html = '<thead><tr><th>日期</th>';
                
                data.hour_labels.forEach(hour => {
                    html += `<th>${hour}</th>`;
                });
                html += '</tr></thead><tbody>';

                data.heatmap.forEach((row, rowIdx) => {
                    html += `<tr><th>${data.day_labels[rowIdx]}</th>`;
                    row.forEach((count, colIdx) => {
                        const intensity = count > 0 ? Math.min(count * 20, 100) : 0;
                        const bgColor = count > 0 
                            ? `rgba(102, 126, 234, ${intensity / 100})` 
                            : '#f8f9fa';
                        const textColor = intensity > 50 ? 'white' : '#333';
                        html += `<td class="heatmap-cell" style="background: ${bgColor}; color: ${textColor};" title="${data.day_labels[rowIdx]} ${data.hour_labels[colIdx]}: ${count}次">${count > 0 ? count : ''}</td>`;
                    });
                    html += '</tr>';
                });

                html += '</tbody>';
                table.innerHTML = html;
            } catch (error) {
                console.error('加载热力图失败:', error);
            }
        }

        async function loadSpeciesActivity() {
            try {
                const response = await fetch(`${API_BASE}/api/activity/species`);
                const data = await response.json();

                const container = document.getElementById('speciesActivity');
                let html = '<div class="stats-grid">';

                data.forEach(item => {
                    html += `
                        <div class="stat-card">
                            <div style="font-size: 1.2rem; font-weight: 600; margin-bottom: 10px;">${item.species}</div>
                            <div class="stat-value" style="font-size: 1.5rem;">${item.peak_hour}</div>
                            <div class="stat-label">活动高峰时段</div>
                            <div style="font-size: 12px; margin-top: 8px; opacity: 0.9;">
                                高峰时检测 ${item.peak_count} 次
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('加载物种活动数据失败:', error);
            }
        }

        async function exportReport() {
            const species = document.getElementById('reportSpecies').value;
            const startDate = document.getElementById('reportStartDate').value;
            const endDate = document.getElementById('reportEndDate').value;
            const includeIndividuals = document.getElementById('includeIndividuals').checked;
            const includeActivity = document.getElementById('includeActivity').checked;

            const requestData = {
                include_individuals: includeIndividuals,
                include_activity: includeActivity
            };

            if (species) requestData.species = species;
            if (startDate) requestData.start_date = new Date(startDate).toISOString();
            if (endDate) requestData.end_date = new Date(endDate + 'T23:59:59').toISOString();

            try {
                const response = await fetch(`${API_BASE}/api/report/export`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `wildlife_report_${new Date().toISOString().slice(0, 10)}.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                } else {
                    alert('导出失败，请检查后端服务');
                }
            } catch (error) {
                console.error('导出报告失败:', error);
                alert('导出失败: ' + error.message);
            }
        }

        document.getElementById('speciesFilter').addEventListener('change', (e) => {
            currentSpecies = e.target.value;
            loadPhotos();
        });

        document.getElementById('individualFilter').addEventListener('change', (e) => {
            currentIndividual = e.target.value;
            loadPhotos();
        });

        document.getElementById('individualSpeciesFilter').addEventListener('change', () => {
            loadIndividualsList();
        });

        document.getElementById('heatmapSpecies').addEventListener('change', loadHeatmap);
        document.getElementById('heatmapDays').addEventListener('change', loadHeatmap);

        async function loadIndividualFilter() {
            try {
                const response = await fetch(`${API_BASE}/api/individuals`);
                const individuals = await response.json();
                const select = document.getElementById('individualFilter');
                select.innerHTML = '<option value="">全部个体</option>';
                individuals.forEach(ind => {
                    const option = document.createElement('option');
                    option.value = ind.individual_id;
                    option.textContent = `${ind.individual_id} (${ind.species})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('加载个体筛选列表失败:', error);
            }
        }

        loadSpecies();
        loadIndividualFilter();
        loadPhotos();
    </script>
</body>
</html>
