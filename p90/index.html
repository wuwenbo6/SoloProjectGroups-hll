<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNA测序分析仪</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>🧬 DNA测序分析仪</h1>
      <div class="device-status">
        <span id="deviceStatus" class="status-indicator disconnected">未连接</span>
        <span id="deviceName"></span>
      </div>
    </header>

    <div class="main-content">
      <aside class="sidebar">
        <div class="panel">
          <h3>设备控制</h3>
          <button id="connectBtn" class="btn btn-primary">连接测序仪</button>
          <button id="disconnectBtn" class="btn btn-secondary" disabled>断开连接</button>
          
          <div class="control-group">
            <label for="sequenceLength">序列长度:</label>
            <input type="number" id="sequenceLength" value="100" min="10" max="500">
          </div>
          
          <button id="startBtn" class="btn btn-success" disabled>开始测序</button>
          <button id="stopBtn" class="btn btn-danger" disabled>停止测序</button>
          
          <div class="progress-container">
            <div id="progressBar" class="progress-bar">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <span id="progressText">0%</span>
          </div>
        </div>

        <div class="panel">
          <h3>样本管理</h3>
          <div class="control-group">
            <label for="sampleName">样本名称:</label>
            <input type="text" id="sampleName" placeholder="输入样本名称">
          </div>
          <button id="saveBtn" class="btn btn-primary" disabled>保存样本</button>
          <button id="exportBtn" class="btn btn-secondary" disabled>导出FASTA</button>
          <button id="exportAbiBtn" class="btn btn-secondary" disabled>导出ABI</button>
          <button id="loadSamplesBtn" class="btn btn-info">加载历史样本</button>
        </div>

        <div class="panel">
          <h3>高级分析</h3>
          <div class="control-group">
            <label for="numSamples">混合样本数:</label>
            <input type="number" id="numSamples" value="2" min="2" max="4">
          </div>
          <button id="demultiplexBtn" class="btn btn-warning" disabled>拆分混合样本</button>
          <button id="calibrateBtn" class="btn btn-warning" disabled>校准质量值</button>
          
          <div class="control-group" style="margin-top: 1rem;">
            <label for="knownSequence">参考序列 (可选):</label>
            <input type="text" id="knownSequence" placeholder="用于质量校准">
          </div>
        </div>

        <div class="panel">
          <h3>历史样本</h3>
          <div id="sampleList" class="sample-list">
            <p class="empty-text">暂无样本</p>
          </div>
        </div>
      </aside>

      <main class="content">
        <div class="panel signal-panel">
          <h3>电泳信号图</h3>
          <div class="chart-container">
            <canvas id="signalChart"></canvas>
          </div>
          <div class="legend">
            <span class="legend-item"><span class="color-box" style="background: #4CAF50;"></span> A (腺嘌呤)</span>
            <span class="legend-item"><span class="color-box" style="background: #f44336;"></span> T (胸腺嘧啶)</span>
            <span class="legend-item"><span class="color-box" style="background: #2196F3;"></span> C (胞嘧啶)</span>
            <span class="legend-item"><span class="color-box" style="background: #FF9800;"></span> G (鸟嘌呤)</span>
          </div>
        </div>

        <div class="panel results-panel">
          <h3>测序结果</h3>
          
          <div class="result-section">
            <h4>碱基序列</h4>
            <div id="sequenceDisplay" class="sequence-display">
              <span class="empty-text">等待测序完成...</span>
            </div>
          </div>

          <div class="result-section" id="demultiplexSection" style="display: none;">
            <h4>拆分结果</h4>
            <div id="demultiplexResults" class="demultiplex-results"></div>
          </div>

          <div class="result-section" id="calibrationSection" style="display: none;">
            <h4>质量校准结果</h4>
            <div id="calibrationResults" class="calibration-results"></div>
          </div>

          <div class="result-section">
            <h4>质量值分布</h4>
            <div class="chart-container quality-chart">
              <canvas id="qualityChart"></canvas>
            </div>
          </div>

          <div class="result-section">
            <h4>统计信息</h4>
            <div class="stats-grid">
              <div class="stat-item">
                <span class="stat-label">序列长度</span>
                <span id="statLength" class="stat-value">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">GC含量</span>
                <span id="statGC" class="stat-value">0%</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">平均质量值</span>
                <span id="statAvgQuality" class="stat-value">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Q20比例</span>
                <span id="statQ20" class="stat-value">0%</span>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="sequencer.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
