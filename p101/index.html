<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 8583 报文解析器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eaeaea;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 60px);
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            overflow: hidden;
        }

        .format-selector {
            display: flex;
            gap: 10px;
        }

        .format-btn {
            padding: 8px 16px;
            border: 2px solid #334155;
            background: transparent;
            color: #94a3b8;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .format-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        textarea {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            color: #eaeaea;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            resize: none;
            min-height: 150px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-secondary {
            background: #334155;
            color: #eaeaea;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .bitmap-display {
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .bitmap-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            color: #94a3b8;
        }

        .bitmap-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 4px;
        }

        .bitmap-bit {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bitmap-bit.on {
            background: #10b981;
            color: white;
        }

        .bitmap-bit.off {
            background: #374151;
            color: #6b7280;
        }

        .bitmap-bit:hover {
            transform: scale(1.1);
        }

        .fields-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .fields-container::-webkit-scrollbar {
            width: 6px;
        }

        .fields-container::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 3px;
        }

        .fields-container::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .field-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .field-item:hover {
            border-color: #667eea;
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .field-number {
            background: #667eea;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .field-name {
            font-size: 13px;
            color: #94a3b8;
        }

        .field-value {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            color: #eaeaea;
            word-break: break-all;
            background: #1e293b;
            padding: 8px;
            border-radius: 4px;
        }

        .field-edit {
            width: 100%;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 4px;
            padding: 8px;
            color: #eaeaea;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }

        .field-edit:focus {
            outline: none;
            border-color: #667eea;
        }

        .mtip {
            background: #f59e0b;
            color: #1e293b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f172a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border-top: 1px solid #334155;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .status-dot.error {
            background: #ef4444;
        }

        .transactions-panel {
            grid-column: 1 / -1;
            max-height: 250px;
        }

        .transactions-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .transactions-table th,
        .transactions-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        .transactions-table th {
            background: #0f172a;
            color: #94a3b8;
            font-weight: 600;
        }

        .transactions-table tr:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .response-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .response-00 {
            background: #10b981;
            color: white;
        }

        .response-other {
            background: #ef4444;
            color: white;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #334155;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
        }

        .info-label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            font-family: 'Monaco', 'Menlo', monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔐 ISO 8583 报文解析器</h1>
        <div class="header-actions">
            <button class="btn-secondary" onclick="loadTransactions()">刷新交易</button>
        </div>
    </header>

    <div class="container">
        <div class="panel">
            <div class="panel-title">报文输入</div>
            <div class="input-section">
                <div class="format-selector">
                    <button class="format-btn active" data-format="hex" onclick="setFormat('hex')">十六进制</button>
                    <button class="format-btn" data-format="xml" onclick="setFormat('xml')">XML</button>
                </div>
                <textarea id="messageInput" placeholder="请输入ISO 8583报文（十六进制或XML格式）..."></textarea>
                <div class="action-buttons">
                    <button class="btn-primary" onclick="parseMessage()">解析报文</button>
                    <button class="btn-success" onclick="sendMessage()">发送到主机</button>
                    <button class="btn-secondary" onclick="clearAll()">清空</button>
                    <button class="btn-secondary" onclick="loadSample()">加载示例</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">解析结果</div>
            <div class="message-info" id="messageInfo" style="display: none;">
                <div class="info-item">
                    <div class="info-label">MTI (消息类型)</div>
                    <div class="info-value" id="mtiValue">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">位图类型</div>
                    <div class="info-value" id="bitmapType">-</div>
                </div>
                <div class="info-item" id="cardSchemeItem" style="display: none;">
                    <div class="info-label">卡种</div>
                    <div class="info-value" id="cardSchemeValue">-</div>
                </div>
                <div class="info-item" id="macItem" style="display: none;">
                    <div class="info-label">MAC校验</div>
                    <div class="info-value" id="macValue">-</div>
                </div>
            </div>
            <div class="bitmap-display" id="bitmapDisplay" style="display: none;">
                <div class="bitmap-header">
                    <span>主位图 (1-64)</span>
                    <span id="bitmapHex">-</span>
                </div>
                <div class="bitmap-grid" id="bitmapGrid"></div>
            </div>
            <div class="bitmap-display" id="secondaryBitmapDisplay" style="display: none;">
                <div class="bitmap-header">
                    <span>次位图 (65-128)</span>
                    <span id="secondaryBitmapHex">-</span>
                </div>
                <div class="bitmap-grid" id="secondaryBitmapGrid"></div>
            </div>
            <div class="fields-container" id="fieldsContainer">
                <div style="text-align: center; color: #6b7280; padding: 40px;">
                    请输入报文并点击"解析报文"
                </div>
            </div>
        </div>

        <div class="panel transactions-panel">
            <div class="panel-title" style="display: flex; justify-content: space-between; align-items: center;">
                <span>交易记录</span>
                <button class="btn-secondary" style="padding: 6px 16px; font-size: 12px;" onclick="exportTransactions()">导出CSV</button>
            </div>
            <div style="overflow-y: auto; flex: 1;">
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>MTI</th>
                            <th>卡号</th>
                            <th>卡种</th>
                            <th>金额</th>
                            <th>检索参考号</th>
                            <th>响应码</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsBody">
                        <tr>
                            <td colspan="8" style="text-align: center; color: #6b7280; padding: 20px;">暂无交易记录</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-item">
            <div class="status-dot" id="serverStatus"></div>
            <span id="serverStatusText">连接中...</span>
        </div>
        <div class="status-item">
            <span id="lastUpdate">最后更新: -</span>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
