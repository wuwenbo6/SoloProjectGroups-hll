<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSN 门控调度模拟器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .panel h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .queue-config {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .queue-config h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .gcl-entry {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }

        .gcl-entry select,
        .gcl-entry input {
            flex: 1;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: 700;
        }

        .stat-card .label {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .chart-container {
            margin-bottom: 25px;
            position: relative;
            height: 300px;
        }

        .timeline-container {
            margin-bottom: 25px;
        }

        .timeline {
            position: relative;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        .gate-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            height: 40px;
        }

        .gate-label {
            width: 100px;
            font-weight: 600;
            color: #333;
            flex-shrink: 0;
        }

        .gate-bar {
            flex: 1;
            height: 30px;
            background: #e0e0e0;
            border-radius: 4px;
            position: relative;
            min-width: 500px;
        }

        .gate-segment {
            position: absolute;
            height: 100%;
            border-radius: 2px;
        }

        .gate-open {
            background: linear-gradient(90deg, #4caf50, #8bc34a);
        }

        .gate-closed {
            background: linear-gradient(90deg, #f44336, #ff5722);
        }

        .frame-markers {
            position: relative;
            height: 30px;
            margin-top: 10px;
            min-width: 500px;
        }

        .frame-marker {
            position: absolute;
            width: 4px;
            height: 100%;
            border-radius: 2px;
        }

        .time-axis {
            display: flex;
            justify-content: space-between;
            padding: 10px 0 0 100px;
            color: #666;
            font-size: 0.85em;
            min-width: 500px;
        }

        .queue-stats table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .queue-stats th,
        .queue-stats td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .queue-stats th {
            background: #667eea;
            color: white;
        }

        .queue-stats tr:hover {
            background: #f8f9fa;
        }

        .flow-type-AVB-Class-A { background: rgba(255, 99, 132, 0.8); }
        .flow-type-AVB-Class-B { background: rgba(54, 162, 235, 0.8); }
        .flow-type-Control { background: rgba(255, 206, 86, 0.8); }
        .flow-type-Best-Effort { background: rgba(75, 192, 192, 0.8); }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            flex: 1;
        }

        .stream-config {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .stream-config h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .reservation-result {
            background: #e8f5e9;
            border: 1px solid #4caf50;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .reservation-failed {
            background: #ffebee;
            border-color: #f44336;
        }

        .config-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .config-tab {
            padding: 6px 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        .config-tab.active {
            background: #667eea;
            color: white;
        }

        .config-panel {
            display: none;
        }

        .config-panel.active {
            display: block;
        }

        .listener-config {
            background: white;
            padding: 8px;
            border-radius: 4px;
            margin: 5px 0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 TSN 门控调度模拟器</h1>
        
        <div class="main-grid">
            <div class="panel">
                <h2>⚙️ 配置参数</h2>
                
                <div class="form-group">
                    <label>模拟时长 (毫秒)</label>
                    <input type="number" id="duration" value="10" min="1" max="100">
                </div>

                <div class="form-group">
                    <label>端口带宽 (Mbps)</label>
                    <input type="number" id="bandwidth" value="1000" min="10" max="10000">
                </div>

                <div class="config-tabs">
                    <button class="config-tab active" onclick="switchConfigTab('gcl')">门控调度</button>
                    <button class="config-tab" onclick="switchConfigTab('srp')">SRP流预留</button>
                    <button class="config-tab" onclick="switchConfigTab('traffic')">流量配置</button>
                </div>

                <div id="config-gcl" class="config-panel active">
                    <h3 style="margin: 0 0 10px; color: #555; font-size: 14px;">队列门控列表 (GCL)</h3>
                    <div id="queueConfigs"></div>
                </div>

                <div id="config-srp" class="config-panel">
                    <h3 style="margin: 0 0 10px; color: #555; font-size: 14px;">SRP 流预留配置</h3>
                    <div id="srpConfigs"></div>
                    <div id="reservationResult"></div>
                    <button class="btn btn-small" style="width:100%;margin-top:10px;" onclick="reserveStreams()">
                        📡 检查带宽预留
                    </button>
                </div>

                <div id="config-traffic" class="config-panel">
                    <h3 style="margin: 0 0 10px; color: #555; font-size: 14px;">流量配置</h3>
                    <div id="flowConfigs"></div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-small" id="runBtn" onclick="runSimulation()">
                        🚀 运行模拟
                    </button>
                    <button class="btn btn-small" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);" onclick="exportXML()">
                        📥 导出XML
                    </button>
                </div>
                <div class="btn-group" style="margin-top: 10px;">
                    <button class="btn btn-small" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" onclick="exportGCLXML()">
                        📄 导出GCL XML
                    </button>
                </div>
            </div>

            <div class="panel">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('overview')">📊 概览</button>
                    <button class="tab" onclick="switchTab('timeline')">⏱️ 时间线</button>
                    <button class="tab" onclick="switchTab('frames')">📦 帧详情</button>
                </div>

                <div id="overview" class="tab-content active">
                    <div id="results">
                        <div style="text-align: center; color: #888; padding: 60px;">
                            点击「运行模拟」按钮开始
                        </div>
                    </div>
                </div>

                <div id="timeline" class="tab-content">
                    <div style="text-align: center; color: #888; padding: 60px;">
                        点击「运行模拟」按钮查看时间线
                    </div>
                </div>

                <div id="frames" class="tab-content">
                    <div style="text-align: center; color: #888; padding: 60px;">
                        点击「运行模拟」按钮查看帧详情
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let defaultConfig = null;
        let srpStreams = null;
        let currentResult = null;
        let delayChart = null;
        let throughputChart = null;

        async function loadConfig() {
            const [configResp, srpResp] = await Promise.all([
                fetch('/api/config'),
                fetch('/api/srp/streams')
            ]);
            defaultConfig = await configResp.json();
            srpStreams = await srpResp.json();
            renderQueueConfigs();
            renderFlowConfigs();
            renderSRPConfigs();
        }

        function renderQueueConfigs() {
            const container = document.getElementById('queueConfigs');
            container.innerHTML = '';
            
            defaultConfig.queues.forEach((queue, idx) => {
                const div = document.createElement('div');
                div.className = 'queue-config';
                div.innerHTML = `
                    <h4>队列 ${queue.queueId} (优先级: ${queue.priority})</h4>
                    <div class="form-group" style="margin-bottom:8px;">
                        <label>保护带 (ns)</label>
                        <input type="number" id="guardband-${idx}" value="${queue.guardBand || 12000}" min="0" step="100">
                    </div>
                    <div id="gcl-${idx}"></div>
                    <button style="margin-top:8px;padding:4px 12px;background:#667eea;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;" onclick="addGCLEntry(${idx})">+ 添加门控项</button>
                `;
                container.appendChild(div);
                renderGCLEntries(idx, queue.gateControlList);
            });
        }

        function renderGCLEntries(queueIdx, entries) {
            const container = document.getElementById(`gcl-${queueIdx}`);
            container.innerHTML = entries.map((entry, idx) => `
                <div class="gcl-entry">
                    <select id="gcl-${queueIdx}-op-${idx}">
                        <option value="OPEN" ${entry.operation === 'OPEN' ? 'selected' : ''}>打开</option>
                        <option value="CLOSE" ${entry.operation === 'CLOSE' ? 'selected' : ''}>关闭</option>
                    </select>
                    <input type="number" id="gcl-${queueIdx}-time-${idx}" value="${entry.timeInterval}" placeholder="时间(ns)" style="width: 100px;">
                    <button onclick="removeGCLEntry(${queueIdx}, ${idx})" style="background:#ff4444;color:white;border:none;border-radius:4px;width:24px;height:24px;cursor:pointer;">×</button>
                </div>
            `).join('');
        }

        function addGCLEntry(queueIdx) {
            const entries = getGCLEntries(queueIdx);
            entries.push({ operation: 'OPEN', timeInterval: 100000 });
            renderGCLEntries(queueIdx, entries);
        }

        function removeGCLEntry(queueIdx, entryIdx) {
            const entries = getGCLEntries(queueIdx);
            if (entries.length > 1) {
                entries.splice(entryIdx, 1);
                renderGCLEntries(queueIdx, entries);
            }
        }

        function getGCLEntries(queueIdx) {
            const container = document.getElementById(`gcl-${queueIdx}`);
            const entries = [];
            const entryDivs = container.querySelectorAll('.gcl-entry');
            entryDivs.forEach((_, i) => {
                const op = document.getElementById(`gcl-${queueIdx}-op-${i}`)?.value;
                const time = parseFloat(document.getElementById(`gcl-${queueIdx}-time-${i}`)?.value || 0);
                if (op) {
                    entries.push({ operation: op, timeInterval: time });
                }
            });
            return entries;
        }

        function renderFlowConfigs() {
            const container = document.getElementById('flowConfigs');
            container.innerHTML = defaultConfig.flows.map((flow, idx) => `
                <div class="queue-config">
                    <h4>${flow.flowType}</h4>
                    <div class="form-group" style="margin-bottom:8px;">
                        <label>帧大小 (字节)</label>
                        <input type="number" id="flow-size-${idx}" value="${flow.frameSize}">
                    </div>
                    <div class="form-group" style="margin-bottom:8px;">
                        <label>间隔 (ns)</label>
                        <input type="number" id="flow-interval-${idx}" value="${flow.interval}">
                    </div>
                    <div class="form-group">
                        <label>优先级</label>
                        <input type="number" id="flow-priority-${idx}" value="${flow.priority}" min="0" max="7">
                    </div>
                </div>
            `).join('');
        }

        function buildConfig() {
            const duration = parseInt(document.getElementById('duration').value);
            const bandwidth = parseFloat(document.getElementById('bandwidth').value);

            const queues = defaultConfig.queues.map((queue, idx) => ({
                ...queue,
                guardBand: parseInt(document.getElementById(`guardband-${idx}`)?.value || 0),
                gateControlList: getGCLEntries(idx)
            }));

            const flows = defaultConfig.flows.map((flow, idx) => ({
                ...flow,
                frameSize: parseInt(document.getElementById(`flow-size-${idx}`).value),
                interval: parseFloat(document.getElementById(`flow-interval-${idx}`).value),
                priority: parseInt(document.getElementById(`flow-priority-${idx}`).value)
            }));

            return {
                duration: duration * 1000000,
                timeSlot: 1000,
                portBandwidth: bandwidth,
                queues,
                flows
            };
        }

        function renderSRPConfigs() {
            const container = document.getElementById('srpConfigs');
            container.innerHTML = srpStreams.map((stream, idx) => {
                const listeners = stream.listeners || [];
                return `
                <div class="stream-config">
                    <h4>${stream.streamName}</h4>
                    <div class="form-group" style="margin-bottom:6px;">
                        <label style="font-size:12px;">流ID</label>
                        <input type="text" id="srp-id-${idx}" value="${stream.streamId}" style="font-size:12px;padding:6px;">
                    </div>
                    <div class="form-group" style="margin-bottom:6px;">
                        <label style="font-size:12px;">Talker MAC</label>
                        <input type="text" id="srp-talker-${idx}" value="${stream.talker.endStationMac}" style="font-size:12px;padding:6px;">
                    </div>
                    <div class="form-group" style="margin-bottom:6px;">
                        <label style="font-size:12px;">最大帧大小</label>
                        <input type="number" id="srp-framesize-${idx}" value="${stream.talker.maxFrameSize}" style="font-size:12px;padding:6px;">
                    </div>
                    <div class="form-group" style="margin-bottom:6px;">
                        <label style="font-size:12px;">优先级</label>
                        <input type="number" id="srp-priority-${idx}" value="${stream.talker.dataFramePriority}" min="0" max="7" style="font-size:12px;padding:6px;">
                    </div>
                    <div class="form-group" style="margin-bottom:6px;">
                        <label style="font-size:12px;">等级</label>
                        <select id="srp-rank-${idx}" style="font-size:12px;padding:6px;">
                            <option value="HIGH" ${stream.talker.rank === 'HIGH' ? 'selected' : ''}>HIGH</option>
                            <option value="MEDIUM" ${stream.talker.rank === 'MEDIUM' ? 'selected' : ''}>MEDIUM</option>
                            <option value="LOW" ${stream.talker.rank === 'LOW' ? 'selected' : ''}>LOW</option>
                        </select>
                    </div>
                    <div style="font-size:11px;color:#666;margin-top:5px;">
                        <strong>Listeners:</strong>
                        ${listeners.map(l => `
                            <div class="listener-config">
                                ${l.endStationMac}
                            </div>
                        `).join('')}
                    </div>
                </div>
                `;
            }).join('');
        }

        function getSRPStreams() {
            return srpStreams.map((stream, idx) => ({
                ...stream,
                streamId: document.getElementById(`srp-id-${idx}`)?.value || stream.streamId,
                talker: {
                    ...stream.talker,
                    endStationMac: document.getElementById(`srp-talker-${idx}`)?.value || stream.talker.endStationMac,
                    maxFrameSize: parseInt(document.getElementById(`srp-framesize-${idx}`)?.value || stream.talker.maxFrameSize),
                    dataFramePriority: parseInt(document.getElementById(`srp-priority-${idx}`)?.value || stream.talker.dataFramePriority),
                    rank: document.getElementById(`srp-rank-${idx}`)?.value || stream.talker.rank
                }
            }));
        }

        async function reserveStreams() {
            const resultDiv = document.getElementById('reservationResult');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner" style="width:20px;height:20px;"></div>检查带宽...</div>';

            try {
                const streams = getSRPStreams();
                const response = await fetch('/api/srp/reserve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ streams })
                });

                const result = await response.json();
                const success = result.failureCount === 0;
                
                resultDiv.innerHTML = `
                    <div class="reservation-result ${success ? '' : 'reservation-failed'}">
                        <div style="font-weight:bold;margin-bottom:8px;">
                            ${success ? '✅ 带宽预留成功' : '❌ 带宽预留失败'}
                        </div>
                        <div style="font-size:12px;">
                            <div>请求带宽: ${result.totalRequested.toFixed(2)} Mbps</div>
                            <div>预留带宽: ${result.totalReserved.toFixed(2)} Mbps</div>
                            <div>剩余带宽: ${result.remainingBandwidth.toFixed(2)} Mbps</div>
                            <div style="margin-top:5px;">
                                成功: ${result.successCount}, 失败: ${result.failureCount}
                            </div>
                        </div>
                        ${result.streams.filter(s => s.status === 'FAILED').map(s => `
                            <div style="font-size:11px;color:#f44336;margin-top:5px;">
                                ${s.streamName}: ${s.failureReason}
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div style="color:#f44336;font-size:12px;">错误: ${error.message}</div>`;
            }
        }

        async function exportXML() {
            try {
                const config = buildConfig();
                const streams = getSRPStreams();
                
                const response = await fetch('/api/export/xml', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ simulationConfig: config, streams })
                });

                const xmlContent = await response.text();
                downloadFile(xmlContent, 'tsn-config.xml', 'application/xml');
            } catch (error) {
                alert('导出失败: ' + error.message);
            }
        }

        async function exportGCLXML() {
            try {
                const config = buildConfig();
                
                const response = await fetch('/api/export/gcl-xml', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                const xmlContent = await response.text();
                downloadFile(xmlContent, 'ieee8021qbv-gcl.xml', 'application/xml');
            } catch (error) {
                alert('导出失败: ' + error.message);
            }
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function switchConfigTab(tabName) {
            document.querySelectorAll('.config-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.config-panel').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`config-${tabName}`).classList.add('active');
        }

        async function runSimulation() {
            const btn = document.getElementById('runBtn');
            const results = document.getElementById('results');
            const timeline = document.getElementById('timeline');
            const frames = document.getElementById('frames');

            btn.disabled = true;
            results.innerHTML = '<div class="loading"><div class="spinner"></div>正在模拟...</div>';
            timeline.innerHTML = '<div class="loading"><div class="spinner"></div>正在模拟...</div>';
            frames.innerHTML = '<div class="loading"><div class="spinner"></div>正在模拟...</div>';

            try {
                const config = buildConfig();
                const response = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                currentResult = await response.json();
                renderResults(currentResult);
                renderTimeline(currentResult, config);
                renderFrames(currentResult);
            } catch (error) {
                results.innerHTML = `<div style="color:red;text-align:center;padding:40px;">错误: ${error.message}</div>`;
            }

            btn.disabled = false;
        }

        function renderResults(result) {
            const container = document.getElementById('results');
            
            const avgDelayNs = result.avgDelay.toFixed(2);
            const maxDelayNs = result.maxDelay.toFixed(2);

            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="value">${result.totalFrames}</div>
                        <div class="label">总帧数</div>
                    </div>
                    <div class="stat-card">
                        <div class="value">${result.transmitted}</div>
                        <div class="label">成功传输</div>
                    </div>
                    <div class="stat-card">
                        <div class="value">${result.dropped}</div>
                        <div class="label">丢弃</div>
                    </div>
                    <div class="stat-card">
                        <div class="value">${avgDelayNs}ns</div>
                        <div class="label">平均延迟</div>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="delayChart"></canvas>
                </div>

                <div class="chart-container">
                    <canvas id="throughputChart"></canvas>
                </div>

                <div class="queue-stats">
                    <h3>队列统计</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>队列</th>
                                <th>入队</th>
                                <th>出队</th>
                                <th>丢弃</th>
                                <th>平均深度</th>
                                <th>最大深度</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${result.queueStats.map(q => `
                                <tr>
                                    <td>${q.queueId}</td>
                                    <td>${q.enqueued}</td>
                                    <td>${q.dequeued}</td>
                                    <td>${q.dropped}</td>
                                    <td>${q.avgQueueDepth.toFixed(2)}</td>
                                    <td>${q.maxQueueDepth}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            renderDelayChart(result);
            renderThroughputChart(result);
        }

        function renderDelayChart(result) {
            const ctx = document.getElementById('delayChart').getContext('2d');
            
            const flowColors = {
                'AVB-Class-A': 'rgba(255, 99, 132, 0.8)',
                'AVB-Class-B': 'rgba(54, 162, 235, 0.8)',
                'Control': 'rgba(255, 206, 86, 0.8)',
                'Best-Effort': 'rgba(75, 192, 192, 0.8)'
            };

            const flows = {};
            result.frames.forEach(frame => {
                if (!flows[frame.flowId]) {
                    flows[frame.flowId] = { type: frame.flowType, delays: [] };
                }
                flows[frame.flowId].delays.push({
                    x: frame.enqueueTime,
                    y: frame.delay
                });
            });

            const datasets = Object.entries(flows).map(([flowId, data]) => ({
                label: flowId,
                data: data.delays,
                borderColor: flowColors[data.type] || '#667eea',
                backgroundColor: flowColors[data.type] || '#667eea',
                pointRadius: 3,
                showLine: false
            }));

            if (delayChart) delayChart.destroy();
            delayChart = new Chart(ctx, {
                type: 'scatter',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: '帧延迟分布' }
                    },
                    scales: {
                        x: { title: { display: true, text: '时间 (ns)' } },
                        y: { title: { display: true, text: '延迟 (ns)' } }
                    }
                }
            });
        }

        function renderThroughputChart(result) {
            const ctx = document.getElementById('throughputChart').getContext('2d');
            
            const timeBuckets = {};
            const bucketSize = 100000;

            result.frames.forEach(frame => {
                const bucket = Math.floor(frame.dequeueTime / bucketSize);
                if (!timeBuckets[bucket]) timeBuckets[bucket] = { bytes: 0, frames: 0 };
                timeBuckets[bucket].bytes += frame.size;
                timeBuckets[bucket].frames++;
            });

            const data = Object.entries(timeBuckets).map(([bucket, data]) => ({
                x: parseInt(bucket) * bucketSize,
                y: data.bytes * 8 / (bucketSize / 1000000000) / 1000000
            })).sort((a, b) => a.x - b.x);

            if (throughputChart) throughputChart.destroy();
            throughputChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: '吞吐量 (Mbps)',
                        data,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.2)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: '吞吐量时间曲线' }
                    },
                    scales: {
                        x: { type: 'linear', title: { display: true, text: '时间 (ns)' } },
                        y: { title: { display: true, text: '吞吐量 (Mbps)' }, beginAtZero: true }
                    }
                }
            });
        }

        function renderTimeline(result, config) {
            const container = document.getElementById('timeline');
            const duration = config.duration;

            const flowColors = {
                'AVB-Class-A': 'rgba(255, 99, 132, 0.8)',
                'AVB-Class-B': 'rgba(54, 162, 235, 0.8)',
                'Control': 'rgba(255, 206, 86, 0.8)',
                'Best-Effort': 'rgba(75, 192, 192, 0.8)'
            };

            let timelineHTML = '<h3>门控状态时间线</h3><div class="timeline">';

            config.queues.sort((a, b) => b.priority - a.priority).forEach(queue => {
                const segments = generateGateSegments(queue, duration);
                timelineHTML += `
                    <div class="gate-row">
                        <div class="gate-label">队列 ${queue.queueId}</div>
                        <div class="gate-bar">
                            ${segments.map(seg => `
                                <div class="gate-segment gate-${seg.state.toLowerCase()}" 
                                     style="left: ${seg.start * 100}%; width: ${seg.width * 100}%;"
                                     title="${seg.state === 'OPEN' ? '打开' : '关闭'}: ${(seg.start * duration).toFixed(0)}ns - ${((seg.start + seg.width) * duration).toFixed(0)}ns">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            timelineHTML += `
                <div class="gate-row">
                    <div class="gate-label">帧传输</div>
                    <div class="frame-markers">
                        ${result.frames.map(frame => `
                            <div class="frame-marker flow-type-${frame.flowType.replace(/\s/g, '-')}"
                                 style="left: ${frame.enqueueTime / duration * 100}%;"
                                 title="${frame.flowId} - 延迟: ${frame.delay.toFixed(2)}ns">
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            timelineHTML += '</div>';

            timelineHTML += `
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: linear-gradient(90deg, #4caf50, #8bc34a);"></div>
                        <span>门打开</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: linear-gradient(90deg, #f44336, #ff5722);"></div>
                        <span>门关闭</span>
                    </div>
                    ${Object.entries(flowColors).map(([type, color]) => `
                        <div class="legend-item">
                            <div class="legend-color" style="background: ${color};"></div>
                            <span>${type}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            const ticks = 5;
            timelineHTML += '<div class="time-axis">';
            for (let i = 0; i <= ticks; i++) {
                timelineHTML += `<span>${(i * duration / ticks).toFixed(0)}ns</span>`;
            }
            timelineHTML += '</div>';

            container.innerHTML = timelineHTML;
        }

        function generateGateSegments(queue, duration) {
            const segments = [];
            let currentTime = 0;
            let gclIndex = 0;
            let timeInEntry = 0;

            while (currentTime < duration) {
                const entry = queue.gateControlList[gclIndex];
                const remaining = entry.timeInterval - timeInEntry;
                const segmentDuration = Math.min(remaining, duration - currentTime);

                segments.push({
                    state: entry.operation,
                    start: currentTime / duration,
                    width: segmentDuration / duration
                });

                timeInEntry += segmentDuration;
                currentTime += segmentDuration;

                if (timeInEntry >= entry.timeInterval) {
                    gclIndex = (gclIndex + 1) % queue.gateControlList.length;
                    timeInEntry = 0;
                }
            }

            return segments;
        }

        function renderFrames(result) {
            const container = document.getElementById('frames');
            
            container.innerHTML = `
                <h3>帧传输详情 (前100条)</h3>
                <div style="max-height: 500px; overflow-y: auto;">
                    <table style="width:100%;border-collapse:collapse;font-size:12px;">
                        <thead style="position:sticky;top:0;background:white;">
                            <tr>
                                <th style="padding:8px;background:#667eea;color:white;text-align:left;">帧ID</th>
                                <th style="padding:8px;background:#667eea;color:white;text-align:left;">流类型</th>
                                <th style="padding:8px;background:#667eea;color:white;text-align:center;">大小</th>
                                <th style="padding:8px;background:#667eea;color:white;text-align:center;">入队时间(ns)</th>
                                <th style="padding:8px;background:#667eea;color:white;text-align:center;">出队时间(ns)</th>
                                <th style="padding:8px;background:#667eea;color:white;text-align:center;">延迟(ns)</th>
                                <th style="padding:8px;background:#667eea;color:white;text-align:center;">队列</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${result.frames.slice(0, 100).map(frame => `
                                <tr>
                                    <td style="padding:6px;border-bottom:1px solid #eee;">${frame.frameId.slice(0, 20)}...</td>
                                    <td style="padding:6px;border-bottom:1px solid #eee;">${frame.flowType}</td>
                                    <td style="padding:6px;border-bottom:1px solid #eee;text-align:center;">${frame.size}B</td>
                                    <td style="padding:6px;border-bottom:1px solid #eee;text-align:center;">${frame.enqueueTime.toFixed(0)}ns</td>
                                    <td style="padding:6px;border-bottom:1px solid #eee;text-align:center;">${frame.dequeueTime.toFixed(0)}ns</td>
                                    <td style="padding:6px;border-bottom:1px solid #eee;text-align:center;font-weight:bold;color:${frame.delay > 500000 ? '#f44336' : '#4caf50'}">${frame.delay.toFixed(0)}ns</td>
                                    <td style="padding:6px;border-bottom:1px solid #eee;text-align:center;">${frame.queueId}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <p style="margin-top:10px;color:#666;font-size:12px;text-align:right;">显示 ${Math.min(100, result.frames.length)} / ${result.frames.length} 条记录</p>
            `;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        loadConfig();
    </script>
</body>
</html>
