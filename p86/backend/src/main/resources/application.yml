server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/queryhistory
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
