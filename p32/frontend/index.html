<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鱼类检测跟踪系统 - Fish Detection & Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0c4a6e 0%, #164e63 50%, #134e4a 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .upload-zone {
            border: 3px dashed #0891b2;
            transition: all 0.3s ease;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: #06b6d4;
            background-color: rgba(6, 182, 212, 0.1);
        }
        .status-pending { background-color: #fef3c7; color: #92400e; }
        .status-processing { background-color: #dbeafe; color: #1e40af; }
        .status-completed { background-color: #d1fae5; color: #065f46; }
        .status-failed { background-color: #fee2e2; color: #991b1b; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .heatmap-canvas {
            max-width: 100%;
            height: auto;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 3px solid currentColor;
            animation: pulse-ring 1.5s ease-out infinite;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <nav class="bg-black/30 backdrop-blur-md border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">FishTrack AI</h1>
                        <p class="text-xs text-cyan-300">水下鱼类检测跟踪系统</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-300">YOLOv8 + DeepSORT</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <section class="mb-12">
            <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8 border border-white/10">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold mb-2">上传水下视频</h2>
                    <p class="text-gray-300">支持 MP4, AVI, MOV 格式，系统将自动检测并跟踪鱼类</p>
                </div>
                
                <div id="uploadZone" class="upload-zone rounded-2xl p-12 text-center cursor-pointer mb-6">
                    <input type="file" id="videoInput" accept="video/*" class="hidden">
                    <div class="flex flex-col items-center">
                        <div class="w-20 h-20 bg-cyan-500/20 rounded-full flex items-center justify-center mb-4">
                            <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                            </svg>
                        </div>
                        <p class="text-lg font-medium mb-2">点击或拖拽视频文件到此处</p>
                        <p class="text-sm text-gray-400">支持 .mp4, .avi, .mov 格式</p>
                    </div>
                </div>

                <div id="uploadProgress" class="hidden">
                    <div class="flex items-center justify-between mb-2">
                        <span id="uploadFileName" class="text-sm"></span>
                        <span id="uploadPercent" class="text-sm text-cyan-400">0%</span>
                    </div>
                    <div class="h-2 bg-white/10 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-gradient-to-r from-cyan-500 to-blue-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold">分析任务列表</h2>
                <button id="refreshBtn" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg transition-all flex items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    <span>刷新</span>
                </button>
            </div>

            <div id="taskList" class="grid gap-4">
            </div>

            <div id="emptyState" class="text-center py-16">
                <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-12 h-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                </div>
                <p class="text-gray-400 text-lg">暂无分析任务</p>
                <p class="text-gray-500 text-sm mt-2">上传视频开始检测分析</p>
            </div>
        </section>
    </main>

    <div id="detailModal" class="modal">
        <div class="bg-gray-900 rounded-3xl max-w-6xl w-full mx-4 my-8 overflow-hidden">
            <div class="bg-gradient-to-r from-cyan-600 to-blue-600 p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 id="modalTitle" class="text-2xl font-bold">任务详情</h3>
                        <p id="modalSubtitle" class="text-cyan-100 text-sm mt-1"></p>
                    </div>
                    <button id="closeModal" class="w-10 h-10 bg-white/20 hover:bg-white/30 rounded-full flex items-center justify-center transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="p-6 max-h-[calc(100vh-200px)] overflow-y-auto">
                <div id="modalStats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                </div>

                <div class="grid md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-white/5 rounded-2xl p-6">
                        <h4 class="text-lg font-semibold mb-4 flex items-center">
                            <span class="w-8 h-8 bg-orange-500/20 rounded-lg flex items-center justify-center mr-3">
                                <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/>
                                </svg>
                            </span>
                            轨迹热力图
                        </h4>
                        <div id="heatmapContainer" class="bg-black/30 rounded-xl overflow-hidden">
                            <img id="heatmapImg" class="w-full heatmap-canvas" alt="Heatmap">
                        </div>
                    </div>

                    <div class="bg-white/5 rounded-2xl p-6">
                        <h4 class="text-lg font-semibold mb-4 flex items-center">
                            <span class="w-8 h-8 bg-green-500/20 rounded-lg flex items-center justify-center mr-3">
                                <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                                </svg>
                            </span>
                            计数曲线
                        </h4>
                        <div class="bg-black/30 rounded-xl overflow-hidden">
                            <canvas id="countChart" height="250"></canvas>
                        </div>
                    </div>
                </div>

                <div class="bg-white/5 rounded-2xl p-6 mb-6">
                    <h4 class="text-lg font-semibold mb-4 flex items-center">
                        <span class="w-8 h-8 bg-purple-500/20 rounded-lg flex items-center justify-center mr-3">
                            <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                            </svg>
                        </span>
                        鱼类分类统计
                    </h4>
                    <div id="fishTypeChartContainer" class="bg-black/30 rounded-xl p-4">
                        <canvas id="fishTypeChart" height="200"></canvas>
                    </div>
                </div>

                <div class="bg-white/5 rounded-2xl p-6 mb-6">
                    <h4 class="text-lg font-semibold mb-4 flex items-center">
                        <span class="w-8 h-8 bg-cyan-500/20 rounded-lg flex items-center justify-center mr-3">
                            <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                            </svg>
                        </span>
                        行为分析图表
                    </h4>
                    <div id="behaviorChartContainer" class="bg-black/30 rounded-xl p-4">
                        <canvas id="behaviorChart" height="200"></canvas>
                    </div>
                </div>

                <div class="bg-white/5 rounded-2xl p-6 mb-6">
                    <h4 class="text-lg font-semibold mb-4 flex items-center">
                        <span class="w-8 h-8 bg-blue-500/20 rounded-lg flex items-center justify-center mr-3">
                            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                            </svg>
                        </span>
                        尺寸-速度分布
                    </h4>
                    <div id="sizeSpeedChartContainer" class="bg-black/30 rounded-xl p-4">
                        <canvas id="sizeSpeedChart" height="200"></canvas>
                    </div>
                </div>

                <div class="flex justify-center">
                    <button id="exportBtn" class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 rounded-xl font-semibold transition-all flex items-center space-x-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <span>导出 CSV 报告</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentTaskId = null;
        let countChart = null;
        let fishTypeChart = null;
        let behaviorChart = null;
        let sizeSpeedChart = null;

        const uploadZone = document.getElementById('uploadZone');
        const videoInput = document.getElementById('videoInput');
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        const detailModal = document.getElementById('detailModal');
        const uploadProgress = document.getElementById('uploadProgress');
        const progressBar = document.getElementById('progressBar');

        uploadZone.addEventListener('click', () => videoInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('video/')) {
                uploadVideo(files[0]);
            }
        });

        videoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadVideo(e.target.files[0]);
            }
        });

        async function uploadVideo(file) {
            const formData = new FormData();
            formData.append('file', file);

            uploadProgress.classList.remove('hidden');
            document.getElementById('uploadFileName').textContent = file.name;
            
            try {
                const response = await fetch(`${API_BASE}/api/videos/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    progressBar.style.width = '100%';
                    document.getElementById('uploadPercent').textContent = '100%';
                    setTimeout(() => {
                        uploadProgress.classList.add('hidden');
                        progressBar.style.width = '0%';
                        loadTasks();
                    }, 1000);
                }
            } catch (error) {
                console.error('Upload error:', error);
                alert('上传失败，请重试');
            }
        }

        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/api/videos`);
                const tasks = await response.json();
                
                if (tasks.length === 0) {
                    emptyState.classList.remove('hidden');
                    taskList.innerHTML = '';
                    return;
                }

                emptyState.classList.add('hidden');
                taskList.innerHTML = tasks.map(task => createTaskCard(task)).join('');
                
                document.querySelectorAll('.view-details').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const taskId = e.currentTarget.dataset.taskId;
                        showTaskDetail(taskId);
                    });
                });
            } catch (error) {
                console.error('Load tasks error:', error);
            }
        }

        function createTaskCard(task) {
            const statusClass = `status-${task.status}`;
            const statusText = {
                'pending': '等待中',
                'processing': '处理中',
                'completed': '已完成',
                'failed': '失败'
            }[task.status] || task.status;

            const fishTypesHtml = Object.entries(task.fish_types || {})
                .map(([type, count]) => `<span class="px-2 py-1 bg-white/10 rounded text-xs">${type}: ${count}</span>`)
                .join('');

            return `
                <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/10 card-hover">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-3 mb-2">
                                <h3 class="text-lg font-semibold">${task.filename}</h3>
                                <span class="${statusClass} px-3 py-1 rounded-full text-xs font-medium">${statusText}</span>
                            </div>
                            <p class="text-sm text-gray-400 mb-3">任务ID: ${task.id}</p>
                            
                            ${task.status === 'completed' ? `
                                <div class="flex flex-wrap items-center gap-3 mb-3">
                                    <div class="flex items-center">
                                        <span class="text-2xl font-bold text-cyan-400 mr-2">${task.fish_count}</span>
                                        <span class="text-sm text-gray-400">条鱼</span>
                                    </div>
                                    <div class="flex flex-wrap gap-2">
                                        ${fishTypesHtml || '<span class="text-gray-500 text-sm">未分类</span>'}
                                    </div>
                                </div>
                            ` : ''}
                            
                            <p class="text-xs text-gray-500">创建时间: ${new Date(task.created_at).toLocaleString('zh-CN')}</p>
                        </div>
                        
                        ${task.status === 'completed' ? `
                            <button class="view-details px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded-lg text-sm font-medium transition-all" data-task-id="${task.id}">
                                查看详情
                            </button>
                        ` : task.status === 'processing' ? `
                            <div class="flex items-center space-x-2 text-cyan-400">
                                <div class="w-4 h-4 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
                                <span class="text-sm">处理中...</span>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        async function showTaskDetail(taskId) {
            currentTaskId = taskId;
            detailModal.classList.add('active');
            
            try {
                const response = await fetch(`${API_BASE}/api/videos/${taskId}`);
                const task = await response.json();
                
                document.getElementById('modalTitle').textContent = task.filename;
                document.getElementById('modalSubtitle').textContent = `任务ID: ${task.id} | 创建时间: ${new Date(task.created_at).toLocaleString('zh-CN')}`;
                
                document.getElementById('modalStats').innerHTML = `
                    <div class="bg-white/5 rounded-xl p-4 text-center">
                        <div class="text-3xl font-bold text-cyan-400">${task.fish_count}</div>
                        <div class="text-sm text-gray-400 mt-1">总鱼类数</div>
                    </div>
                    <div class="bg-white/5 rounded-xl p-4 text-center">
                        <div class="text-3xl font-bold text-green-400">${Object.keys(task.fish_types || {}).length}</div>
                        <div class="text-sm text-gray-400 mt-1">鱼类种类</div>
                    </div>
                    <div class="bg-white/5 rounded-xl p-4 text-center">
                        <div class="text-3xl font-bold text-purple-400">${task.track_data?.tracks ? Object.keys(task.track_data.tracks).length : 0}</div>
                        <div class="text-sm text-gray-400 mt-1">轨迹数量</div>
                    </div>
                    <div class="bg-white/5 rounded-xl p-4 text-center">
                        <div class="text-3xl font-bold text-orange-400">${task.track_data?.total_frames || 0}</div>
                        <div class="text-sm text-gray-400 mt-1">视频帧数</div>
                    </div>
                `;

                document.getElementById('heatmapImg').src = `${API_BASE}/api/videos/${taskId}/heatmap?t=${Date.now()}`;

                if (task.track_data) {
                    renderCountChart(task.track_data.count_per_frame, task.track_data.fps);
                    renderFishTypeChart(task.fish_types);
                    renderBehaviorCharts(task.track_data.behavior_analysis);
                }
            } catch (error) {
                console.error('Load task detail error:', error);
            }
        }

        function renderCountChart(countData, fps) {
            const ctx = document.getElementById('countChart').getContext('2d');
            
            if (countChart) {
                countChart.destroy();
            }

            const labels = countData.map((_, i) => (i / fps).toFixed(1));
            const step = Math.max(1, Math.floor(countData.length / 100));
            const sampledLabels = labels.filter((_, i) => i % step === 0);
            const sampledData = countData.filter((_, i) => i % step === 0);

            countChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sampledLabels,
                    datasets: [{
                        label: '鱼类数量',
                        data: sampledData,
                        borderColor: '#06b6d4',
                        backgroundColor: 'rgba(6, 182, 212, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '时间 (秒)',
                                color: '#9ca3af'
                            },
                            ticks: {
                                color: '#6b7280',
                                maxTicksLimit: 10
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '数量',
                                color: '#9ca3af'
                            },
                            ticks: {
                                color: '#6b7280'
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            }
                        }
                    }
                }
            });
        }

        function renderFishTypeChart(fishTypes) {
            const ctx = document.getElementById('fishTypeChart').getContext('2d');
            
            if (fishTypeChart) {
                fishTypeChart.destroy();
            }

            const labels = Object.keys(fishTypes || {});
            const data = Object.values(fishTypes || {});
            const colors = ['#06b6d4', '#8b5cf6', '#f59e0b', '#10b981', '#ef4444', '#3b82f6'];

            fishTypeChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.length ? labels : ['未检测到'],
                    datasets: [{
                        label: '数量',
                        data: data.length ? data : [0],
                        backgroundColor: colors.slice(0, labels.length || 1),
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#9ca3af'
                            },
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            ticks: {
                                color: '#6b7280',
                                stepSize: 1
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            }
                        }
                    }
                }
            });
        }

        function renderBehaviorCharts(behaviorAnalysis) {
            const behaviorCtx = document.getElementById('behaviorChart').getContext('2d');
            const sizeSpeedCtx = document.getElementById('sizeSpeedChart').getContext('2d');
            
            if (behaviorChart) {
                behaviorChart.destroy();
            }
            if (sizeSpeedChart) {
                sizeSpeedChart.destroy();
            }

            if (!behaviorAnalysis) {
                return;
            }

            const avgSpeeds = [];
            const avgSizes = [];
            const avgTurnAngles = [];
            const labels = [];

            for (const [trackId, data] of Object.entries(behaviorAnalysis)) {
                const summary = data.summary || {};
                labels.push(`Fish ${trackId}`);
                avgSpeeds.push(summary.avg_speed_cm_s || 0);
                avgSizes.push(summary.avg_size_cm || 0);
                avgTurnAngles.push(summary.avg_turn_angle_deg || 0);
            }

            behaviorChart = new Chart(behaviorCtx, {
                type: 'bar',
                data: {
                    labels: labels.length ? labels : ['无数据'],
                    datasets: [
                        {
                            label: '平均速度 (cm/s)',
                            data: avgSpeeds.length ? avgSpeeds : [0],
                            backgroundColor: 'rgba(6, 182, 212, 0.7)',
                            yAxisID: 'y'
                        },
                        {
                            label: '平均转向角 (°)',
                            data: avgTurnAngles.length ? avgTurnAngles : [0],
                            backgroundColor: 'rgba(245, 158, 11, 0.7)',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#9ca3af'
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#9ca3af',
                                maxTicksLimit: 10
                            },
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            type: 'linear',
                            position: 'left',
                            title: {
                                display: true,
                                text: '速度 (cm/s)',
                                color: '#06b6d4'
                            },
                            ticks: {
                                color: '#6b7280'
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            title: {
                                display: true,
                                text: '转向角 (°)',
                                color: '#f59e0b'
                            },
                            ticks: {
                                color: '#6b7280'
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });

            sizeSpeedChart = new Chart(sizeSpeedCtx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: '鱼类',
                        data: avgSizes.map((size, i) => ({ x: size, y: avgSpeeds[i] })),
                        backgroundColor: 'rgba(139, 92, 246, 0.6)',
                        pointRadius: 8,
                        pointHoverRadius: 12
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `尺寸: ${context.parsed.x.toFixed(2)} cm, 速度: ${context.parsed.y.toFixed(2)} cm/s`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '平均尺寸 (cm)',
                                color: '#8b5cf6'
                            },
                            ticks: {
                                color: '#6b7280'
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '平均速度 (cm/s)',
                                color: '#8b5cf6'
                            },
                            ticks: {
                                color: '#6b7280'
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            }
                        }
                    }
                }
            });
        }

        document.getElementById('closeModal').addEventListener('click', () => {
            detailModal.classList.remove('active');
        });

        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) {
                detailModal.classList.remove('active');
            }
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            if (currentTaskId) {
                window.open(`${API_BASE}/api/videos/${currentTaskId}/export`, '_blank');
            }
        });

        document.getElementById('refreshBtn').addEventListener('click', loadTasks);

        loadTasks();
        setInterval(loadTasks, 5000);
    </script>
</body>
</html>
