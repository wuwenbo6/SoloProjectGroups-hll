<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梯形图编辑器 - STM32 C代码生成器</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/blockly@10.2.2/dist/blockly_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly@10.2.2/dist/blocks_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly@10.2.2/dist/javascript_compressed.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔧 梯形图编辑器</h1>
            <p class="subtitle">可视化编程 → STM32 HAL库 C代码</p>
            <div class="header-actions">
                <button id="generateBtn" class="btn btn-primary">生成 C 代码</button>
                <button id="downloadBtn" class="btn btn-success">下载 Keil 工程</button>
                <button id="downloadArduinoBtn" class="btn btn-info">下载 Arduino 库</button>
                <button id="clearBtn" class="btn btn-danger">清空画布</button>
            </div>
        </header>

        <div class="main-content">
            <div class="editor-section">
                <div class="section-title">
                    <span>📐 梯形图编辑器</span>
                    <span class="hint">从左侧拖拽块到画布</span>
                </div>
                <div id="blocklyDiv"></div>
            </div>

            <div class="preview-section">
                <div class="section-title">
                    <span>📄 生成的 C 代码</span>
                    <button id="copyBtn" class="btn btn-small">复制代码</button>
                </div>
                <pre id="codePreview"><code class="language-c">// 点击"生成 C 代码"按钮查看生成的代码</code></pre>
            </div>
        </div>

        <div class="status-bar">
            <span id="statusText">就绪</span>
        </div>
    </div>

    <xml xmlns="https://developers.google.com/blockly/xml" id="toolbox" style="display: none">
        <category name="📊 触点" colour="#5C81A6">
            <block type="ladder_contact_normal_open"></block>
            <block type="ladder_contact_normal_close"></block>
            <block type="ladder_contact_positive_edge"></block>
            <block type="ladder_contact_negative_edge"></block>
        </category>
        
        <category name="⚡ 线圈" colour="#7AB366">
            <block type="ladder_coil_output"></block>
            <block type="ladder_coil_set"></block>
            <block type="ladder_coil_reset"></block>
        </category>
        
        <category name="⏱️ 定时器" colour="#D69E2E">
            <block type="ladder_timer_ton"></block>
            <block type="ladder_timer_tof"></block>
            <block type="ladder_timer_tp"></block>
        </category>
        
        <category name="🔢 计数器" colour="#9C27B0">
            <block type="ladder_counter_ctu"></block>
            <block type="ladder_counter_ctd"></block>
            <block type="ladder_counter_ctud"></block>
        </category>
        
        <category name="📏 比较器" colour="#E74C3C">
            <block type="ladder_compare_eq"></block>
            <block type="ladder_compare_ne"></block>
            <block type="ladder_compare_gt"></block>
            <block type="ladder_compare_lt"></block>
            <block type="ladder_compare_ge"></block>
            <block type="ladder_compare_le"></block>
        </category>
        
        <category name="🔀 逻辑" colour="#2ECC71">
            <block type="ladder_logic_and"></block>
            <block type="ladder_logic_or"></block>
            <block type="ladder_logic_not"></block>
        </category>
        
        <category name="📝 变量" colour="#3498DB">
            <block type="ladder_variable_input"></block>
            <block type="ladder_variable_output"></block>
            <block type="ladder_variable_memory"></block>
        </category>
        
        <category name="🎛️ PID控制" colour="#E67E22">
            <block type="ladder_pid_regular"></block>
            <block type="ladder_pid_setpoint"></block>
            <block type="ladder_pid_input"></block>
            <block type="ladder_pid_output"></block>
        </category>
        
        <category name="📋 任务调度" colour="#34495E">
            <block type="ladder_task"></block>
            <block type="ladder_task_cyclic"></block>
        </category>
        
        <category name="🔧 功能块" colour="#1ABC9C">
            <block type="ladder_rung"></block>
        </category>
    </xml>

    <script src="/static/js/blocks.js"></script>
    <script src="/static/js/generator.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
