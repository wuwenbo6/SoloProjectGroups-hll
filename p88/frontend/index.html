<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIT 3D 阻抗成像系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 350px;
            background: rgba(22, 33, 62, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h1 {
            font-size: 1.5rem;
            color: #00ff88;
            text-align: center;
            margin-bottom: 10px;
        }

        .sidebar h2 {
            font-size: 1rem;
            color: #888;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 0.85rem;
            color: #aaa;
            flex: 1;
        }

        input[type="range"] {
            flex: 2;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
        }

        select, input[type="text"], textarea {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border: none;
            border-radius: 6px;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        button.danger {
            background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
            color: #fff;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
            background: #333;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active {
            background: #00ff88;
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle.active::after {
            transform: translateX(24px);
        }

        .value-display {
            font-size: 0.8rem;
            color: #00ff88;
            min-width: 40px;
            text-align: right;
        }

        .main-content {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            font-size: 0.85rem;
            color: #aaa;
        }

        .status-bar span {
            margin-right: 20px;
        }

        .status-bar .success {
            color: #00ff88;
        }

        .status-bar .error {
            color: #ff4757;
        }

        #visualizer-container {
            flex: 1;
            width: 100%;
        }

        .measurement-list {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 5px;
        }

        .measurement-item {
            padding: 8px 10px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.8rem;
        }

        .measurement-item:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        .measurement-item .name {
            color: #fff;
            font-weight: 500;
        }

        .measurement-item .meta {
            color: #888;
            font-size: 0.7rem;
            margin-top: 2px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00ff88;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00ff88;
        }

        .section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .electrode-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .electrode-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .electrode-item.good {
            border: 2px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .electrode-item.fair {
            border: 2px solid #ffa502;
            background: rgba(255, 165, 2, 0.1);
        }

        .electrode-item.poor {
            border: 2px solid #ff4757;
            background: rgba(255, 71, 87, 0.1);
        }

        .electrode-item .electrode-number {
            font-weight: bold;
            font-size: 0.9rem;
        }

        .electrode-item .electrode-status {
            font-size: 0.65rem;
            margin-top: 2px;
        }

        .quality-score {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
            margin: 10px 0;
        }

        .recommendation {
            font-size: 0.8rem;
            padding: 8px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 4px;
            text-align: center;
            margin-top: 10px;
        }

        .recommendation.warning {
            background: rgba(255, 165, 2, 0.1);
            color: #ffa502;
        }

        .recommendation.error {
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
        }

        .dynamic-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .dynamic-controls button {
            flex: 1;
            padding: 8px;
            font-size: 0.8rem;
        }

        button.recording {
            background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .fps-display {
            text-align: center;
            font-size: 0.8rem;
            color: #00ff88;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <h1>🔬 EIT 阻抗成像</h1>
            
            <div class="section">
                <h2>重建设置</h2>
                <div class="control-group">
                    <div class="control-row">
                        <label>重建算法</label>
                        <select id="algorithm-select">
                            <option value="greit">GREIT</option>
                            <option value="gn">高斯牛顿</option>
                        </select>
                    </div>
                    <div class="control-row">
                        <label>正则化强度</label>
                        <input type="range" id="lambda-slider" min="0.001" max="0.5" step="0.001" value="0.05">
                        <span id="lambda-display" class="value-display">0.05</span>
                    </div>
                    <div class="control-row">
                        <label>后处理平滑</label>
                        <input type="range" id="smooth-slider" min="0.1" max="2.0" step="0.1" value="0.8">
                        <span id="smooth-display" class="value-display">0.8</span>
                    </div>
                    <div class="control-row">
                        <label>去噪强度</label>
                        <input type="range" id="denoise-slider" min="0" max="5" step="1" value="3">
                        <span id="denoise-display" class="value-display">3级</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>模拟异常</h2>
                <div class="control-group">
                    <textarea id="anomaly-config" placeholder='[{"x": 0.3, "y": 0.2, "d": 0.2, "perm": 10.0}]'></textarea>
                    <button id="simulate-btn">模拟边界电压</button>
                    <button id="use-default-anomaly" class="secondary">使用默认异常</button>
                </div>
            </div>

            <div class="section">
                <h2>边界电压</h2>
                <div class="control-group">
                    <div class="control-row">
                        <label>基线电压 (v0)</label>
                        <span id="v0-status" class="value-display">未设置</span>
                    </div>
                    <div class="control-row">
                        <label>测量电压 (v1)</label>
                        <span id="v1-status" class="value-display">未设置</span>
                    </div>
                    <button id="reconstruct-btn">开始重建</button>
                </div>
            </div>

            <div class="section">
                <h2>可视化控制</h2>
                <div class="control-group">
                    <div class="control-row">
                        <label>等值面值</label>
                        <input type="range" id="isovalue-slider" min="-1" max="1" step="0.01" value="0.3">
                        <span id="isovalue-display" class="value-display">0.30</span>
                    </div>
                </div>
                
                <h2 style="margin-top: 15px;">切片显示</h2>
                <div class="control-group">
                    <div class="toggle-container">
                        <label>X轴切片</label>
                        <div class="toggle" id="slice-x-toggle"></div>
                    </div>
                    <div class="control-row" id="slice-x-row" style="display: none;">
                        <label>位置</label>
                        <input type="range" id="slice-x-slider" min="0" max="1" step="0.01" value="0.5">
                        <span id="slice-x-display" class="value-display">0.50</span>
                    </div>

                    <div class="toggle-container" style="margin-top: 10px;">
                        <label>Y轴切片</label>
                        <div class="toggle" id="slice-y-toggle"></div>
                    </div>
                    <div class="control-row" id="slice-y-row" style="display: none;">
                        <label>位置</label>
                        <input type="range" id="slice-y-slider" min="0" max="1" step="0.01" value="0.5">
                        <span id="slice-y-display" class="value-display">0.50</span>
                    </div>

                    <div class="toggle-container" style="margin-top: 10px;">
                        <label>Z轴切片</label>
                        <div class="toggle" id="slice-z-toggle"></div>
                    </div>
                    <div class="control-row" id="slice-z-row" style="display: none;">
                        <label>位置</label>
                        <input type="range" id="slice-z-slider" min="0" max="1" step="0.01" value="0.5">
                        <span id="slice-z-display" class="value-display">0.50</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>⚡ 动态实时成像</h2>
                <div class="control-group">
                    <div class="control-row">
                        <label>时间平滑</label>
                        <input type="range" id="temporal-slider" min="0" max="1" step="0.1" value="0.3">
                        <span id="temporal-display" class="value-display">0.3</span>
                    </div>
                    <div class="control-row">
                        <label>帧率 (FPS)</label>
                        <select id="fps-select">
                            <option value="5">5 FPS</option>
                            <option value="10">10 FPS</option>
                            <option value="15" selected>15 FPS</option>
                            <option value="20">20 FPS</option>
                        </select>
                    </div>
                    <div class="dynamic-controls">
                        <button id="start-dynamic-btn">▶ 开始</button>
                        <button id="stop-dynamic-btn" class="secondary" disabled>⏹ 停止</button>
                    </div>
                    <div class="fps-display" id="fps-info">已停止</div>
                </div>
            </div>

            <div class="section">
                <h2>📡 电极接触检测</h2>
                <div class="control-group">
                    <button id="check-electrodes-btn">检测电极状态</button>
                    <div class="quality-score">
                        <span id="quality-score">--</span>
                        <span style="font-size: 0.8rem; color: #888;">/ 100</span>
                    </div>
                    <div class="electrode-grid" id="electrode-grid">
                    </div>
                    <div class="recommendation" id="contact-recommendation">
                        请点击"检测电极状态"
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>💾 导出数据</h2>
                <div class="control-group">
                    <div class="control-row">
                        <label>患者姓名</label>
                        <input type="text" id="patient-name" placeholder="EIT_PATIENT">
                    </div>
                    <button id="export-dicom-btn">导出 DICOM</button>
                    <button id="export-json-btn" class="secondary">导出 JSON</button>
                </div>
            </div>

            <div class="section">
                <h2>数据管理</h2>
                <div class="control-group">
                    <input type="text" id="measurement-name" placeholder="测量名称">
                    <button id="save-btn">保存到数据库</button>
                    <h3 style="font-size: 0.85rem; color: #888; margin-top: 10px;">历史记录</h3>
                    <div class="measurement-list" id="measurement-list">
                        <div style="text-align: center; color: #666; padding: 20px;">加载中...</div>
                    </div>
                    <button id="refresh-btn" class="secondary">刷新列表</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div id="visualizer-container"></div>
            <div class="status-bar">
                <span id="status-text">就绪</span>
                <span id="method-display">算法: GREIT</span>
                <span id="electrodes-display">电极: 16</span>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
