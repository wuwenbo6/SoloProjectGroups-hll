<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTSP 流媒体代理 - 专业版</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #eee;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-left h1 {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .header-left p {
            opacity: 0.9;
            font-size: 12px;
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            font-size: 13px;
        }

        .stat-item {
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .mode-copy { background: #27ae60; }
        .mode-hardware { background: #3498db; }
        .mode-software { background: #f39c12; }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #2a2a4a;
        }

        .tab-btn {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }

        .stream-card {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s;
            border: 1px solid #2a2a4a;
        }

        .stream-card:hover {
            transform: translateY(-4px);
            border-color: #667eea;
        }

        .stream-header {
            padding: 12px 18px;
            background: #16213e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a4a;
        }

        .stream-name {
            font-size: 16px;
            font-weight: 600;
        }

        .stream-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-running {
            background: #27ae60;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status-stopped {
            background: #7f8c8d;
            color: white;
        }

        .status-error {
            background: #e74c3c;
            color: white;
        }

        .status-starting {
            background: #f39c12;
            color: white;
        }

        .video-container {
            position: relative;
            background: #000;
            aspect-ratio: 16/9;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            color: #888;
            font-size: 14px;
        }

        .video-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .latency-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: #2ecc71;
        }

        .recording-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e74c3c;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .recording-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .stream-info {
            padding: 12px 18px;
            font-size: 12px;
            color: #888;
            background: #16213e;
        }

        .stream-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .stream-info span {
            color: #667eea;
            font-weight: 600;
        }

        .stream-actions {
            padding: 12px 18px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ptz-panel {
            padding: 15px;
            border-top: 1px solid #2a2a4a;
            background: #16213e;
            display: none;
        }

        .ptz-panel.active {
            display: block;
        }

        .ptz-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .ptz-row {
            display: flex;
            gap: 5px;
        }

        .ptz-btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 8px;
            background: #2a3f5f;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ptz-btn:hover {
            background: #667eea;
            transform: scale(1.05);
        }

        .ptz-btn:active {
            transform: scale(0.95);
        }

        .ptz-center {
            width: 45px;
            height: 45px;
            background: #1a2a3f;
            border-radius: 8px;
        }

        .preset-btns {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .preset-btn {
            padding: 8px 16px;
            background: #2a3f5f;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .preset-btn:hover {
            background: #667eea;
        }

        .ptz-zoom {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .media-card {
            background: #1a1a2e;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }

        .media-thumbnail {
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .media-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-thumbnail .play-icon {
            font-size: 40px;
            opacity: 0.7;
        }

        .media-info {
            padding: 10px;
            font-size: 12px;
        }

        .media-info .time {
            color: #667eea;
            margin-bottom: 5px;
        }

        .media-info .meta {
            color: #888;
            display: flex;
            justify-content: space-between;
        }

        .media-actions {
            display: flex;
            gap: 5px;
            padding: 10px;
            border-top: 1px solid #2a2a4a;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #2a2a4a;
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #aaa;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #2a3f5f;
            border-radius: 8px;
            background: #16213e;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .form-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            justify-content: flex-end;
        }

        .viewer-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #2a3f5f;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
        }

        .tips-box {
            background: #16213e;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
        }

        .tips-box strong {
            color: #667eea;
        }

        .player-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .player-modal.active {
            display: flex;
        }

        .player-modal video {
            max-width: 90%;
            max-height: 80%;
        }

        .player-modal .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 8px 16px;
            background: #2a3f5f;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .page-btn.active {
            background: #667eea;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>🎥 RTSP 流媒体代理 - 专业版</h1>
            <p>监控直播 | 录制回放 | PTZ控制 | 截图导出</p>
        </div>
        <div class="stats-bar" id="statsBar">
        </div>
    </div>

    <div class="container">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('live')">📺 直播监控</button>
            <button class="tab-btn" onclick="switchTab('recordings')">📹 录制回放</button>
            <button class="tab-btn" onclick="switchTab('snapshots')">📸 截图管理</button>
        </div>

        <div id="liveTab" class="tab-content active">
            <div class="tips-box">
                <strong>💡 功能说明：</strong>
                • 点击播放按钮预览实时画面<br>
                • 点击 ⏺ 开始/停止录制<br>
                • 点击 📷 截取当前画面<br>
                • 展开 PTZ 面板控制摄像头云台
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="openModal()">+ 添加摄像头</button>
                <button class="btn btn-primary" onclick="refreshStreams()">🔄 刷新</button>
            </div>

            <div class="streams-grid" id="streamsGrid">
            </div>
        </div>

        <div id="recordingsTab" class="tab-content">
            <div class="controls">
                <select id="recordStreamFilter" class="form-control" onchange="loadRecordings()">
                    <option value="">全部摄像头</option>
                </select>
                <button class="btn btn-primary" onclick="loadRecordings()">🔄 刷新</button>
            </div>
            <div class="media-grid" id="recordingsGrid"></div>
            <div class="pagination" id="recordingsPagination"></div>
        </div>

        <div id="snapshotsTab" class="tab-content">
            <div class="controls">
                <select id="snapStreamFilter" class="form-control" onchange="loadSnapshots()">
                    <option value="">全部摄像头</option>
                </select>
                <button class="btn btn-primary" onclick="loadSnapshots()">🔄 刷新</button>
            </div>
            <div class="media-grid" id="snapshotsGrid"></div>
            <div class="pagination" id="snapshotsPagination"></div>
        </div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2>添加摄像头</h2>
            <div class="form-group">
                <label>ID (唯一标识)</label>
                <input type="text" id="streamId" placeholder="例如: camera1">
            </div>
            <div class="form-group">
                <label>名称</label>
                <input type="text" id="streamName" placeholder="例如: 大门口摄像头">
            </div>
            <div class="form-group">
                <label>RTSP 地址</label>
                <input type="text" id="streamRtsp" placeholder="rtsp://user:pass@ip:port/stream">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="streamEnabled" checked>
                    启用
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="addStream()">添加</button>
            </div>
        </div>
    </div>

    <div class="player-modal" id="playerModal">
        <button class="close-btn" onclick="closePlayer()">✕ 关闭</button>
        <video id="modalPlayer" controls></video>
    </div>

    <script>
        const API_BASE = '/api';
        const activePlayers = new Map();
        const recordingStreams = new Set();
        let recordingPage = 1;
        let snapshotPage = 1;

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');

            if (tab === 'recordings') loadRecordings();
            if (tab === 'snapshots') loadSnapshots();
        }

        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/stats`);
                return res.json();
            } catch (e) {
                return null;
            }
        }

        async function fetchStreams() {
            const res = await fetch(`${API_BASE}/streams`);
            return res.json();
        }

        async function refreshAll() {
            const [stats, streams] = await Promise.all([fetchStats(), fetchStreams()]);
            if (stats) renderStats(stats);
            renderStreams(streams);
            updateFilters(streams);
        }

        function updateFilters(streams) {
            const options = streams.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            document.getElementById('recordStreamFilter').innerHTML = '<option value="">全部摄像头</option>' + options;
            document.getElementById('snapStreamFilter').innerHTML = '<option value="">全部摄像头</option>' + options;
        }

        function renderStats(stats) {
            const bar = document.getElementById('statsBar');
            const modeClass = {
                'copy': 'mode-copy',
                'hardware': 'mode-hardware',
                'software': 'mode-software'
            }[stats.transcode_mode] || 'mode-software';

            bar.innerHTML = `
                <div class="stat-item">
                    <span>📺 运行流数:</span>
                    <span>${stats.running_streams}/${stats.max_concurrent}</span>
                </div>
                <div class="stat-item">
                    <span>⚡ 转码模式:</span>
                    <span class="mode-badge ${modeClass}">${stats.transcode_mode}</span>
                </div>
                <div class="stat-item">
                    <span>🔧 编码器:</span>
                    <span>${stats.hardware_encoder || 'libx264'}</span>
                </div>
            `;
        }

        function renderStreams(streams) {
            const grid = document.getElementById('streamsGrid');
            grid.innerHTML = '';

            streams.forEach(stream => {
                const card = createStreamCard(stream);
                grid.appendChild(card);
            });
        }

        function createStreamCard(stream) {
            const card = document.createElement('div');
            card.className = 'stream-card';
            card.id = `card-${stream.id}`;

            const statusClass = `status-${stream.status}`;
            const hlsUrl = `/hls/${stream.id}/stream.m3u8?t=${Date.now()}`;
            const isRecording = recordingStreams.has(stream.id);

            card.innerHTML = `
                <div class="stream-header">
                    <span class="stream-name">${stream.name}</span>
                    <span class="stream-status ${statusClass}">${getStatusText(stream.status)}</span>
                </div>
                <div class="video-container">
                    <video id="video-${stream.id}" controls muted playsinline></video>
                    <div class="video-overlay" id="overlay-${stream.id}">
                        ${stream.status === 'running' ? 
                            `<div class="spinner"></div><div>点击播放按钮开始播放</div>` : 
                            `<div>流未运行</div>`}
                    </div>
                    <div class="latency-indicator" id="latency-${stream.id}" style="display:none;">
                        ⏱ 低延迟模式
                    </div>
                    ${isRecording ? `
                    <div class="recording-indicator" id="rec-${stream.id}">
                        <span class="recording-dot"></span> 录制中
                    </div>` : ''}
                </div>
                <div class="stream-info">
                    <div class="stream-info-row">
                        <span>ID:</span>
                        <span>${stream.id}</span>
                    </div>
                    <div class="stream-info-row">
                        <span>RTSP:</span>
                        <span style="max-width:250px;overflow:hidden;text-overflow:ellipsis;">${stream.rtsp_url}</span>
                    </div>
                    <div class="stream-info-row">
                        <span>观看人数:</span>
                        <span class="viewer-badge">👁 ${stream.viewer_count}</span>
                    </div>
                    ${stream.error_msg ? `<div style="color: #e74c3c;">⚠️ ${stream.error_msg}</div>` : ''}
                </div>
                <div class="stream-actions">
                    ${stream.status !== 'running' ? 
                        `<button class="btn btn-success btn-sm" onclick="startStream('${stream.id}')">▶ 启动</button>` :
                        `<button class="btn btn-danger btn-sm" onclick="stopStream('${stream.id}')">⏹ 停止</button>`
                    }
                    <button class="btn btn-primary btn-sm" onclick="playStream('${stream.id}', '${hlsUrl}')">▶ 播放</button>
                    <button class="btn btn-primary btn-sm" onclick="stopPlayer('${stream.id}')">⏹ 停止播放</button>
                    <button class="btn ${isRecording ? 'btn-danger' : 'btn-warning'} btn-sm" onclick="toggleRecording('${stream.id}')">
                        ${isRecording ? '⏹ 停止录制' : '⏺ 录制'}
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="takeSnapshot('${stream.id}')">📷 截图</button>
                    <button class="btn btn-primary btn-sm" onclick="togglePTZ('${stream.id}')">🎮 PTZ</button>
                </div>
                <div class="ptz-panel" id="ptz-${stream.id}">
                    <div style="display:flex;justify-content:center;gap:30px;">
                        <div class="ptz-controls">
                            <div class="ptz-row">
                                <div class="ptz-center"></div>
                                <button class="ptz-btn" onmousedown="ptzMove('${stream.id}','up')" onmouseup="ptzStop('${stream.id}')">▲</button>
                                <div class="ptz-center"></div>
                            </div>
                            <div class="ptz-row">
                                <button class="ptz-btn" onmousedown="ptzMove('${stream.id}','left')" onmouseup="ptzStop('${stream.id}')">◀</button>
                                <div class="ptz-center"></div>
                                <button class="ptz-btn" onmousedown="ptzMove('${stream.id}','right')" onmouseup="ptzStop('${stream.id}')">▶</button>
                            </div>
                            <div class="ptz-row">
                                <div class="ptz-center"></div>
                                <button class="ptz-btn" onmousedown="ptzMove('${stream.id}','down')" onmouseup="ptzStop('${stream.id}')">▼</button>
                                <div class="ptz-center"></div>
                            </div>
                        </div>
                        <div class="ptz-zoom">
                            <button class="ptz-btn" onmousedown="ptzMove('${stream.id}','zoomIn')" onmouseup="ptzStop('${stream.id}')">🔍+</button>
                            <button class="ptz-btn" onmousedown="ptzMove('${stream.id}','zoomOut')" onmouseup="ptzStop('${stream.id}')">🔍-</button>
                        </div>
                    </div>
                    <div class="preset-btns">
                        <button class="preset-btn" onclick="ptzPreset('${stream.id}','1')">预设 1</button>
                        <button class="preset-btn" onclick="ptzPreset('${stream.id}','2')">预设 2</button>
                        <button class="preset-btn" onclick="ptzPreset('${stream.id}','3')">预设 3</button>
                        <button class="preset-btn" onclick="ptzPreset('${stream.id}','4')">预设 4</button>
                    </div>
                </div>
            `;

            return card;
        }

        function getStatusText(status) {
            const map = {
                'stopped': '已停止',
                'starting': '启动中',
                'running': '运行中',
                'error': '错误'
            };
            return map[status] || status;
        }

        async function startStream(id) {
            await fetch(`${API_BASE}/streams/${id}/start`, { method: 'POST' });
            setTimeout(refreshAll, 1000);
        }

        async function stopStream(id) {
            stopPlayer(id);
            await fetch(`${API_BASE}/streams/${id}/stop`, { method: 'POST' });
            setTimeout(refreshAll, 500);
        }

        async function deleteStream(id) {
            if (confirm('确定要删除这个摄像头吗？')) {
                stopPlayer(id);
                await fetch(`${API_BASE}/streams/${id}/viewer`, { method: 'DELETE' });
                await fetch(`${API_BASE}/streams/${id}`, { method: 'DELETE' });
                refreshAll();
            }
        }

        async function playStream(id, hlsUrl) {
            const video = document.getElementById(`video-${id}`);
            const overlay = document.getElementById(`overlay-${id}`);
            const latencyBadge = document.getElementById(`latency-${id}`);
            
            stopPlayer(id);

            await fetch(`${API_BASE}/streams/${id}/viewer`, { method: 'POST' });

            overlay.innerHTML = '<div class="spinner"></div><div>正在加载流...</div>';
            overlay.style.display = 'flex';

            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    liveSyncDuration: 0.5,
                    liveMaxLatencyDuration: 1.5,
                    liveDurationInfinity: true,
                    maxBufferLength: 2,
                    maxMaxBufferLength: 4,
                    maxBufferSize: 2 * 1000 * 1000,
                    fragLoadingTimeOut: 4000,
                    manifestLoadingTimeOut: 4000,
                });

                hls.loadSource(hlsUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    overlay.style.display = 'none';
                    latencyBadge.style.display = 'block';
                    video.play().catch(e => {
                        console.log('Auto-play prevented:', e);
                        overlay.innerHTML = '<div>点击视频开始播放</div>';
                        overlay.style.display = 'flex';
                    });
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    console.warn('HLS error:', data.type, data.details, data.fatal);
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                overlay.innerHTML = '<div>网络错误，正在重试...</div>';
                                overlay.style.display = 'flex';
                                setTimeout(() => hls.startLoad(), 1000);
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                overlay.innerHTML = '<div>加载失败，请重试</div>';
                                overlay.style.display = 'flex';
                                break;
                        }
                    }
                });

                activePlayers.set(id, { hls, video });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = hlsUrl;
                video.addEventListener('loadedmetadata', () => {
                    overlay.style.display = 'none';
                    latencyBadge.style.display = 'block';
                    video.play().catch(() => {});
                });
                activePlayers.set(id, { video });
            }

            video.addEventListener('pause', () => {
                if (!video.ended) {
                    fetch(`${API_BASE}/streams/${id}/viewer`, { method: 'DELETE' });
                }
            });
        }

        function stopPlayer(id) {
            const player = activePlayers.get(id);
            if (player) {
                if (player.hls) {
                    player.hls.destroy();
                }
                player.video.pause();
                player.video.src = '';
                activePlayers.delete(id);
            }
            
            const overlay = document.getElementById(`overlay-${id}`);
            if (overlay) {
                overlay.innerHTML = '<div>点击播放按钮开始播放</div>';
                overlay.style.display = 'flex';
            }
            
            const latencyBadge = document.getElementById(`latency-${id}`);
            if (latencyBadge) {
                latencyBadge.style.display = 'none';
            }

            fetch(`${API_BASE}/streams/${id}/viewer`, { method: 'DELETE' });
        }

        function togglePTZ(id) {
            const panel = document.getElementById(`ptz-${id}`);
            panel.classList.toggle('active');
        }

        async function ptzMove(id, cmd) {
            await fetch(`${API_BASE}/streams/${id}/ptz/${cmd}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ speed: 0.5 })
            });
        }

        async function ptzStop(id) {
            await fetch(`${API_BASE}/streams/${id}/ptz/stop`, { method: 'POST' });
        }

        async function ptzPreset(id, preset) {
            await fetch(`${API_BASE}/streams/${id}/ptz/preset/${preset}`, { method: 'POST' });
        }

        async function toggleRecording(id) {
            if (recordingStreams.has(id)) {
                await fetch(`${API_BASE}/streams/${id}/record/stop`, { method: 'POST' });
                recordingStreams.delete(id);
            } else {
                await fetch(`${API_BASE}/streams/${id}/record/start`, { method: 'POST' });
                recordingStreams.add(id);
            }
            refreshAll();
        }

        async function takeSnapshot(id) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '截图中...';
            
            try {
                const res = await fetch(`${API_BASE}/streams/${id}/snapshot`, { method: 'POST' });
                if (res.ok) {
                    alert('截图成功！');
                    loadSnapshots();
                } else {
                    alert('截图失败: ' + (await res.text()));
                }
            } catch (e) {
                alert('截图失败: ' + e.message);
            }
            
            btn.disabled = false;
            btn.textContent = '📷 截图';
        }

        async function loadRecordings() {
            const streamId = document.getElementById('recordStreamFilter').value;
            const res = await fetch(`${API_BASE}/recordings?stream_id=${streamId}&offset=${(recordingPage-1)*20}&limit=20`);
            const data = await res.json();
            renderRecordings(data.data);
            renderPagination('recordingsPagination', data.total, recordingPage, (p) => { recordingPage = p; loadRecordings(); });
        }

        function renderRecordings(recordings) {
            const grid = document.getElementById('recordingsGrid');
            grid.innerHTML = recordings.map(rec => `
                <div class="media-card">
                    <div class="media-thumbnail" style="cursor:pointer" onclick="playRecording(${rec.id})">
                        <span class="play-icon">▶️</span>
                    </div>
                    <div class="media-info">
                        <div class="time">${new Date(rec.start_time).toLocaleString()}</div>
                        <div class="meta">
                            <span>${rec.stream_id}</span>
                            <span>${formatDuration(rec.duration)}</span>
                            <span>${formatSize(rec.file_size)}</span>
                        </div>
                    </div>
                    <div class="media-actions">
                        <button class="btn btn-primary btn-sm" onclick="playRecording(${rec.id})">▶ 播放</button>
                        <button class="btn btn-primary btn-sm" onclick="downloadRecording(${rec.id})">⬇ 下载</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteRecording(${rec.id})">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        async function playRecording(id) {
            const res = await fetch(`${API_BASE}/recordings/${id}/play`);
            const data = await res.json();
            const modal = document.getElementById('playerModal');
            const player = document.getElementById('modalPlayer');
            player.src = data.url;
            modal.classList.add('active');
            player.play();
        }

        function closePlayer() {
            const modal = document.getElementById('playerModal');
            const player = document.getElementById('modalPlayer');
            player.pause();
            player.src = '';
            modal.classList.remove('active');
        }

        async function downloadRecording(id) {
            window.open(`${API_BASE}/recordings/${id}/download`, '_blank');
        }

        async function deleteRecording(id) {
            if (confirm('确定删除此录制文件？')) {
                await fetch(`${API_BASE}/recordings/${id}`, { method: 'DELETE' });
                loadRecordings();
            }
        }

        async function loadSnapshots() {
            const streamId = document.getElementById('snapStreamFilter').value;
            const res = await fetch(`${API_BASE}/snapshots?stream_id=${streamId}&offset=${(snapshotPage-1)*20}&limit=20`);
            const data = await res.json();
            renderSnapshots(data.data);
            renderPagination('snapshotsPagination', data.total, snapshotPage, (p) => { snapshotPage = p; loadSnapshots(); });
        }

        function renderSnapshots(snapshots) {
            const grid = document.getElementById('snapshotsGrid');
            grid.innerHTML = snapshots.map(snap => `
                <div class="media-card">
                    <div class="media-thumbnail" style="cursor:pointer" onclick="viewSnapshot('${snap.file_path}')">
                        <img src="${snap.file_path}" alt="snapshot">
                    </div>
                    <div class="media-info">
                        <div class="time">${new Date(snap.created_at).toLocaleString()}</div>
                        <div class="meta">
                            <span>${snap.stream_id}</span>
                            <span>${formatSize(snap.file_size)}</span>
                        </div>
                    </div>
                    <div class="media-actions">
                        <button class="btn btn-primary btn-sm" onclick="viewSnapshot('${snap.file_path}')">👁 查看</button>
                        <button class="btn btn-primary btn-sm" onclick="downloadSnapshot(${snap.id})">⬇ 下载</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteSnapshot(${snap.id})">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        function viewSnapshot(path) {
            const modal = document.getElementById('playerModal');
            const player = document.getElementById('modalPlayer');
            player.outerHTML = `<img id="modalPlayer" src="${path}" style="max-width:90%;max-height:80%">`;
            modal.classList.add('active');
            modal.querySelector('.close-btn').onclick = () => {
                modal.classList.remove('active');
                modal.querySelector('img').outerHTML = '<video id="modalPlayer" controls></video>';
            };
        }

        async function downloadSnapshot(id) {
            window.open(`${API_BASE}/snapshots/${id}/download`, '_blank');
        }

        async function deleteSnapshot(id) {
            if (confirm('确定删除此截图？')) {
                await fetch(`${API_BASE}/snapshots/${id}`, { method: 'DELETE' });
                loadSnapshots();
            }
        }

        function renderPagination(id, total, current, onChange) {
            const pages = Math.ceil(total / 20);
            const container = document.getElementById(id);
            if (pages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = `<button class="page-btn" ${current === 1 ? 'disabled' : ''} onclick="onChange(${current-1})">上一页</button>`;
            for (let i = 1; i <= pages; i++) {
                html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="onChange(${i})">${i}</button>`;
            }
            html += `<button class="page-btn" ${current === pages ? 'disabled' : ''} onclick="onChange(${current+1})">下一页</button>`;
            container.innerHTML = html;
            window.onChange = onChange;
        }

        function formatDuration(seconds) {
            if (!seconds) return '-';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}分${s}秒`;
        }

        function formatSize(bytes) {
            if (!bytes) return '-';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        function openModal() {
            document.getElementById('addModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('streamId').value = '';
            document.getElementById('streamName').value = '';
            document.getElementById('streamRtsp').value = '';
        }

        async function addStream() {
            const id = document.getElementById('streamId').value.trim();
            const name = document.getElementById('streamName').value.trim();
            const rtspUrl = document.getElementById('streamRtsp').value.trim();
            const enabled = document.getElementById('streamEnabled').checked;

            if (!id || !name || !rtspUrl) {
                alert('请填写所有字段');
                return;
            }

            const res = await fetch(`${API_BASE}/streams`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, name, rtsp_url: rtspUrl, enabled })
            });

            if (res.ok) {
                closeModal();
                refreshAll();
            } else {
                alert('添加失败: ' + (await res.text()));
            }
        }

        function refreshStreams() {
            refreshAll();
        }

        refreshAll();
        setInterval(refreshAll, 5000);

        window.addEventListener('beforeunload', () => {
            activePlayers.forEach((_, id) => {
                fetch(`${API_BASE}/streams/${id}/viewer`, { method: 'DELETE' });
            });
        });
    </script>
</body>
</html>
