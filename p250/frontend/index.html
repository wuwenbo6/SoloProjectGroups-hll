<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP 攻击检测系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div>
                    <h1>SIP 攻击检测系统</h1>
                    <p class="subtitle">实时监控 SIP REGISTER 洪水攻击</p>
                </div>
            </div>
            <div class="header-right">
                <div class="status-indicator" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">连接中...</span>
                </div>
                <div class="threshold-info">
                    <span class="threshold-label">告警阈值</span>
                    <span class="threshold-value" id="thresholdValue">10 次/秒</span>
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card stat-alert">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">活跃告警</span>
                    <span class="stat-value" id="activeAlerts">0</span>
                </div>
            </div>
            <div class="stat-card stat-ip">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">监控IP数</span>
                    <span class="stat-value" id="monitoredIPs">0</span>
                </div>
            </div>
            <div class="stat-card stat-packets">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">总注册请求</span>
                    <span class="stat-value" id="totalRequests">0</span>
                </div>
            </div>
            <div class="stat-card stat-blocked">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">封禁IP数</span>
                    <span class="stat-value" id="blockedIPs">0</span>
                </div>
            </div>
            <div class="stat-card stat-logs">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">日志总数</span>
                    <span class="stat-value" id="totalLogs">0</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="panel">
                    <div class="panel-tabs">
                        <button class="tab-btn active" data-tab="alerts">实时告警</button>
                        <button class="tab-btn" data-tab="blocked">封禁IP</button>
                        <button class="tab-btn" data-tab="logs">攻击日志</button>
                    </div>
                    
                    <div class="tab-content" id="tabAlerts">
                        <div class="alert-list" id="alertList">
                            <div class="empty-state">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <p>暂无告警</p>
                                <span>系统运行正常</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="tab-content" id="tabBlocked" style="display: none;">
                        <div class="blocked-list" id="blockedList">
                            <div class="empty-state">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="12" cy="12" r="10"/>
                                    <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                                </svg>
                                <p>暂无封禁IP</p>
                                <span>自动封禁功能已启用</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="tab-content" id="tabLogs" style="display: none;">
                        <div class="log-toolbar">
                            <button class="btn btn-secondary" id="exportJsonBtn">导出JSON</button>
                            <button class="btn btn-secondary" id="exportCsvBtn">导出CSV</button>
                            <button class="btn btn-danger" id="clearLogsBtn">清空日志</button>
                        </div>
                        <div class="log-list" id="logList">
                            <div class="empty-state">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                </svg>
                                <p>暂无日志</p>
                                <span>系统运行正常</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <h2>频率统计</h2>
                        <button class="refresh-btn" id="refreshStats">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"/>
                                <polyline points="1 20 1 14 7 14"/>
                                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                            </svg>
                            刷新
                        </button>
                    </div>
                    <div class="stats-table-container">
                        <table class="stats-table">
                            <thead>
                                <tr>
                                    <th>IP 地址</th>
                                    <th>位置</th>
                                    <th>原始频率</th>
                                    <th>加权频率</th>
                                    <th>初/重</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="statsTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="panel">
                    <div class="panel-header">
                        <h2>攻击源地理分布</h2>
                    </div>
                    <div class="map-container" id="mapContainer">
                        <div class="map-placeholder">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>
                            <p id="mapStatus">等待攻击数据...</p>
                        </div>
                        <div class="map-points" id="mapPoints"></div>
                    </div>
                    <div class="geo-stats" id="geoStats">
                    </div>
                </div>

                <div class="panel" id="detailPanel" style="display: none;">
                    <div class="panel-header">
                        <h2>IP 详情</h2>
                        <button class="close-btn" id="closeDetail">&times;</button>
                    </div>
                    <div class="detail-content" id="detailContent">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
