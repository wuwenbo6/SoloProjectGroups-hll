<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSCSI 目标器管理面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .status-bar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .status-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .status-item .label {
            font-size: 0.9em;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .status-item .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #495057;
        }

        .status-item.running .value {
            color: #28a745;
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .panels {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .panel h2 {
            color: #495057;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .session-card, .lun-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .session-card:hover, .lun-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .session-name {
            font-weight: bold;
            color: #495057;
            font-size: 1.1em;
        }

        .session-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .session-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.9em;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            color: #6c757d;
            font-size: 0.8em;
        }

        .detail-value {
            color: #495057;
            font-family: monospace;
            word-break: break-all;
        }

        .iops-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            margin-right: 5px;
        }

        .iops-read {
            background: #e3f2fd;
            color: #1565c0;
        }

        .iops-write {
            background: #fff3e0;
            color: #e65100;
        }

        .iops-total {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .lun-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .target-info {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .target-info h2 {
            color: #495057;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .info-item .key {
            font-size: 0.85em;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .info-item .val {
            font-family: monospace;
            color: #495057;
            font-size: 0.95em;
            word-break: break-all;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            margin-left: 8px;
        }

        .badge-lun {
            background: #667eea;
            color: white;
        }

        .last-update {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
            margin-top: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connecting {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖥️ iSCSI 目标器管理面板</h1>
            <p>实时监控 iSCSI 会话和 LUN 状态</p>
        </div>

        <div class="status-bar">
            <div class="status-item running">
                <div class="label">服务状态</div>
                <div class="value" id="server-status">运行中</div>
            </div>
            <div class="status-item">
                <div class="label">活动会话</div>
                <div class="value" id="session-count">0</div>
            </div>
            <div class="status-item">
                <div class="label">LUN 数量</div>
                <div class="value" id="lun-count">0</div>
            </div>
            <div class="status-item">
                <div class="label">监听端口</div>
                <div class="value">3260</div>
            </div>
        </div>

        <div class="panels">
            <div class="panel">
                <h2>📡 已连接会话</h2>
                <div id="sessions-list">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                        <p>暂无活动会话</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">使用 iSCSI 发起器连接到目标</p>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>💾 可用 LUN</h2>
                <div id="luns-list">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="2"/>
                            <path d="M12 6v12M6 12h12"/>
                        </svg>
                        <p>暂无配置的 LUN</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="target-info">
            <h2>🎯 目标器信息</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="key">目标名称 (IQN)</div>
                    <div class="val" id="target-name">-</div>
                </div>
                <div class="info-item">
                    <div class="key">监听地址</div>
                    <div class="val" id="target-host">-</div>
                </div>
                <div class="info-item">
                    <div class="key">存储目录</div>
                    <div class="val">./storage</div>
                </div>
            </div>
        </div>

        <div class="last-update">
            最后更新: <span id="last-update">-</span>
            <span id="connection-status"></span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        const socket = io();
        
        function formatDuration(seconds) {
            if (seconds < 60) return Math.round(seconds) + ' 秒';
            if (seconds < 3600) return Math.round(seconds / 60) + ' 分钟';
            return (seconds / 3600).toFixed(1) + ' 小时';
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('zh-CN');
        }

        function updateSessions(sessions) {
            const container = document.getElementById('sessions-list');
            const countEl = document.getElementById('session-count');
            
            countEl.textContent = sessions.length;

            if (sessions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                        <p>暂无活动会话</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">使用 iSCSI 发起器连接到目标</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = sessions.map(session => `
                <div class="session-card">
                    <div class="session-header">
                        <span class="session-name" title="${session.initiator_name}">
                            ${session.initiator_name.slice(0, 30)}${session.initiator_name.length > 30 ? '...' : ''}
                        </span>
                        <span class="session-status status-active">活动</span>
                    </div>
                    <div style="margin-bottom: 12px;">
                        <span class="iops-badge iops-total">总 IOPS: ${session.iops.total_iops}</span>
                        <span class="iops-badge iops-read">读: ${session.iops.read_iops}</span>
                        <span class="iops-badge iops-write">写: ${session.iops.write_iops}</span>
                    </div>
                    <div class="session-details">
                        <div class="detail-item">
                            <span class="detail-label">发起器地址</span>
                            <span class="detail-value">${session.initiator_ip}:${session.initiator_port}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">连接时长</span>
                            <span class="detail-value">${formatDuration(session.duration)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">总命令数</span>
                            <span class="detail-value">${session.cmd_count}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">TSIH</span>
                            <span class="detail-value">${session.tsih}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">读取数据</span>
                            <span class="detail-value">${session.data_read_mb} MB</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">写入数据</span>
                            <span class="detail-value">${session.data_written_mb} MB</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">读操作总数</span>
                            <span class="detail-value">${session.read_ops_total}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">写操作总数</span>
                            <span class="detail-value">${session.write_ops_total}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">带宽 (MB/s)</span>
                            <span class="detail-value">${session.bandwidth.total_mbps}</span>
                        </div>
                        <div class="detail-item" style="grid-column: span 2;">
                            <span class="detail-label">会话 ID</span>
                            <span class="detail-value">${session.session_id}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateLUNs(luns) {
            const container = document.getElementById('luns-list');
            const countEl = document.getElementById('lun-count');
            
            countEl.textContent = luns.length;

            if (luns.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="2"/>
                            <path d="M12 6v12M6 12h12"/>
                        </svg>
                        <p>暂无配置的 LUN</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = luns.map(lun => `
                <div class="lun-card">
                    <div class="session-header">
                        <span class="session-name">
                            LUN ${lun.id}
                            <span class="badge badge-lun">磁盘</span>
                        </span>
                    </div>
                    <div class="lun-info">
                        <div class="detail-item">
                            <span class="detail-label">大小</span>
                            <span class="detail-value">${lun.size_mb.toFixed(2)} MB</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">块数</span>
                            <span class="detail-value">${Math.floor(lun.size / 512)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">块大小</span>
                            <span class="detail-value">512 字节</span>
                        </div>
                    </div>
                    <div class="detail-item" style="margin-top: 10px;">
                        <span class="detail-label">存储文件</span>
                        <span class="detail-value">${lun.path}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateStatus(status) {
            document.getElementById('target-name').textContent = status.target_name || '-';
            document.getElementById('target-host').textContent = status.host ? `${status.host}:${status.port}` : '-';
        }

        fetch('/api/status')
            .then(r => r.json())
            .then(status => updateStatus(status));

        fetch('/api/sessions')
            .then(r => r.json())
            .then(sessions => updateSessions(sessions));

        fetch('/api/luns')
            .then(r => r.json())
            .then(luns => updateLUNs(luns));

        socket.on('status_update', function(data) {
            updateSessions(data.sessions);
            updateLUNs(data.luns);
            document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
        });

        socket.on('connect', function() {
            document.getElementById('connection-status').innerHTML = 
                ' <span style="color: #28a745;">● WebSocket 已连接</span>';
        });

        socket.on('disconnect', function() {
            document.getElementById('connection-status').innerHTML = 
                ' <span style="color: #dc3545;" class="connecting">● WebSocket 断开中...</span>';
        });

        document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
