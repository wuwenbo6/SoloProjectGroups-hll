[GNSS-SDR]
; Global configuration
GNSS-SDR.utility_mode=monitor
GNSS-SDR.num_satellites=8
GNSS-SDR.sampling_frequency=4000000
GNSS-SDR.intermediate_frequency=0
GNSS-SDR.rf_channels=2

[SignalSource]
SignalSource.implementation=File_Signal_Source
SignalSource.filename=/path/to/signal.dat
SignalSource.sample_type=gr_complex
SignalSource.sampling_frequency=4000000
SignalSource.repeat=false
SignalSource.throttle=true

[SignalConditioner]
SignalConditioner.implementation=Pass_Through

[InputFilter]
InputFilter.implementation=Pass_Through
InputFilter.item_type=gr_complex

[Resampler]
Resampler.implementation=Pass_Through

[Channels]
Channels.implementation=Channel
Channels.count=8

[Channel1]
Channel1.satellite=1
Channel1.acquisition=GPS_L1_CA_Acquisition
Channel1.tracking=GPS_L1_CA_DLL_PLL_Tracking
Channel1.telemetry_decoder=GPS_L1_CA_Telemetry_Decoder

[Channel2]
Channel2.satellite=2
Channel2.acquisition=GPS_L1_CA_Acquisition
Channel2.tracking=GPS_L1_CA_DLL_PLL_Tracking
Channel2.telemetry_decoder=GPS_L1_CA_Telemetry_Decoder

[Acquisition]
GPS_L1_CA_Acquisition.implementation=GPS_L1_CA_PCPS_Acquisition
GPS_L1_CA_Acquisition.threshold=0.015
GPS_L1_CA_Acquisition.doppler_max=10000
GPS_L1_CA_Acquisition.doppler_min=-10000
GPS_L1_CA_Acquisition.doppler_step=250
GPS_L1_CA_Acquisition.bit_transition_flag=false
GPS_L1_CA_Acquisition.max_dwells=5
GPS_L1_CA_Acquisition.cboc=false

[Tracking]
GPS_L1_CA_DLL_PLL_Tracking.implementation=GPS_L1_CA_DLL_PLL_Tracking
GPS_L1_CA_DLL_PLL_Tracking.dll_discriminator_time=0.5
GPS_L1_CA_DLL_PLL_Tracking.dll_discriminator_slope=1.0
GPS_L1_CA_DLL_PLL_Tracking.dll_bw_hz=2.0
GPS_L1_CA_DLL_PLL_Tracking.pll_bw_hz=35.0
GPS_L1_CA_DLL_PLL_Tracking.pll_bw_narrow_hz=5.0
GPS_L1_CA_DLL_PLL_Tracking.fll_bw_hz=4.0
GPS_L1_CA_DLL_PLL_Tracking.early_late_space_chips=0.5

[TelemetryDecoder]
GPS_L1_CA_Telemetry_Decoder.implementation=GPS_L1_CA_Telemetry_Decoder
GPS_L1_CA_Telemetry_Decoder.dump=false

[Observables]
Observables.implementation=GPS_L1_CA_Observables
Observables.dump=true
Observables.dump_filename=./observables.dat

[PVT]
PVT.implementation=GPS_L1_CA_PVT
PVT.averaging_depth=10
PVT.dump=true
PVT.dump_filename=./pvt.dat
PVT.output_rate_ms=1000
PVT.display_rate_ms=500

[Monitor]
Monitor.implementation=Monitor_Factory
Monitor.enable_monitor=true
Monitor.output=true
Monitor.udp_port=1234
Monitor.proto_path=./gnss_sdr_monitor.proto