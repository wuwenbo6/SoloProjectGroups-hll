<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVMe-oF Target 管理控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .status-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .status-item .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-item .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
        }

        .status-item .value.online {
            color: #10b981;
        }

        .status-item .value.rdma {
            color: #f59e0b;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .namespaces-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .namespace-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 12px;
            padding: 24px;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .namespace-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .namespace-card.ns-2 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .namespace-card.ns-3 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .namespace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .ns-id {
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .ns-status {
            font-size: 0.85rem;
            background: rgba(16, 185, 129, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ns-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .ns-size {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .ns-size-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .ns-details {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .ns-detail-item .label {
            font-size: 0.8rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ns-detail-item .value {
            font-size: 1rem;
            font-weight: 600;
        }

        .controller-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .info-item {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-item .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 6px;
        }

        .info-item .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .transport-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .transport-badge.tcp {
            background: #dbeafe;
            color: #2563eb;
        }

        .transport-badge.rdma {
            background: #fef3c7;
            color: #d97706;
        }

        .conn-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .conn-table th {
            background: #f1f5f9;
            padding: 12px 16px;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            border-bottom: 2px solid #e2e8f0;
        }

        .conn-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
            color: #334155;
        }

        .conn-table tr:hover {
            background: #f8fafc;
        }

        .latency-bar {
            height: 8px;
            border-radius: 4px;
            background: #e2e8f0;
            position: relative;
            margin-top: 4px;
        }

        .latency-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .latency-bar-fill.low { background: linear-gradient(90deg, #10b981, #34d399); }
        .latency-bar-fill.medium { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .latency-bar-fill.high { background: linear-gradient(90deg, #ef4444, #f87171); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .stat-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 16px;
            border: 1px solid #e2e8f0;
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-card .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
            font-family: 'Courier New', monospace;
        }

        .stat-card .stat-unit {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-left: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab:hover {
            color: #64748b;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2rem;
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .refresh-btn:hover {
            transform: rotate(180deg);
        }

        .rdma-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .rdma-indicator.active {
            background: #fef3c7;
            color: #d97706;
        }

        .rdma-indicator.active::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #f59e0b;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NVMe-oF Target 管理控制台</h1>
            <p>基于 NVMe/TCP + NVMe/RDMA (模拟) 协议的存储目标器系统</p>
        </div>

        <div id="content">
            <div class="loading">正在加载数据...</div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadData()" title="刷新">↻</button>

    <script>
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatLatency(ns) {
            if (ns === 0) return 'N/A';
            if (ns < 1000) return ns + ' ns';
            if (ns < 1000000) return (ns / 1000).toFixed(1) + ' μs';
            return (ns / 1000000).toFixed(2) + ' ms';
        }

        function formatDuration(ns) {
            const sec = ns / 1e9;
            if (sec < 60) return sec.toFixed(1) + ' s';
            if (sec < 3600) return (sec / 60).toFixed(1) + ' min';
            return (sec / 3600).toFixed(1) + ' h';
        }

        function latencyClass(ns) {
            if (ns < 100000) return 'low';
            if (ns < 1000000) return 'medium';
            return 'high';
        }

        function loadData() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">正在加载数据...</div>';

            Promise.all([
                fetch('/api/status').then(r => r.json()),
                fetch('/api/namespaces').then(r => r.json()),
                fetch('/api/controller').then(r => r.json()),
                fetch('/api/stats').then(r => r.json())
            ]).then(([status, namespaces, controller, stats]) => {
                renderContent(status, namespaces, controller, stats);
            }).catch(err => {
                content.innerHTML = `<div class="error">加载失败: ${err.message}</div>`;
            });
        }

        function renderConnTable(conns, type) {
            if (!conns || conns.length === 0) {
                return `<div class="empty-state">
                    <div class="icon">🔌</div>
                    <div>暂无${type === 'tcp' ? 'TCP' : 'RDMA'}连接</div>
                </div>`;
            }

            let html = '<table class="conn-table"><thead><tr>';
            html += '<th>连接 ID</th>';
            html += '<th>传输</th>';
            html += '<th>控制器 ID</th>';
            html += '<th>队列数</th>';
            html += '<th>Admin 命令</th>';
            html += '<th>IO 命令</th>';
            html += '<th>IO 平均延迟</th>';
            html += '<th>读延迟 (min/avg/max)</th>';
            html += '<th>写延迟 (min/avg/max)</th>';
            html += '<th>读吞吐</th>';
            html += '<th>写吞吐</th>';
            html += '<th>IOPS</th>';
            html += '<th>持续时间</th>';
            if (type === 'rdma') {
                html += '<th>内存区域</th>';
                html += '<th>QPN</th>';
            }
            html += '</tr></thead><tbody>';

            conns.forEach(conn => {
                const ioLat = conn.io_latency || {};
                const rdLat = conn.read_latency || {};
                const wrLat = conn.write_latency || {};
                const throughput = formatBytes(conn.read_throughput || 0) + '/s';
                const writeThroughput = formatBytes(conn.write_throughput || 0) + '/s';

                html += '<tr>';
                html += `<td style="font-family:monospace;font-size:0.8rem">${conn.connection_id}</td>`;
                html += `<td><span class="transport-badge ${type}">${type.toUpperCase()}</span></td>`;
                html += `<td>${conn.controller_id}</td>`;
                html += `<td>${conn.queue_count}</td>`;
                html += `<td>${conn.admin_cmd_count}</td>`;
                html += `<td>${conn.io_cmd_count}</td>`;
                html += `<td>${formatLatency(ioLat.avg_ns || 0)}</td>`;
                html += `<td>${formatLatency(rdLat.min_ns || 0)} / ${formatLatency(rdLat.avg_ns || 0)} / ${formatLatency(rdLat.max_ns || 0)}</td>`;
                html += `<td>${formatLatency(wrLat.min_ns || 0)} / ${formatLatency(wrLat.avg_ns || 0)} / ${formatLatency(wrLat.max_ns || 0)}</td>`;
                html += `<td>${throughput}</td>`;
                html += `<td>${writeThroughput}</td>`;
                html += `<td>${(conn.iops || 0).toFixed(1)}</td>`;
                html += `<td>${formatDuration(conn.duration_ns || 0)}</td>`;
                if (type === 'rdma') {
                    html += `<td>${conn.memory_regions || 0}</td>`;
                    html += `<td>0x${(conn.qpn || 0).toString(16).padStart(4, '0')}</td>`;
                }
                html += '</tr>';
            });

            html += '</tbody></table>';
            return html;
        }

        function renderContent(status, namespaces, controller, stats) {
            const content = document.getElementById('content');

            const statusHtml = `
                <div class="card">
                    <div class="section-title">系统状态</div>
                    <div class="status-grid">
                        <div class="status-item">
                            <div class="label">服务状态</div>
                            <div class="value ${status.running ? 'online' : ''}">${status.running ? '运行中' : '已停止'}</div>
                        </div>
                        <div class="status-item">
                            <div class="label">TCP 端口</div>
                            <div class="value">${status.nvme_port}</div>
                        </div>
                        <div class="status-item">
                            <div class="label">RDMA 端口</div>
                            <div class="value rdma">${status.rdma_port}</div>
                        </div>
                        <div class="status-item">
                            <div class="label">TCP 连接</div>
                            <div class="value">${status.tcp_connections}</div>
                        </div>
                        <div class="status-item">
                            <div class="label">RDMA 连接</div>
                            <div class="value">${status.rdma_connections}</div>
                        </div>
                        <div class="status-item">
                            <div class="label">命名空间</div>
                            <div class="value">${namespaces.count}</div>
                        </div>
                        <div class="status-item">
                            <div class="label">RDMA 模式</div>
                            <div class="value rdma">模拟</div>
                        </div>
                    </div>
                </div>
            `;

            let namespacesHtml = `
                <div class="card">
                    <div class="section-title">命名空间列表</div>
                    <div class="namespaces-grid">
            `;

            namespaces.namespaces.forEach((ns, index) => {
                const nsClass = `ns-${(index % 3) + 1}`;
                const sizeBytes = ns.size;
                const lbaCount = sizeBytes / 512;

                namespacesHtml += `
                    <div class="namespace-card ${nsClass}">
                        <div class="namespace-header">
                            <span class="ns-id">NSID: ${ns.nsid}</span>
                            <span class="ns-status">${ns.active ? '活动' : '离线'}</span>
                        </div>
                        <div class="ns-size">${formatBytes(sizeBytes)}</div>
                        <div class="ns-size-label">总容量</div>
                        <div class="ns-details">
                            <div class="ns-detail-item">
                                <div class="label">LBA 数量</div>
                                <div class="value">${lbaCount.toLocaleString()}</div>
                            </div>
                            <div class="ns-detail-item">
                                <div class="label">LBA 大小</div>
                                <div class="value">512 B</div>
                            </div>
                            <div class="ns-detail-item">
                                <div class="label">块大小</div>
                                <div class="value">4 KB</div>
                            </div>
                            <div class="ns-detail-item">
                                <div class="label">访问模式</div>
                                <div class="value">读写</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            namespacesHtml += `</div></div>`;

            const tcpConns = stats.tcp || [];
            const rdmaConns = stats.rdma || [];

            const totalIOCmds = [...tcpConns, ...rdmaConns].reduce((s, c) => s + (c.io_cmd_count || 0), 0);
            const totalAdminCmds = [...tcpConns, ...rdmaConns].reduce((s, c) => s + (c.admin_cmd_count || 0), 0);
            const totalReadBytes = [...tcpConns, ...rdmaConns].reduce((s, c) => s + (c.read_bytes || 0), 0);
            const totalWriteBytes = [...tcpConns, ...rdmaConns].reduce((s, c) => s + (c.write_bytes || 0), 0);

            const allIOLats = [...tcpConns, ...rdmaConns].map(c => (c.io_latency || {}).avg_ns || 0).filter(x => x > 0);
            const avgIOLat = allIOLats.length > 0 ? allIOLats.reduce((a, b) => a + b, 0) / allIOLats.length : 0;

            const overviewHtml = `
                <div class="card">
                    <div class="section-title">性能概览</div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">总 Admin 命令</div>
                            <div class="stat-value">${totalAdminCmds}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">总 IO 命令</div>
                            <div class="stat-value">${totalIOCmds}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">平均 IO 延迟</div>
                            <div class="stat-value">${formatLatency(avgIOLat)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">总读取数据</div>
                            <div class="stat-value">${formatBytes(totalReadBytes)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">总写入数据</div>
                            <div class="stat-value">${formatBytes(totalWriteBytes)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">活跃连接</div>
                            <div class="stat-value">${tcpConns.length + rdmaConns.length}</div>
                        </div>
                    </div>
                </div>
            `;

            const connectionsHtml = `
                <div class="card">
                    <div class="section-title">连接性能统计</div>
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab(event, 'tcp-tab')">TCP 连接 (${tcpConns.length})</div>
                        <div class="tab" onclick="switchTab(event, 'rdma-tab')">RDMA 连接 (${rdmaConns.length})</div>
                    </div>
                    <div id="tcp-tab" class="tab-content active">
                        ${renderConnTable(tcpConns, 'tcp')}
                    </div>
                    <div id="rdma-tab" class="tab-content">
                        ${renderConnTable(rdmaConns, 'rdma')}
                    </div>
                </div>
            `;

            const controllerHtml = `
                <div class="card">
                    <div class="section-title">控制器信息</div>
                    <div class="controller-info">
                        <div class="info-item">
                            <div class="label">型号</div>
                            <div class="value">${controller.model.trim()}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">序列号</div>
                            <div class="value">${controller.serial.trim()}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">固件版本</div>
                            <div class="value">${controller.firmware.trim()}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">命名空间数量</div>
                            <div class="value">${controller.num_namespaces}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">传输协议</div>
                            <div class="value">TCP + RDMA</div>
                        </div>
                        <div class="info-item">
                            <div class="label">协议版本</div>
                            <div class="value">NVMe 1.4</div>
                        </div>
                    </div>
                </div>
            `;

            content.innerHTML = statusHtml + namespacesHtml + overviewHtml + connectionsHtml + controllerHtml;
        }

        function switchTab(event, tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
