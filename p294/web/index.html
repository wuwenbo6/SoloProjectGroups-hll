<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWAMP Client - 单向延迟测试</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn.stop {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
        }

        .status.running {
            background: #fff3cd;
            color: #856404;
        }

        .status.completed {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-item .label {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
        }

        .stat-item .value {
            font-size: 1.2em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-item.ntp .value {
            color: #28a745;
        }

        .stat-item.rate .value {
            color: #ff6b6b;
        }

        .stat-item.symmetric .value {
            color: #6f42c1;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin: 15px 0 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title::after {
            content: '▼';
            font-size: 10px;
            transition: transform 0.3s;
        }

        .section-title.collapsed::after {
            transform: rotate(-90deg);
        }

        .section-content {
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 500px;
        }

        .section-content.collapsed {
            max-height: 0;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }

        .sub-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding-left: 28px;
        }

        .table-container {
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #e9ecef;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        tr:hover {
            background: #f8f9fa;
        }

        tr.success td:first-child::before {
            content: "✓ ";
            color: #28a745;
        }

        tr.failed td:first-child::before {
            content: "✗ ";
            color: #dc3545;
        }

        .delay-good {
            color: #28a745;
            font-weight: 600;
        }

        .delay-warning {
            color: #ffc107;
            font-weight: 600;
        }

        .delay-bad {
            color: #dc3545;
            font-weight: 600;
        }

        .error-text {
            color: #dc3545;
            font-size: 12px;
        }

        .charts-section {
            margin-top: 25px;
        }

        .charts-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .export-buttons .btn {
            width: auto;
            padding: 8px 20px;
            font-size: 14px;
        }

        .export-buttons .btn.png-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .export-buttons .btn.csv-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .chart-wrapper {
            margin-bottom: 20px;
            background: #fafafa;
            border-radius: 8px;
            padding: 15px;
        }

        .chart-wrapper h3 {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }

        .full-width-card {
            grid-column: 1 / -1;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 OWAMP Client</h1>
            <p>单向主动测量协议客户端 - 单向延迟测试工具</p>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>⚙️ 测试配置</h2>
                <form id="testForm">
                    <div class="form-group">
                        <label for="address">服务器地址</label>
                        <input type="text" id="address" value="127.0.0.1" placeholder="例如: 192.168.1.100">
                    </div>
                    <div class="form-group">
                        <label for="port">端口 (默认 861)</label>
                        <input type="number" id="port" value="861" min="1" max="65535">
                    </div>
                    <div class="form-group">
                        <label for="packetCount">发送包数量</label>
                        <input type="number" id="packetCount" value="20" min="1" max="1000">
                    </div>
                    <div class="form-group">
                        <label for="intervalMs">发送间隔 (毫秒)</label>
                        <input type="number" id="intervalMs" value="50" min="10" max="10000">
                    </div>
                    <div class="form-group">
                        <label for="timeoutMs">超时时间 (毫秒)</label>
                        <input type="number" id="timeoutMs" value="1000" min="100" max="30000">
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="symmetricMode">
                        <label for="symmetricMode">对称模式</label>
                    </div>

                    <div class="section-title" id="ntpSectionTitle">
                        <span>⏰ NTP 时钟偏移补偿</span>
                    </div>
                    <div class="section-content" id="ntpSectionContent">
                        <div class="checkbox-group">
                            <input type="checkbox" id="ntpEnabled">
                            <label for="ntpEnabled">启用 NTP 偏移补偿</label>
                        </div>
                        <div class="sub-grid" id="ntpSubGrid">
                            <div class="form-group">
                                <label for="ntpServer">NTP 服务器</label>
                                <input type="text" id="ntpServer" value="pool.ntp.org">
                            </div>
                            <div class="form-group">
                                <label for="ntpPort">NTP 端口</label>
                                <input type="number" id="ntpPort" value="123" min="1" max="65535">
                            </div>
                            <div class="form-group">
                                <label for="ntpTimeout">超时 (毫秒)</label>
                                <input type="number" id="ntpTimeout" value="3000" min="100" max="10000">
                            </div>
                            <div class="form-group">
                                <label for="ntpAttempts">重试次数</label>
                                <input type="number" id="ntpAttempts" value="3" min="1" max="10">
                            </div>
                        </div>
                    </div>

                    <div class="section-title" id="adaptiveSectionTitle">
                        <span>📈 自适应速率控制</span>
                    </div>
                    <div class="section-content" id="adaptiveSectionContent">
                        <div class="checkbox-group">
                            <input type="checkbox" id="adaptiveEnabled" checked>
                            <label for="adaptiveEnabled">启用自适应速率控制</label>
                        </div>
                        <div class="sub-grid" id="adaptiveSubGrid">
                            <div class="form-group">
                                <label for="minInterval">最小间隔 (毫秒)</label>
                                <input type="number" id="minInterval" value="10" min="1" max="1000">
                            </div>
                            <div class="form-group">
                                <label for="maxInterval">最大间隔 (毫秒)</label>
                                <input type="number" id="maxInterval" value="1000" min="10" max="5000">
                            </div>
                            <div class="form-group">
                                <label for="increaseFactor">减速系数</label>
                                <input type="number" id="increaseFactor" value="0.5" step="0.1" min="0.1" max="2">
                            </div>
                            <div class="form-group">
                                <label for="decreaseFactor">加速系数</label>
                                <input type="number" id="decreaseFactor" value="0.3" step="0.1" min="0.1" max="1">
                            </div>
                            <div class="form-group">
                                <label for="lossThreshold">丢包阈值 (%)</label>
                                <input type="number" id="lossThreshold" value="5" step="0.5" min="0.1" max="50">
                            </div>
                            <div class="form-group">
                                <label for="windowSize">滑动窗口大小</label>
                                <input type="number" id="windowSize" value="10" min="5" max="50">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn" id="startBtn">🚀 开始测试</button>
                </form>
                <div id="status" class="status" style="display: none;"></div>
                <div id="ntpStatus" class="status" style="display: none; margin-top: 10px;"></div>
            </div>

            <div class="card">
                <h2>📊 测试结果</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="label">发送总数</div>
                        <div class="value" id="totalSent">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="label">接收成功</div>
                        <div class="value" id="totalReceived">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="label">丢包率</div>
                        <div class="value" id="lossRate">0%</div>
                    </div>
                    <div class="stat-item">
                        <div class="label">平均延迟</div>
                        <div class="value" id="avgDelay">0 ms</div>
                    </div>
                    <div class="stat-item">
                        <div class="label">最小延迟</div>
                        <div class="value" id="minDelay">0 ms</div>
                    </div>
                    <div class="stat-item">
                        <div class="label">最大延迟</div>
                        <div class="value" id="maxDelay">0 ms</div>
                    </div>
                    <div class="stat-item ntp">
                        <div class="label">NTP 偏移</div>
                        <div class="value" id="ntpOffset">-</div>
                    </div>
                    <div class="stat-item ntp">
                        <div class="label">补偿后延迟</div>
                        <div class="value" id="compensatedDelay">-</div>
                    </div>
                    <div class="stat-item rate">
                        <div class="label">当前间隔</div>
                        <div class="value" id="currentInterval">-</div>
                    </div>
                    <div class="stat-item symmetric" id="statAvgForward" style="display:none;">
                        <div class="label">平均正向延迟</div>
                        <div class="value" id="avgForwardDelay">-</div>
                    </div>
                    <div class="stat-item symmetric" id="statAvgReverse" style="display:none;">
                        <div class="label">平均反向延迟</div>
                        <div class="value" id="avgReverseDelay">-</div>
                    </div>
                    <div class="stat-item symmetric" id="statAvgRtt" style="display:none;">
                        <div class="label">平均 RTT</div>
                        <div class="value" id="avgRtt">-</div>
                    </div>
                </div>

                <h2 style="margin-top: 20px;">📋 详细记录</h2>
                <div class="table-container">
                    <table id="resultsTable">
                        <thead id="resultsHead">
                            <tr>
                                <th>序号</th>
                                <th>发送时间戳</th>
                                <th>接收时间戳</th>
                                <th>原始延迟</th>
                                <th>补偿延迟</th>
                                <th>当前间隔</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                            <tr>
                                <td colspan="7" style="text-align: center; color: #999; padding: 30px;">
                                    暂无数据，请先开始测试
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="charts-section" id="chartsSection" style="display:none;">
                    <h2>📈 图表</h2>
                    <div class="export-buttons">
                        <button class="btn png-btn" onclick="exportPNG()">📷 导出 PNG</button>
                        <button class="btn csv-btn" onclick="exportCSV()">📄 导出 CSV</button>
                    </div>
                    <div class="chart-wrapper">
                        <h3>延迟趋势</h3>
                        <canvas id="delayChart"></canvas>
                    </div>
                    <div class="chart-wrapper">
                        <h3>NTP 偏移 & 发送间隔</h3>
                        <canvas id="offsetChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let pollInterval = null;
        let currentResults = [];
        let isSymmetric = false;
        let delayChart = null;
        let offsetChart = null;

        const form = document.getElementById('testForm');
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const ntpStatusDiv = document.getElementById('ntpStatus');

        document.getElementById('ntpSectionTitle').addEventListener('click', () => {
            toggleSection('ntpSectionTitle', 'ntpSectionContent');
        });

        document.getElementById('adaptiveSectionTitle').addEventListener('click', () => {
            toggleSection('adaptiveSectionTitle', 'adaptiveSectionContent');
        });

        function toggleSection(titleId, contentId) {
            const title = document.getElementById(titleId);
            const content = document.getElementById(contentId);
            title.classList.toggle('collapsed');
            content.classList.toggle('collapsed');
        }

        document.getElementById('ntpEnabled').addEventListener('change', (e) => {
            const subGrid = document.getElementById('ntpSubGrid');
            subGrid.style.opacity = e.target.checked ? '1' : '0.5';
            subGrid.style.pointerEvents = e.target.checked ? 'auto' : 'none';
        });

        document.getElementById('adaptiveEnabled').addEventListener('change', (e) => {
            const subGrid = document.getElementById('adaptiveSubGrid');
            subGrid.style.opacity = e.target.checked ? '1' : '0.5';
            subGrid.style.pointerEvents = e.target.checked ? 'auto' : 'none';
        });

        document.getElementById('ntpSubGrid').style.opacity = '0.5';
        document.getElementById('ntpSubGrid').style.pointerEvents = 'none';

        function initCharts() {
            const delayCtx = document.getElementById('delayChart').getContext('2d');
            delayChart = new Chart(delayCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    animation: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        x: { title: { display: true, text: '序号' } },
                        y: { title: { display: true, text: '延迟 (ms)' }, beginAtZero: true }
                    }
                }
            });

            const offsetCtx = document.getElementById('offsetChart').getContext('2d');
            offsetChart = new Chart(offsetCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    animation: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        x: { title: { display: true, text: '序号' } },
                        y: {
                            type: 'linear',
                            position: 'left',
                            title: { display: true, text: 'NTP 偏移 (ms)' },
                            beginAtZero: true
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            title: { display: true, text: '发送间隔 (ms)' },
                            beginAtZero: true,
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }

        function updateCharts(results) {
            if (!delayChart || !offsetChart || !results || results.length === 0) return;

            const labels = results.map(r => r.sequence_number);
            const successResults = results.filter(r => r.success);

            const delayDatasets = [];
            if (isSymmetric) {
                delayDatasets.push({
                    label: '正向延迟 (ms)',
                    data: successResults.map(r => r.forward_delay_ms),
                    borderColor: '#667eea',
                    backgroundColor: '#667eea33',
                    fill: false,
                    tension: 0.1
                });
                delayDatasets.push({
                    label: '反向延迟 (ms)',
                    data: successResults.map(r => r.reverse_delay_ms),
                    borderColor: '#f5576c',
                    backgroundColor: '#f5576c33',
                    fill: false,
                    tension: 0.1
                });
                delayDatasets.push({
                    label: 'RTT (ms)',
                    data: successResults.map(r => r.rtt_ms),
                    borderColor: '#6f42c1',
                    backgroundColor: '#6f42c133',
                    fill: false,
                    tension: 0.1
                });
                const hasCompensated = successResults.some(r => r.compensated_delay_ms);
                if (hasCompensated) {
                    delayDatasets.push({
                        label: '补偿延迟 (ms)',
                        data: successResults.map(r => r.compensated_delay_ms),
                        borderColor: '#28a745',
                        backgroundColor: '#28a74533',
                        fill: false,
                        tension: 0.1,
                        borderDash: [5, 5]
                    });
                }
            } else {
                delayDatasets.push({
                    label: '单向延迟 (ms)',
                    data: successResults.map(r => r.one_way_delay_ms),
                    borderColor: '#667eea',
                    backgroundColor: '#667eea33',
                    fill: false,
                    tension: 0.1
                });
                const hasCompensated = successResults.some(r => r.compensated_delay_ms);
                if (hasCompensated) {
                    delayDatasets.push({
                        label: '补偿延迟 (ms)',
                        data: successResults.map(r => r.compensated_delay_ms),
                        borderColor: '#28a745',
                        backgroundColor: '#28a74533',
                        fill: false,
                        tension: 0.1,
                        borderDash: [5, 5]
                    });
                }
            }

            delayChart.data.labels = successResults.map(r => r.sequence_number);
            delayChart.data.datasets = delayDatasets;
            delayChart.update();

            const offsetDatasets = [];
            const hasNtpOffset = successResults.some(r => r.ntp_offset_ms !== undefined && r.ntp_offset_ms !== null);
            if (hasNtpOffset) {
                offsetDatasets.push({
                    label: 'NTP 偏移 (ms)',
                    data: successResults.map(r => r.ntp_offset_ms),
                    borderColor: '#ffc107',
                    backgroundColor: '#ffc10733',
                    fill: false,
                    tension: 0.1,
                    yAxisID: 'y'
                });
            }
            const hasInterval = successResults.some(r => r.current_interval_ms !== undefined && r.current_interval_ms !== null);
            if (hasInterval) {
                offsetDatasets.push({
                    label: '发送间隔 (ms)',
                    data: successResults.map(r => r.current_interval_ms),
                    borderColor: '#ff6b6b',
                    backgroundColor: '#ff6b6b33',
                    fill: false,
                    tension: 0.1,
                    yAxisID: 'y1'
                });
            }

            offsetChart.data.labels = successResults.map(r => r.sequence_number);
            offsetChart.data.datasets = offsetDatasets;
            offsetChart.update();
        }

        function updateTableHeaders() {
            const head = document.getElementById('resultsHead');
            if (isSymmetric) {
                head.innerHTML = `<tr>
                    <th>序号</th>
                    <th>发送时间戳</th>
                    <th>接收时间戳</th>
                    <th>正向延迟</th>
                    <th>反向延迟</th>
                    <th>RTT</th>
                    <th>补偿延迟</th>
                    <th>当前间隔</th>
                    <th>状态</th>
                </tr>`;
            } else {
                head.innerHTML = `<tr>
                    <th>序号</th>
                    <th>发送时间戳</th>
                    <th>接收时间戳</th>
                    <th>原始延迟</th>
                    <th>补偿延迟</th>
                    <th>当前间隔</th>
                    <th>状态</th>
                </tr>`;
            }
        }

        function updateSymmetricStats(show) {
            document.getElementById('statAvgForward').style.display = show ? '' : 'none';
            document.getElementById('statAvgReverse').style.display = show ? '' : 'none';
            document.getElementById('statAvgRtt').style.display = show ? '' : 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (isRunning) {
                stopTest();
                return;
            }

            const ntpEnabled = document.getElementById('ntpEnabled').checked;
            const adaptiveEnabled = document.getElementById('adaptiveEnabled').checked;
            const symmetricMode = document.getElementById('symmetricMode').checked;

            const config = {
                address: document.getElementById('address').value,
                port: parseInt(document.getElementById('port').value),
                packet_count: parseInt(document.getElementById('packetCount').value),
                interval_ms: parseInt(document.getElementById('intervalMs').value),
                timeout_ms: parseInt(document.getElementById('timeoutMs').value),
                symmetric_mode: symmetricMode,
                ntp: {
                    enabled: ntpEnabled,
                    server: document.getElementById('ntpServer').value,
                    port: parseInt(document.getElementById('ntpPort').value),
                    timeout_ms: parseInt(document.getElementById('ntpTimeout').value),
                    attempts: parseInt(document.getElementById('ntpAttempts').value)
                },
                adaptive: {
                    enabled: adaptiveEnabled,
                    min_interval_ms: parseInt(document.getElementById('minInterval').value),
                    max_interval_ms: parseInt(document.getElementById('maxInterval').value),
                    increase_factor: parseFloat(document.getElementById('increaseFactor').value),
                    decrease_factor: parseFloat(document.getElementById('decreaseFactor').value),
                    loss_threshold: parseFloat(document.getElementById('lossThreshold').value),
                    window_size: parseInt(document.getElementById('windowSize').value)
                }
            };

            try {
                ntpStatusDiv.style.display = 'none';

                const response = await fetch('/api/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                const data = await response.json();

                if (data.success) {
                    isRunning = true;
                    isSymmetric = symmetricMode;
                    startBtn.textContent = '⏹ 停止测试';
                    startBtn.classList.add('stop');
                    showStatus('测试进行中...', 'running');
                    clearResults();
                    updateTableHeaders();
                    updateSymmetricStats(isSymmetric);
                    startPolling();
                } else {
                    showStatus(data.message || '启动测试失败', 'error');
                }
            } catch (err) {
                showStatus('连接服务器失败: ' + err.message, 'error');
            }
        });

        async function stopTest() {
            try {
                await fetch('/api/stop', { method: 'POST' });
            } catch (err) {
                console.error('Stop error:', err);
            }

            isRunning = false;
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            startBtn.textContent = '🚀 开始测试';
            startBtn.classList.remove('stop');
            showStatus('测试已停止', 'completed');
        }

        function startPolling() {
            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/results');
                    const data = await response.json();

                    if (data.success) {
                        currentResults = data.results || [];
                        updateResults(currentResults);
                        updateCharts(currentResults);

                        if (data.rate_controller_stats) {
                            document.getElementById('currentInterval').textContent =
                                data.rate_controller_stats.current_interval_ms.toFixed(1) + ' ms';
                        }

                        if (data.is_symmetric !== undefined) {
                            isSymmetric = data.is_symmetric;
                            updateTableHeaders();
                            updateSymmetricStats(isSymmetric);
                        }

                        if (!data.is_running) {
                            isRunning = false;
                            clearInterval(pollInterval);
                            pollInterval = null;
                            startBtn.textContent = '🚀 开始测试';
                            startBtn.classList.remove('stop');
                            showStatus('测试完成！', 'completed');
                            loadStats();
                            loadNTPStatus();
                        }
                    }
                } catch (err) {
                    console.error('Polling error:', err);
                }
            }, 200);
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                if (data.success && data.stats) {
                    updateStats(data.stats);
                }
            } catch (err) {
                console.error('Stats error:', err);
            }
        }

        async function loadNTPStatus() {
            try {
                const response = await fetch('/api/ntp-status');
                const data = await response.json();

                if (data.ntp_result && data.ntp_result.success) {
                    const offsetMs = data.ntp_result.offset / 1000000;
                    document.getElementById('ntpOffset').textContent = offsetMs.toFixed(3) + ' ms';
                    showNTPStatus(`NTP 同步成功: 偏移 ${offsetMs.toFixed(3)} ms`, 'completed');
                } else if (data.ntp_result) {
                    showNTPStatus(`NTP 同步失败: ${data.ntp_result.error || '未知错误'}`, 'error');
                }
            } catch (err) {
                console.error('NTP status error:', err);
            }
        }

        function updateStats(stats) {
            document.getElementById('totalSent').textContent = stats.total_sent;
            document.getElementById('totalReceived').textContent = stats.total_received;
            document.getElementById('lossRate').textContent = stats.loss_rate.toFixed(2) + '%';
            document.getElementById('avgDelay').textContent = formatDuration(stats.avg_delay);
            document.getElementById('minDelay').textContent = formatDuration(stats.min_delay);
            document.getElementById('maxDelay').textContent = formatDuration(stats.max_delay);

            if (stats.avg_compensated_delay) {
                document.getElementById('compensatedDelay').textContent = formatDuration(stats.avg_compensated_delay);
            }
            if (stats.ntp_offset_ms !== undefined && stats.ntp_offset_ms !== 0) {
                document.getElementById('ntpOffset').textContent = stats.ntp_offset_ms.toFixed(3) + ' ms';
            }
            if (stats.final_interval_ms) {
                document.getElementById('currentInterval').textContent = stats.final_interval_ms.toFixed(1) + ' ms';
            }

            if (stats.is_symmetric) {
                isSymmetric = true;
                updateTableHeaders();
                updateSymmetricStats(true);
                if (stats.avg_forward_delay_ms !== undefined) {
                    document.getElementById('avgForwardDelay').textContent = stats.avg_forward_delay_ms.toFixed(3) + ' ms';
                }
                if (stats.avg_reverse_delay_ms !== undefined) {
                    document.getElementById('avgReverseDelay').textContent = stats.avg_reverse_delay_ms.toFixed(3) + ' ms';
                }
                if (stats.avg_rtt_ms !== undefined) {
                    document.getElementById('avgRtt').textContent = stats.avg_rtt_ms.toFixed(3) + ' ms';
                }
            }
        }

        function formatDuration(duration) {
            if (!duration) return '0 ms';
            const ms = duration / 1000000;
            return ms.toFixed(3) + ' ms';
        }

        function clearResults() {
            currentResults = [];
            document.getElementById('resultsBody').innerHTML = '';
            document.getElementById('ntpOffset').textContent = '-';
            document.getElementById('compensatedDelay').textContent = '-';
            document.getElementById('currentInterval').textContent = '-';
            document.getElementById('avgForwardDelay').textContent = '-';
            document.getElementById('avgReverseDelay').textContent = '-';
            document.getElementById('avgRtt').textContent = '-';
            ntpStatusDiv.style.display = 'none';

            document.getElementById('chartsSection').style.display = 'none';
            if (delayChart) {
                delayChart.data.labels = [];
                delayChart.data.datasets = [];
                delayChart.update();
            }
            if (offsetChart) {
                offsetChart.data.labels = [];
                offsetChart.data.datasets = [];
                offsetChart.update();
            }

            updateStats({
                total_sent: 0,
                total_received: 0,
                loss_rate: 0,
                avg_delay: 0,
                min_delay: 0,
                max_delay: 0
            });
        }

        function getDelayClass(delayMs) {
            if (delayMs > 100) return 'delay-bad';
            if (delayMs > 50) return 'delay-warning';
            return 'delay-good';
        }

        function updateResults(results) {
            if (!results || results.length === 0) return;

            if (results.length > 0) {
                document.getElementById('chartsSection').style.display = '';
            }

            const tbody = document.getElementById('resultsBody');
            const existingRows = tbody.children.length;

            for (let i = existingRows; i < results.length; i++) {
                const r = results[i];
                const tr = document.createElement('tr');
                tr.className = r.success ? 'success' : 'failed';

                if (isSymmetric) {
                    const forwardClass = r.forward_delay_ms !== undefined ? getDelayClass(r.forward_delay_ms) : '';
                    const reverseClass = r.reverse_delay_ms !== undefined ? getDelayClass(r.reverse_delay_ms) : '';
                    const rttClass = r.rtt_ms !== undefined ? getDelayClass(r.rtt_ms) : '';

                    const forwardDisplay = r.forward_delay_ms !== undefined
                        ? `<td class="${forwardClass}">${r.forward_delay_ms.toFixed(3)} ms</td>`
                        : '<td>-</td>';
                    const reverseDisplay = r.reverse_delay_ms !== undefined
                        ? `<td class="${reverseClass}">${r.reverse_delay_ms.toFixed(3)} ms</td>`
                        : '<td>-</td>';
                    const rttDisplay = r.rtt_ms !== undefined
                        ? `<td class="${rttClass}">${r.rtt_ms.toFixed(3)} ms</td>`
                        : '<td>-</td>';

                    const compDelayDisplay = r.compensated_delay_ms
                        ? `<td class="${getDelayClass(r.compensated_delay_ms)}">${r.compensated_delay_ms.toFixed(3)} ms</td>`
                        : '<td>-</td>';

                    const intervalDisplay = r.current_interval_ms
                        ? `<td>${r.current_interval_ms.toFixed(1)} ms</td>`
                        : '<td>-</td>';

                    tr.innerHTML = `
                        <td>${r.sequence_number}</td>
                        <td>${formatTimestamp(r.send_timestamp_ns)}</td>
                        <td>${formatTimestamp(r.receive_timestamp_ns)}</td>
                        ${forwardDisplay}
                        ${reverseDisplay}
                        ${rttDisplay}
                        ${compDelayDisplay}
                        ${intervalDisplay}
                        <td>${r.success ? '成功' : '<span class="error-text">' + (r.error || '失败') + '</span>'}</td>
                    `;
                } else {
                    const delayMs = r.one_way_delay_ms;
                    let delayClass = 'delay-good';
                    if (delayMs > 100) delayClass = 'delay-bad';
                    else if (delayMs > 50) delayClass = 'delay-warning';

                    const compDelayDisplay = r.compensated_delay_ms
                        ? `<td class="${delayClass}">${r.compensated_delay_ms.toFixed(3)} ms</td>`
                        : '<td>-</td>';

                    const intervalDisplay = r.current_interval_ms
                        ? `<td>${r.current_interval_ms.toFixed(1)} ms</td>`
                        : '<td>-</td>';

                    tr.innerHTML = `
                        <td>${r.sequence_number}</td>
                        <td>${formatTimestamp(r.send_timestamp_ns)}</td>
                        <td>${formatTimestamp(r.receive_timestamp_ns)}</td>
                        <td class="${delayClass}">${r.success ? delayMs.toFixed(3) + ' ms' : '-'}</td>
                        ${compDelayDisplay}
                        ${intervalDisplay}
                        <td>${r.success ? '成功' : '<span class="error-text">' + (r.error || '失败') + '</span>'}</td>
                    `;
                }
                tbody.appendChild(tr);
            }

            const container = document.querySelector('.table-container');
            container.scrollTop = container.scrollHeight;

            document.getElementById('totalSent').textContent = results.length;
            const received = results.filter(r => r.success).length;
            document.getElementById('totalReceived').textContent = received;
            const lossRate = ((results.length - received) / results.length * 100).toFixed(2);
            document.getElementById('lossRate').textContent = lossRate + '%';

            const lastResult = results[results.length - 1];
            if (lastResult && lastResult.ntp_offset_ms) {
                document.getElementById('ntpOffset').textContent = lastResult.ntp_offset_ms.toFixed(3) + ' ms';
            }
            if (lastResult && lastResult.current_interval_ms) {
                document.getElementById('currentInterval').textContent = lastResult.current_interval_ms.toFixed(1) + ' ms';
            }
        }

        function formatTimestamp(ns) {
            if (!ns) return '-';
            const date = new Date(ns / 1000000);
            return date.toLocaleTimeString('zh-CN', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                fractionalSecondDigits: 3
            });
        }

        function showStatus(message, type) {
            statusDiv.style.display = 'block';
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
        }

        function showNTPStatus(message, type) {
            ntpStatusDiv.style.display = 'block';
            ntpStatusDiv.textContent = message;
            ntpStatusDiv.className = 'status ' + type;
        }

        function exportPNG() {
            if (!delayChart || !offsetChart) return;

            const delayCanvas = document.getElementById('delayChart');
            const offsetCanvas = document.getElementById('offsetChart');

            const gap = 20;
            const totalWidth = Math.max(delayCanvas.width, offsetCanvas.width);
            const totalHeight = delayCanvas.height + offsetCanvas.height + gap;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = totalWidth;
            tempCanvas.height = totalHeight;
            const ctx = tempCanvas.getContext('2d');

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, totalWidth, totalHeight);
            ctx.drawImage(delayCanvas, 0, 0);
            ctx.drawImage(offsetCanvas, 0, delayCanvas.height + gap);

            const link = document.createElement('a');
            link.download = 'owamp-charts.png';
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        }

        function exportCSV() {
            if (!currentResults || currentResults.length === 0) return;

            const columns = [
                'sequence_number', 'send_time', 'receive_time', 'one_way_delay_ms',
                'compensated_delay_ms', 'ntp_offset_ms', 'forward_delay_ms',
                'reverse_delay_ms', 'rtt_ms', 'current_interval_ms', 'loss_rate',
                'success', 'error'
            ];

            const header = columns.join(',');
            const rows = currentResults.map(r => columns.map(col => {
                let val = r[col];
                if (val === undefined || val === null) return '';
                if (typeof val === 'string' && val.includes(',')) return '"' + val + '"';
                return val;
            }).join(','));

            const csvContent = '\uFEFF' + header + '\n' + rows.join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.download = 'owamp-results.csv';
            link.href = URL.createObjectURL(blob);
            link.click();
        }

        initCharts();
    </script>
</body>
</html>
