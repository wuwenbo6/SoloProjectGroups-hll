version: '3.8'

services:
  auth-service:
    build: .
    container_name: rtmp-auth-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-your-very-strong-secret-key-here-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - TOKEN_TTL_SECONDS=${TOKEN_TTL_SECONDS:-86400}
      - RTMP_SERVER_HOST=${RTMP_SERVER_HOST:-localhost}
      - RTMP_SERVER_PORT=${RTMP_SERVER_PORT:-1935}
      - RTMP_APP_NAME=${RTMP_APP_NAME:-live}
      - ENABLE_IP_BINDING=${ENABLE_IP_BINDING:-true}
    networks:
      - rtmp-network

  rtmp-server:
    image: alfg/nginx-rtmp:latest
    container_name: rtmp-server
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8081:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/mime.types:/etc/nginx/mime.types:ro
    depends_on:
      - auth-service
    networks:
      - rtmp-network

networks:
  rtmp-network:
    driver: bridge
