worker_processes auto;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            on_connect http://auth-service:8080/api/hooks/on_connect;
            on_publish http://auth-service:8080/api/hooks/on_publish;
            on_play http://auth-service:8080/api/hooks/on_play;
            on_publish_done http://auth-service:8080/api/hooks/on_publish_done;
            on_play_done http://auth-service:8080/api/hooks/on_play_done;
            on_disconnect http://auth-service:8080/api/hooks/on_disconnect;

            hls on;
            hls_path /tmp/hls;
            hls_fragment 5s;
            hls_playlist_length 20s;

            dash on;
            dash_path /tmp/dash;
            dash_fragment 5s;
            dash_playlist_length 20s;
        }
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 8080;

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /dash {
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /live {
            flv_live on;
            chunked_transfer_encoding on;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Headers *;
        }

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        location /control {
            rtmp_control all;
        }
    }
}
