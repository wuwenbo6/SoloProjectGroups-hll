<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPnP 媒体控制点</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 15px;
        }
        .server-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .server-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            flex: 1;
            min-width: 200px;
        }
        .server-card h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .server-card p {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        .search-box button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .search-box button:hover {
            transform: translateY(-2px);
        }
        .breadcrumb {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .breadcrumb span {
            color: #666;
            cursor: pointer;
        }
        .breadcrumb span:hover {
            color: #667eea;
            text-decoration: underline;
        }
        .breadcrumb .separator {
            margin: 0 10px;
            color: #ccc;
        }
        .content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .item-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .item:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .item-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .item-name {
            color: #333;
            font-size: 14px;
            word-break: break-word;
            line-height: 1.4;
        }
        .item-info {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #d0d0d0;
        }
        .refresh-btn {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
            margin-left: 10px;
            transition: background 0.3s;
        }
        .refresh-btn:hover {
            background: #5a6fd6;
        }
        .toolbar {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📀 UPnP 媒体控制点</h1>
            <div class="server-info">
                <div class="server-card">
                    <h3>服务器状态</h3>
                    <p id="serverStatus">🟢 运行中</p>
                </div>
                <div class="server-card">
                    <h3>媒体根目录</h3>
                    <p id="mediaRoot">./media</p>
                </div>
                <div class="server-card">
                    <h3>服务类型</h3>
                    <p>ContentDirectory v1</p>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索媒体文件（支持文件名搜索）...">
                <button onclick="searchMedia()">🔍 搜索</button>
            </div>
        </div>

        <div class="breadcrumb" id="breadcrumb">
            <span onclick="browse('0')">🏠 根目录</span>
        </div>

        <div class="content">
            <div class="toolbar">
                <button class="refresh-btn" onclick="refresh()">🔄 刷新</button>
            </div>
            <div id="contentArea">
                <div class="loading">
                    <div class="spinner"></div>
                    加载中...
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPath = [{ id: '0', name: '根目录' }];
        let API_BASE = '';

        function browse(objectId) {
            const idx = currentPath.findIndex(p => p.id === objectId);
            if (idx !== -1) {
                currentPath = currentPath.slice(0, idx + 1);
            }

            updateBreadcrumb();

            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';

            fetch(`${API_BASE}/api/browse?id=${encodeURIComponent(objectId)}`)
                .then(res => res.json())
                .then(data => {
                    renderItems(data.items, objectId);
                })
                .catch(err => {
                    contentArea.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>加载失败，请检查服务器是否运行</div>';
                    document.getElementById('serverStatus').textContent = '🔴 已断开';
                });
        }

        function searchMedia() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                browse('0');
                return;
            }

            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading"><div class="spinner"></div>搜索中...</div>';

            fetch(`${API_BASE}/api/search?query=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    renderItems(data.items, '0');
                })
                .catch(err => {
                    contentArea.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>搜索失败</div>';
                });
        }

        function renderItems(items, parentId) {
            const contentArea = document.getElementById('contentArea');

            if (items.length === 0) {
                contentArea.innerHTML = '<div class="empty"><div class="empty-icon">📂</div>文件夹为空</div>';
                return;
            }

            let html = '<div class="item-list">';

            items.forEach(item => {
                let icon = '📄';
                let info = '';

                if (item.type === 'container') {
                    icon = '📁';
                    info = `${item.child_count} 项`;
                } else if (item.item_type && item.item_type.includes('image')) {
                    icon = '🖼️';
                    info = formatSize(item.size);
                } else if (item.item_type && item.item_type.includes('video')) {
                    icon = '🎬';
                    info = formatSize(item.size);
                } else if (item.item_type && item.item_type.includes('audio')) {
                    icon = '🎵';
                    info = formatSize(item.size);
                }

                const clickHandler = item.type === 'container'
                    ? `onclick="navigateTo('${item.id}', '${item.title.replace(/'/g, "\\'")}')"`
                    : `onclick="openMedia('${item.url}')"`;

                html += `
                    <div class="item" ${clickHandler}>
                        <div class="item-icon">${icon}</div>
                        <div class="item-name">${item.title}</div>
                        <div class="item-info">${info}</div>
                    </div>
                `;
            });

            html += '</div>';
            contentArea.innerHTML = html;
        }

        function navigateTo(id, name) {
            currentPath.push({ id, name });
            browse(id);
        }

        function openMedia(url) {
            window.open(url, '_blank');
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            breadcrumb.innerHTML = currentPath.map((p, i) => {
                const clickable = i < currentPath.length - 1
                    ? `<span onclick="browse('${p.id}')">${i === 0 ? '🏠 ' : ''}${p.name}</span>`
                    : `<span style="color: #333;">${i === 0 ? '🏠 ' : ''}${p.name}</span>`;
                return clickable;
            }).join('<span class="separator">›</span>');
        }

        function formatSize(bytes) {
            if (!bytes) return '-';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        function refresh() {
            const currentId = currentPath[currentPath.length - 1].id;
            browse(currentId);
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchMedia();
            }
        });

        browse('0');
    </script>
</body>
</html>
