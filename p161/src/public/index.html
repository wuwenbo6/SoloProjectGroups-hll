<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HKP Keyserver</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>HKP Keyserver</h1>
      <p>HTTP Keyserver Protocol - OpenPGP 公钥服务器</p>
    </header>

    <div class="main-card">
      <nav class="nav-links">
        <a href="/">搜索密钥</a>
        <a href="/add">上传密钥</a>
      </nav>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索指纹、Key ID、用户名或邮箱...">
        <button id="searchBtn">搜索</button>
      </div>

      <div class="stats-bar" id="statsBar" style="display: none;">
        <div class="stat-item">
          <div class="stat-value" id="totalKeys">0</div>
          <div class="stat-label">公钥总数</div>
        </div>
      </div>

      <div id="resultsArea">
        <div class="loading" id="loading" style="display: none;">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
        <div id="keysList" class="keys-list"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
          <h3>未找到密钥</h3>
          <p>尝试使用其他搜索词，或上传一个新的公钥</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
