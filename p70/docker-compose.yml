version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/data/swarm_manager.db
      - HEARTBEAT_INTERVAL=30
      - NODE_TIMEOUT=120
      - FAILOVER_ENABLED=true
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - swarm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - swarm-network

networks:
  swarm-network:
    driver: bridge

volumes:
  data:
