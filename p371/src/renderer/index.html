<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>SPICE SmartCard Redirector</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-left">
        <svg class="header-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M6 8h4M6 12h8M6 16h6"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        <h1>SPICE SmartCard Redirector</h1>
      </div>
      <div class="header-right">
        <div id="spice-status" class="status-badge disconnected">
          <span class="status-dot"></span>
          <span class="status-text">未连接</span>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section class="panel connection-panel">
        <h2 class="panel-title">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          SPICE 连接
        </h2>
        <div class="form-grid">
          <div class="form-group">
            <label for="spice-host">主机地址</label>
            <input type="text" id="spice-host" value="127.0.0.1" placeholder="SPICE 服务器地址">
          </div>
          <div class="form-group">
            <label for="spice-port">端口</label>
            <input type="number" id="spice-port" value="5900" placeholder="端口">
          </div>
          <div class="form-group">
            <label for="spice-password">密码</label>
            <input type="password" id="spice-password" placeholder="可选密码">
          </div>
          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" id="spice-secure">
              <span>TLS 加密</span>
            </label>
          </div>
        </div>
        <div class="button-row">
          <button id="btn-connect" class="btn btn-primary">连接</button>
          <button id="btn-disconnect" class="btn btn-secondary" disabled>断开</button>
        </div>
      </section>

      <section class="panel readers-panel">
        <h2 class="panel-title">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h4M14 10h4M10 14h4"/></svg>
          读卡器
          <button id="btn-refresh-readers" class="btn-icon" title="刷新读卡器列表">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
        </h2>
        <div class="readers-toolbar">
          <button id="btn-monitor" class="btn btn-sm btn-outline">开始监控</button>
          <button id="btn-cold-reset" class="btn btn-sm btn-outline" disabled>冷复位</button>
        </div>
        <div id="readers-list" class="readers-list">
          <div class="empty-state">暂无读卡器，点击"开始监控"检测</div>
        </div>
        <div id="selected-app-info" class="app-info-panel" style="display: none; margin-top: 10px;">
          <div class="app-info-header">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            <span>当前选中应用</span>
          </div>
          <div id="selected-app-content" class="app-info-content"></div>
        </div>
        <div id="atr-detail-panel" class="atr-panel" style="display: none; margin-top: 10px;">
          <div class="atr-header">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            <span>ATR 解析</span>
          </div>
          <div id="atr-detail-content" class="atr-content"></div>
        </div>
      </section>

      <section class="panel slots-panel">
        <h2 class="panel-title">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          卡槽映射
          <button id="btn-refresh-slots" class="btn-icon" title="刷新卡槽列表">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
        </h2>
        <div class="slots-toolbar">
          <button id="btn-add-slot" class="btn btn-sm btn-outline">添加卡槽</button>
          <button id="btn-auto-assign" class="btn btn-sm btn-outline">自动分配</button>
        </div>
        <div id="slots-list" class="slots-grid">
          <div class="empty-state">暂无卡槽配置</div>
        </div>
      </section>

      <section class="panel apdu-panel">
        <h2 class="panel-title">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          APDU 交互
        </h2>
        <div class="apdu-input-row">
          <select id="apdu-reader" class="select-reader">
            <option value="">选择读卡器</option>
          </select>
          <input type="text" id="apdu-input" placeholder="输入 APDU (如 00A4040008A0000006472F0001)" spellcheck="false">
          <button id="btn-send-apdu" class="btn btn-primary btn-sm">发送</button>
        </div>
        <div class="apdu-quick-actions">
          <button class="btn btn-xs btn-outline" data-apdu="00A4040008A0000006472F0001">SELECT PSE</button>
          <button class="btn btn-xs btn-outline" data-apdu="00B0000000">READ BINARY</button>
          <button class="btn btn-xs btn-outline" data-apdu="80E4000000">GET DATA</button>
          <button class="btn btn-xs btn-outline" data-apdu="00CA000000">GET CHALLENGE</button>
        </div>
        <div id="apdu-log" class="apdu-log">
          <div class="empty-state">暂无 APDU 交互记录</div>
        </div>
        <div class="log-actions">
          <span id="trace-count" class="trace-count">0 条记录</span>
          <button id="btn-clear-log" class="btn btn-xs btn-outline">清空日志</button>
          <div class="export-dropdown">
            <button id="btn-export-log" class="btn btn-xs btn-outline">导出 ▾</button>
            <div id="export-menu" class="export-menu">
              <div class="export-item" data-format="text">文本格式 (.txt)</div>
              <div class="export-item" data-format="json">JSON 格式 (.json)</div>
              <div class="export-item" data-format="pcap">PCAP 格式 (.pcap)</div>
              <div class="export-item" data-format="hex">原始 HEX (.hex)</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span id="footer-info">就绪</span>
    </footer>
  </div>

  <div id="toast-container"></div>

  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <span id="modal-title">标题</span>
        <button id="modal-close" class="modal-close">×</button>
      </div>
      <div id="modal-content" class="modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
