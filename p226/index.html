<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTP Client - 断点续传</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>FTP Client</h1>
      <div id="connectionStatus" class="status disconnected">未连接</div>
    </header>

    <section class="connection-panel">
      <h2>连接配置</h2>
      <div class="form-row">
        <div class="form-group">
          <label>主机地址</label>
          <input type="text" id="host" placeholder="ftp.example.com" value="">
        </div>
        <div class="form-group">
          <label>FTP端口</label>
          <input type="number" id="port" value="21" min="1" max="65535">
        </div>
        <div class="form-group">
          <label>SFTP端口</label>
          <input type="number" id="sftpPort" value="22" min="1" max="65535">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="user" placeholder="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="password">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group checkbox-group">
          <input type="checkbox" id="secure">
          <label for="secure">使用安全连接 (FTPS)</label>
        </div>
        <div class="form-group checkbox-group">
          <input type="checkbox" id="sftpFallback" checked>
          <label for="sftpFallback">启用SFTP降级</label>
        </div>
      </div>
      <div class="button-group">
        <button id="connectBtn" class="btn btn-primary">连接</button>
        <button id="disconnectBtn" class="btn btn-danger" disabled>断开连接</button>
      </div>
    </section>

    <section class="file-browser">
      <div class="path-bar">
        <span class="path-label">当前路径:</span>
        <span id="currentPath">/</span>
        <button id="goBackBtn" class="btn btn-small" disabled>返回上级</button>
      </div>
      
      <div class="file-list-header">
        <span class="file-icon-header"></span>
        <span class="file-name-header">名称</span>
        <span class="file-size-header">大小</span>
        <span class="file-date-header">修改时间</span>
        <span class="file-actions-header">操作</span>
      </div>
      
      <div id="fileList" class="file-list">
        <div class="empty-state">请先连接到FTP服务器</div>
      </div>

      <div class="file-actions">
        <button id="uploadBtn" class="btn btn-success" disabled>上传文件</button>
        <button id="resumeUploadBtn" class="btn btn-warning" disabled>断点续传(上传)</button>
        <button id="createDirBtn" class="btn btn-info" disabled>新建文件夹</button>
        <button id="mirrorSyncBtn" class="btn btn-purple" disabled>镜像同步</button>
        <input type="file" id="fileInput" style="display: none" multiple>
        <input type="file" id="mirrorDirInput" style="display: none" webkitdirectory>
      </div>
    </section>

    <section class="progress-section">
      <h2>传输进度</h2>
      <div id="progressList" class="progress-list">
        <div class="empty-state">暂无传输任务</div>
      </div>
    </section>

    <section class="log-section">
      <h2>操作日志</h2>
      <div id="logArea" class="log-area"></div>
    </section>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
